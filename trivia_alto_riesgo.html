<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia - Enfermería en Alto Riesgo</title>
<style>
  :root {
    --primary: #c0392b;
    --primary-dark: #922b21;
    --secondary: #1a1a2e;
    --accent: #e74c3c;
    --gold: #f39c12;
    --bg: #0f0f1a;
    --card: #1e1e30;
    --card2: #252540;
    --text: #e8e8f0;
    --text2: #a0a0c0;
    --correct: #27ae60;
    --wrong: #e74c3c;
    --timer-ok: #27ae60;
    --timer-warn: #f39c12;
    --timer-danger: #e74c3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; }
  
  /* PANTALLA MENU */
  #menuScreen { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
  .logo { text-align: center; margin: 30px 0 20px; }
  .logo h1 { font-size: 1.8em; color: var(--primary); text-shadow: 0 0 20px rgba(192,57,43,0.5); letter-spacing: 2px; }
  .logo p { color: var(--text2); font-size: 0.95em; margin-top: 6px; }
  .subtitulo { color: var(--gold); font-size: 1em; text-align: center; margin-bottom: 18px; font-weight: bold; }
  .grid-temas { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; width: 100%; max-width: 900px; }
  .tema-btn {
    background: var(--card);
    border: 1px solid #333355;
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    color: var(--text);
  }
  .tema-btn:hover { background: var(--card2); border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(192,57,43,0.3); }
  .tema-btn .num { font-size: 0.75em; color: var(--primary); font-weight: bold; letter-spacing: 1px; }
  .tema-btn .nombre { font-size: 1em; font-weight: 600; margin-top: 3px; }
  .tema-btn .info { font-size: 0.8em; color: var(--text2); margin-top: 4px; }
  .tema-btn.completado { border-color: var(--correct); }
  .tema-btn.completado .num { color: var(--correct); }
  
  /* PANTALLA JUEGO */
  #gameScreen { display: none; flex-direction: column; min-height: 100vh; padding: 0; }
  .header-game {
    background: var(--card);
    padding: 12px 18px;
    border-bottom: 2px solid var(--primary);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header-game .tema-titulo { font-size: 0.95em; font-weight: bold; color: var(--gold); flex: 1; }
  .header-game .progreso { font-size: 0.85em; color: var(--text2); }
  .btn-volver { background: transparent; border: 1px solid #555; border-radius: 8px; padding: 6px 12px; color: var(--text2); cursor: pointer; font-size: 0.85em; }
  .btn-volver:hover { background: var(--card2); color: var(--text); }
  
  .game-body { padding: 20px; flex: 1; display: flex; flex-direction: column; align-items: center; }
  
  /* TIMER */
  .timer-wrap { width: 100%; max-width: 600px; margin-bottom: 16px; }
  .timer-bar-outer { background: #333; border-radius: 10px; height: 10px; overflow: hidden; }
  .timer-bar { height: 10px; border-radius: 10px; transition: width 1s linear, background 0.5s; background: var(--timer-ok); }
  .timer-num { text-align: right; font-size: 0.85em; margin-top: 4px; color: var(--text2); }
  
  /* PREGUNTA */
  .pregunta-card { background: var(--card); border-radius: 14px; padding: 22px; width: 100%; max-width: 600px; margin-bottom: 18px; border: 1px solid #333355; }
  .pregunta-num { font-size: 0.75em; color: var(--text2); margin-bottom: 8px; letter-spacing: 1px; }
  .pregunta-texto { font-size: 1.1em; font-weight: 600; line-height: 1.4; }
  
  /* OPCIONES */
  .opciones { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 10px; }
  .opcion-btn {
    background: var(--card);
    border: 2px solid #333355;
    border-radius: 10px;
    padding: 13px 16px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-size: 0.97em;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .opcion-btn:hover:not(:disabled) { background: var(--card2); border-color: var(--primary); }
  .opcion-btn .letra { font-weight: bold; color: var(--primary); font-size: 1em; min-width: 20px; }
  .opcion-btn.correcto { background: rgba(39,174,96,0.2); border-color: var(--correct); }
  .opcion-btn.incorrecto { background: rgba(231,76,60,0.15); border-color: var(--wrong); }
  .opcion-btn.correcto .letra { color: var(--correct); }
  .opcion-btn.incorrecto .letra { color: var(--wrong); }
  .opcion-btn:disabled { cursor: default; }
  
  /* FEEDBACK */
  .feedback { width: 100%; max-width: 600px; border-radius: 10px; padding: 12px 16px; margin-top: 14px; text-align: center; font-weight: 600; font-size: 0.95em; display: none; }
  .feedback.correcto { background: rgba(39,174,96,0.2); border: 1px solid var(--correct); color: var(--correct); }
  .feedback.incorrecto { background: rgba(231,76,60,0.15); border: 1px solid var(--wrong); color: #ff6b6b; }
  .feedback.tiempo { background: rgba(243,156,18,0.15); border: 1px solid var(--gold); color: var(--gold); }
  
  .btn-siguiente { display: none; background: var(--primary); border: none; border-radius: 10px; padding: 13px 30px; color: white; font-size: 1em; font-weight: bold; cursor: pointer; margin-top: 14px; width: 100%; max-width: 600px; }
  .btn-siguiente:hover { background: var(--primary-dark); }
  
  /* PANTALLA RESULTADO */
  #resultScreen { display: none; flex-direction: column; align-items: center; min-height: 100vh; padding: 30px 20px; }
  .result-card { background: var(--card); border-radius: 16px; padding: 30px; width: 100%; max-width: 500px; text-align: center; border: 2px solid var(--primary); }
  .result-titulo { font-size: 1.5em; font-weight: bold; color: var(--gold); margin-bottom: 10px; }
  .result-tema { font-size: 0.9em; color: var(--text2); margin-bottom: 24px; }
  .result-puntaje { font-size: 3.5em; font-weight: bold; color: var(--primary); }
  .result-total { font-size: 1em; color: var(--text2); margin-bottom: 20px; }
  .result-msg { font-size: 1.05em; margin-bottom: 24px; color: var(--text); }
  .barra-result { background: #333; border-radius: 10px; height: 14px; margin: 10px 0 24px; overflow: hidden; }
  .barra-result-fill { height: 14px; border-radius: 10px; background: var(--primary); transition: width 1s ease; }
  .btns-result { display: flex; flex-direction: column; gap: 10px; }
  .btn-reintentar { background: var(--primary); border: none; border-radius: 10px; padding: 13px; color: white; font-weight: bold; cursor: pointer; font-size: 1em; }
  .btn-reintentar:hover { background: var(--primary-dark); }
  .btn-menu { background: transparent; border: 2px solid #555; border-radius: 10px; padding: 12px; color: var(--text); font-weight: bold; cursor: pointer; font-size: 1em; }
  .btn-menu:hover { background: var(--card2); }
  
  .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.75em; font-weight: bold; margin-top: 6px; }
  .badge-excelente { background: rgba(39,174,96,0.2); color: var(--correct); border: 1px solid var(--correct); }
  .badge-bien { background: rgba(243,156,18,0.2); color: var(--gold); border: 1px solid var(--gold); }
  .badge-regular { background: rgba(231,76,60,0.15); color: #ff6b6b; border: 1px solid var(--wrong); }
  
  @media (max-width: 480px) {
    .logo h1 { font-size: 1.4em; }
    .pregunta-texto { font-size: 1em; }
    .opcion-btn { font-size: 0.9em; padding: 11px 13px; }
  }
</style>
</head>
<body>

<!-- MENU -->
<div id="menuScreen">
  <div class="logo">
    <h1>🏥 ALTO RIESGO</h1>
    <p>Trivia de Enfermería en Alto Riesgo I y II</p>
    <p style="color:#666;font-size:0.8em;margin-top:4px;">CENT N°74 ATSA – 3er año</p>
  </div>
  <div class="subtitulo">Seleccioná un tema para practicar</div>
  <div class="grid-temas" id="gridTemas"></div>
  <div style="height:30px"></div>
</div>

<!-- JUEGO -->
<div id="gameScreen">
  <div class="header-game">
    <button class="btn-volver" onclick="volverMenu()">← Menú</button>
    <div class="tema-titulo" id="tituloActual"></div>
    <div class="progreso" id="progresoActual"></div>
  </div>
  <div class="game-body">
    <div class="timer-wrap">
      <div class="timer-bar-outer"><div class="timer-bar" id="timerBar"></div></div>
      <div class="timer-num" id="timerNum">25s</div>
    </div>
    <div class="pregunta-card">
      <div class="pregunta-num" id="preguntaNum"></div>
      <div class="pregunta-texto" id="preguntaTexto"></div>
    </div>
    <div class="opciones" id="opcionesContainer"></div>
    <div class="feedback" id="feedbackDiv"></div>
    <button class="btn-siguiente" id="btnSiguiente" onclick="siguiente()">Siguiente →</button>
  </div>
</div>

<!-- RESULTADO -->
<div id="resultScreen">
  <div class="result-card">
    <div class="result-titulo">🏁 Resultado Final</div>
    <div class="result-tema" id="resultTema"></div>
    <div class="result-puntaje" id="resultPuntaje"></div>
    <div class="result-total" id="resultTotal"></div>
    <div class="barra-result"><div class="barra-result-fill" id="barraFill" style="width:0%"></div></div>
    <div class="result-msg" id="resultMsg"></div>
    <div id="resultBadge"></div>
    <div class="btns-result" style="margin-top:20px;">
      <button class="btn-reintentar" onclick="reintentar()">🔄 Reintentar este tema</button>
      <button class="btn-menu" onclick="volverMenu()">🏠 Volver al menú</button>
    </div>
  </div>
</div>

<script>
const TEMAS = [{"id":1,"titulo":"T1: Unidad de Cuidados Intensivos","preguntas":[{"p":"¿Quién creó el concepto de cuidados intensivos?","o":["Florence Nightingale","Peter Safar","Joseph Lister","Louis Pasteur"],"c":0},{"p":"¿En qué año y país se creó la primera UCI?","o":["1953, Dinamarca","1950, EE.UU.","1960, Francia","1945, Reino Unido"],"c":0},{"p":"¿Qué es la Vigilancia Intensiva?","o":["Monitoreo de pacientes amenazados transitoriamente","Aplicar todas las terapias posibles","Sostener funciones vitales artificialmente","Diagnóstico rápido de urgencias"],"c":0},{"p":"¿Qué redujo Florence Nightingale con sus cuidados en Crimea?","o":["Mortalidad del 40% al 2%","Mortalidad del 80% al 10%","Infecciones del 50% al 5%","Amputaciones del 30% al 1%"],"c":0},{"p":"¿Cuál fue la causa que originó la primera UCI en Copenhague?","o":["Epidemia de poliomielitis","Guerra de Crimea","Brote de tuberculosis","Terremoto masivo"],"c":0},{"p":"¿Qué tipo de pacientes se benefician con internación en UCI?","o":["Con funciones vitales amenazadas o en falla recuperable","Solo postoperatorios graves","Solo pacientes con coma","Pacientes crónicos terminales"],"c":0},{"p":"¿Con qué servicios debe tener acceso 24hs la UCI?","o":["Laboratorio, quirófano, emergencia, farmacia","Solo laboratorio y guardia","Solo quirófano y hemoterapia","Radiología y odontología"],"c":0},{"p":"¿Qué es el Tratamiento Intensivo?","o":["Agotar todas las posibilidades terapéuticas para restablecer funciones","Solo el uso de ARM","Vigilancia sin intervención","Diagnóstico sin terapia"],"c":0},{"p":"¿Cuál es un parámetro NEGATIVO para ingreso a UTI?","o":["Paciente crónico en fase terminal sin posibilidad de mejora","Paciente con sepsis aguda","Paciente post-cirugía cardíaca","Paciente con insuficiencia respiratoria"],"c":0},{"p":"¿Qué es la Unidad de Reanimación (UR)?","o":["Área para riesgo inminente de muerte hasta traslado a UTI","Sinónimo de UTI","Unidad para crónicos","Área de diagnóstico intensivo"],"c":0},{"p":"¿Dónde debe ubicarse la UCI dentro del hospital?","o":["Área protegida del flujo habitual de circulación","En la entrada principal","Junto a la guardia de emergencia","En el piso más alto"],"c":0},{"p":"¿Qué significa UCI?","o":["Unidad de Cuidados Intensivos","Unidad de Control Interno","Unidad Coronaria Integrada","Unidad de Cirugía Intensiva"],"c":0},{"p":"¿Qué es la Terapéutica Intensiva?","o":["Aplicación sistémica de terapias en situaciones de peligro vital","Solo ventilación mecánica","Monitoreo continuo sin intervención","Tratamiento ambulatorio complejo"],"c":0},{"p":"¿Quién desarrolló el área de cuidados intensivos con pacientes sedados y ventilados en 1950?","o":["Peter Safar","Florence Nightingale","William Harvey","René Laennec"],"c":0},{"p":"¿Qué es la Unidad de Terapia Intermedia?","o":["Internación para cuidados constantes que no requieren UTI","Sinónimo de UTI","Área de recuperación postquirúrgica","Servicio de emergencias"],"c":0}]},{"id":2,"titulo":"T2: Recursos Humanos y Farmacología UCI","preguntas":[{"p":"¿Qué característica es fundamental en el enfermero de UCI?","o":["Capacitación continua y actuación rápida ante emergencias","Solo conocer farmacología","Solo manejar equipos","Realizar diagnósticos médicos"],"c":0},{"p":"¿Para qué sirve la Dopamina en UCI?","o":["Soporte vasopresor e inotrópico en shock","Anticoagulante","Antibiótico de amplio espectro","Sedante potente"],"c":0},{"p":"¿Qué es la Noradrenalina (Norepinefrina)?","o":["Vasopresor de primera línea en shock séptico","Diurético de asa","Broncodilatador","Anticonvulsivante"],"c":0},{"p":"¿Cuál es la función del Midazolam en UCI?","o":["Sedación y ansiolítico de corta duración","Vasopresor","Antibiótico","Anticoagulante"],"c":0},{"p":"¿Para qué se usa el Furosemide en UCI?","o":["Diurético en sobrecarga de volumen e insuficiencia cardíaca","Sedante","Vasopresor","Broncodilatador"],"c":0},{"p":"¿Qué es la Heparina sódica en UCI?","o":["Anticoagulante para prevenir trombosis","Antibiótico","Vasopresor","Sedante"],"c":0},{"p":"¿Para qué se usa el Amiodarona?","o":["Antiarrítmico para fibrilación y taquicardia ventricular","Diurético","Sedante","Antibiótico"],"c":0},{"p":"¿Qué registros específicos debe llevar el enfermero de UCI?","o":["Balance hidroelectrolítico, signos vitales, medicación administrada","Solo temperatura y presión","Solo medicación","Solo diuresis"],"c":0},{"p":"¿Qué es la Adrenalina en el contexto de UCI?","o":["Fármaco de primera elección en paro cardíaco","Diurético de asa","Sedante","Antiinflamatorio"],"c":0},{"p":"¿Qué debe incluir la preparación del paciente para UCI?","o":["Preparación psicofísica del paciente y su familia","Solo preparación del equipo médico","Solo colocación de vías","Solo datos personales"],"c":0},{"p":"¿Qué es el Propofol en UCI?","o":["Anestésico-sedante de acción ultra corta","Vasopresor","Antibiótico","Anticoagulante"],"c":0},{"p":"¿Para qué se usa el Bicarbonato de sodio en UCI?","o":["Corrección de acidosis metabólica grave","Vasopresor","Sedación","Broncodilatación"],"c":0},{"p":"¿Cuál es el objetivo principal del monitoreo en UCI?","o":["Detección precoz de cambios en el estado del paciente","Solo registrar datos","Solo controlar la medicación","Solo vigilar la vía aérea"],"c":0},{"p":"¿Qué es el Fentanilo en UCI?","o":["Analgésico opiáceo potente de corta duración","Antibiótico","Diurético","Vasodilatador"],"c":0},{"p":"¿Para qué sirve el Vecuronio en UCI?","o":["Bloqueante neuromuscular para facilitar ARM","Antiarrítmico","Analgésico","Antibiótico"],"c":0}]},{"id":3,"titulo":"T3: Insuficiencia Respiratoria","preguntas":[{"p":"¿Cómo se define la Insuficiencia Respiratoria (IR)?","o":["Incapacidad del sistema respiratorio de mantener adecuado intercambio gaseoso","Exceso de oxígeno en sangre","Aumento de la frecuencia respiratoria","Infección pulmonar grave"],"c":0},{"p":"¿Cuál es el valor de PaO2 que define hipoxemia?","o":["Menos de 60 mmHg","Menos de 80 mmHg","Menos de 100 mmHg","Menos de 40 mmHg"],"c":0},{"p":"¿Qué tipo de IR se llama hipercápnica?","o":["Tipo II, con aumento de CO2 (PaCO2 > 45 mmHg)","Tipo I, con solo hipoxemia","Tipo III, postoperatoria","Tipo IV, por shock"],"c":0},{"p":"¿Qué es la cianosis en IR?","o":["Coloración azulada por falta de oxígeno en tejidos","Coloración rojiza por exceso de O2","Palidez por vasoconstricción","Ictericia por falla hepática"],"c":0},{"p":"¿Cuál es el principal objetivo del tratamiento de la IR?","o":["Corregir la hipoxemia y mantener PaO2 > 60 mmHg","Aumentar la frecuencia cardíaca","Reducir la presión arterial","Administrar antibióticos siempre"],"c":0},{"p":"¿Qué es la gasometría arterial en IR?","o":["Análisis de gases en sangre arterial (PaO2, PaCO2, pH)","Radiografía de tórax","Medición de presión venosa","Análisis de orina"],"c":0},{"p":"¿Cuál es la causa más frecuente de IR Tipo I?","o":["Neumonía, SDRA, edema pulmonar","Depresión del centro respiratorio","Debilidad muscular","Obstrucción de vía aérea superior"],"c":0},{"p":"¿Qué signo clínico indica uso de músculos accesorios?","o":["Tiraje intercostal y supraclavicular","Bradicardia","Hipertensión arterial","Poliuria"],"c":0},{"p":"¿Qué posición favorece la ventilación en IR?","o":["Semi-Fowler (30-45°)","Trendelenburg","Decúbito prono siempre","Decúbito lateral izquierdo"],"c":0},{"p":"¿Qué es la oximetría de pulso en IR?","o":["Medición no invasiva de la saturación de O2 (SpO2)","Gasometría arterial","Radiografía de tórax","Espirometría"],"c":0},{"p":"¿Cuál es la causa de IR Tipo II (hipercápnica)?","o":["Depresión del centro respiratorio, EPOC, enfermedades neuromusculares","Solo neumonía","Solo edema pulmonar","Solo embolia pulmonar"],"c":0},{"p":"¿Qué valor de SpO2 es aceptable en IR tratada?","o":["Mayor o igual a 90%","Mayor a 99%","Entre 70-80%","Entre 60-70%"],"c":0},{"p":"¿Qué cuidado de enfermería es prioritario en IR?","o":["Mantener vía aérea permeable y administrar O2 indicado","Solo tomar tensión arterial","Solo registrar temperatura","Solo administrar antibióticos"],"c":0},{"p":"¿Qué es la taquipnea?","o":["Frecuencia respiratoria mayor a 20 respiraciones por minuto","Frecuencia respiratoria menor a 12","Respiración superficial","Pausa respiratoria"],"c":0},{"p":"¿Qué es la apnea?","o":["Cese completo de la respiración","Respiración rápida","Respiración profunda","Respiración irregular"],"c":0}]},{"id":4,"titulo":"T4: ARM - Asistencia Respiratoria Mecánica","preguntas":[{"p":"¿Qué es la ARM?","o":["Soporte mecánico que reemplaza o asiste la ventilación pulmonar","Solo administración de O2 por máscara","Técnica de fisioterapia respiratoria","Drenaje torácico"],"c":0},{"p":"¿Cuál es la principal indicación de ARM?","o":["Insuficiencia respiratoria grave con hipoxemia o hipercapnia refractaria","Tos crónica","Broncoespasmo leve","Fiebre alta"],"c":0},{"p":"¿Qué es la ventilación invasiva?","o":["ARM con tubo orotraqueal o traqueostomía","ARM con máscara facial","ARM con cánula nasal","Ventilación manual con bolsa"],"c":0},{"p":"¿Qué es la VMNI (Ventilación No Invasiva)?","o":["ARM con interfaz nasal o facial sin intubación","ARM con tubo orotraqueal","Respiración asistida manual","Traqueostomía"],"c":0},{"p":"¿Qué complicación grave puede ocurrir al intubar?","o":["Intubación esofágica inadvertida","Solo sangrado nasal","Solo broncoespasmo leve","Solo hipertensión transitoria"],"c":0},{"p":"¿Qué modo ventilatorio controla completamente la respiración?","o":["Modo controlado (CMV o AC)","Modo CPAP","Modo SIMV","Modo Presión Soporte"],"c":0},{"p":"¿Qué es el PEEP en ARM?","o":["Presión positiva al final de la espiración para mantener alvéolos abiertos","Presión al inicio de la inspiración","Volumen tidal ajustado","Frecuencia respiratoria programada"],"c":0},{"p":"¿Qué cuidado es fundamental en el tubo orotraqueal?","o":["Verificar posición, fijar correctamente y aspirar secreciones","Solo cambiar el tubo diariamente","Solo administrar oxígeno","Solo registrar la fecha de colocación"],"c":0 const TIEMPO = 25;
const letras = ['A','B','C','D'];

let temaActual = null;
let preguntasOrden = [];
let preguntaIdx = 0;
let opcionesShuffled = [];
let correctaIdx = 0;
let puntaje = 0;
let timerInterval = null;
let tiempoRestante = 0;
let respondido = false;
let completados = JSON.parse(localStorage.getItem('arCompletados') || '{}');

function renderMenu() {
  const grid = document.getElementById('gridTemas');
  grid.innerHTML = '';
  TEMAS.forEach(t => {
    const c = completados[t.id];
    const div = document.createElement('div');
    div.className = 'tema-btn' + (c ? ' completado' : '');
    div.innerHTML = `
      <div class="num">TEMA ${t.id}</div>
      <div class="nombre">${t.titulo.replace('T'+t.id+': ','')}</div>
      <div class="info">${t.preguntas.length} preguntas · 25 seg c/u${c ? ' · ✓ Jugado: '+c+'/'+t.preguntas.length : ''}</div>
    `;
    div.onclick = () => iniciarTema(t.id);
    grid.appendChild(div);
  });
}

function iniciarTema(id) {
  temaActual = TEMAS.find(t => t.id === id);
  preguntasOrden = shuffleArr([...temaActual.preguntas]);
  preguntaIdx = 0;
  puntaje = 0;
  document.getElementById('menuScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';
  document.getElementById('tituloActual').textContent = temaActual.titulo;
  mostrarPregunta();
}

function mostrarPregunta() {
  respondido = false;
  clearInterval(timerInterval);
  
  const q = preguntasOrden[preguntaIdx];
  document.getElementById('preguntaNum').textContent = 'Pregunta ' + (preguntaIdx+1) + ' de ' + preguntasOrden.length;
  document.getElementById('preguntaTexto').textContent = q.p;
  document.getElementById('progresoActual').textContent = (preguntaIdx+1) + '/' + preguntasOrden.length;
  
  // Shuffle options keeping track of correct
  const opcs = q.o.map((text, i) => ({text, correct: i === q.c}));
  opcionesShuffled = shuffleArr(opcs);
  correctaIdx = opcionesShuffled.findIndex(o => o.correct);
  
  const cont = document.getElementById('opcionesContainer');
  cont.innerHTML = '';
  opcionesShuffled.forEach((op, i) => {
    const btn = document.createElement('button');
    btn.className = 'opcion-btn';
    btn.innerHTML = `<span class="letra">${letras[i]}</span><span>${op.text}</span>`;
    btn.onclick = () => responder(i);
    cont.appendChild(btn);
  });
  
  document.getElementById('feedbackDiv').style.display = 'none';
  document.getElementById('btnSiguiente').style.display = 'none';
  
  iniciarTimer();
}

function iniciarTimer() {
  tiempoRestante = TIEMPO;
  actualizarTimer();
  timerInterval = setInterval(() => {
    tiempoRestante--;
    actualizarTimer();
    if (tiempoRestante <= 0) {
      clearInterval(timerInterval);
      tiempoAgotado();
    }
  }, 1000);
}

function actualizarTimer() {
  const pct = (tiempoRestante / TIEMPO) * 100;
  const bar = document.getElementById('timerBar');
  bar.style.width = pct + '%';
  if (tiempoRestante > 15) bar.style.background = 'var(--timer-ok)';
  else if (tiempoRestante > 8) bar.style.background = 'var(--timer-warn)';
  else bar.style.background = 'var(--timer-danger)';
  document.getElementById('timerNum').textContent = tiempoRestante + 's';
}

function tiempoAgotado() {
  if (respondido) return;
  respondido = true;
  deshabilitarOpciones();
  marcarCorrecta();
  const fb = document.getElementById('feedbackDiv');
  fb.className = 'feedback tiempo';
  fb.textContent = '⏱ Tiempo agotado. La respuesta correcta era: ' + opcionesShuffled[correctaIdx].text;
  fb.style.display = 'block';
  document.getElementById('btnSiguiente').style.display = 'block';
}

function responder(idx) {
  if (respondido) return;
  respondido = true;
  clearInterval(timerInterval);
  
  const btns = document.querySelectorAll('.opcion-btn');
  btns.forEach(b => b.disabled = true);
  
  const fb = document.getElementById('feedbackDiv');
  if (idx === correctaIdx) {
    puntaje++;
    btns[idx].classList.add('correcto');
    fb.className = 'feedback correcto';
    fb.textContent = '✅ ¡Correcto!';
  } else {
    btns[idx].classList.add('incorrecto');
    marcarCorrecta();
    fb.className = 'feedback incorrecto';
    fb.textContent = '❌ Incorrecto. La respuesta es: ' + opcionesShuffled[correctaIdx].text;
  }
  fb.style.display = 'block';
  document.getElementById('btnSiguiente').style.display = 'block';
}

function marcarCorrecta() {
  const btns = document.querySelectorAll('.opcion-btn');
  btns[correctaIdx].classList.add('correcto');
}

function deshabilitarOpciones() {
  document.querySelectorAll('.opcion-btn').forEach(b => b.disabled = true);
}

function siguiente() {
  preguntaIdx++;
  if (preguntaIdx >= preguntasOrden.length) {
    mostrarResultado();
  } else {
    mostrarPregunta();
  }
}

function mostrarResultado() {
  clearInterval(timerInterval);
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'flex';
  
  const total = preguntasOrden.length;
  const pct = Math.round((puntaje / total) * 100);
  
  completados[temaActual.id] = puntaje;
  localStorage.setItem('arCompletados', JSON.stringify(completados));
  
  document.getElementById('resultTema').textContent = temaActual.titulo;
  document.getElementById('resultPuntaje').textContent = puntaje;
  document.getElementById('resultTotal').textContent = 'de ' + total + ' preguntas correctas (' + pct + '%)';
  
  setTimeout(() => {
    document.getElementById('barraFill').style.width = pct + '%';
    document.getElementById('barraFill').style.background = pct >= 70 ? 'var(--correct)' : pct >= 50 ? 'var(--gold)' : 'var(--wrong)';
  }, 200);
  
  let msg, badge;
  if (pct >= 90) { msg = '🏆 ¡Excelente! Dominás el tema.'; badge = '<span class="badge badge-excelente">EXCELENTE</span>'; }
  else if (pct >= 70) { msg = '👍 ¡Muy bien! Seguí repasando.'; badge = '<span class="badge badge-bien">MUY BIEN</span>'; }
  else if (pct >= 50) { msg = '📚 Bien, pero conviene repasar.'; badge = '<span class="badge badge-bien">REGULAR</span>'; }
  else { msg = '💪 Necesitás repasar este tema.'; badge = '<span class="badge badge-regular">A REPASAR</span>'; }
  
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultBadge').innerHTML = badge;
}

function reintentar() {
  document.getElementById('resultScreen').style.display = 'none';
  iniciarTema(temaActual.id);
}

function volverMenu() {
  clearInterval(timerInterval);
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('menuScreen').style.display = 'flex';
  renderMenu();
}

function shuffleArr(arr) {
  return arr.map(v => [Math.random(), v]).sort((a,b) => a[0]-b[0]).map(v => v[1]);
}

// Init
renderMenu();
</script>
