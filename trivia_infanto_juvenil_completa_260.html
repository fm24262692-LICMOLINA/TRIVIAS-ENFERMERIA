const allQ = [
// ─── TEMA 1 ─── Salud Infanto Juvenil y Pediatría (13)
{t:0,q:"¿Qué es la Pediatría como rama médica?",opts:["Rama que estudia exclusivamente enfermedades infecciosas en adultos mayores","Ciencia médica que se ocupa de la salud, el crecimiento y el desarrollo del niño desde el nacimiento hasta la adolescencia","Especialidad enfocada solo en el tratamiento quirúrgico de malformaciones congénitas","Rama que estudia la nutrición y la alimentación del niño menor de 2 años"],a:1},
{t:0,q:"¿Cuáles son los factores que influyen en la salud infanto juvenil?",opts:["Solo factores genéticos y hereditarios sin influencia del entorno","Factores fisiológicos, económicos y culturales interactúan para determinar la salud del niño","Únicamente factores ambientales físicos como el clima y la temperatura","Solo la alimentación y la actividad física son factores determinantes"],a:1},
{t:0,q:"¿Qué contempla el ámbito que abarca la Pediatría?",opts:["Solo la atención hospitalaria del niño enfermo durante la internación","La atención del niño sano y enfermo en todos los ámbitos: preventivo, diagnóstico, tratamiento y rehabilitación","Solo el diagnóstico y el tratamiento de enfermedades pediátricas agudas","Únicamente la atención del recién nacido en la primera semana de vida"],a:1},
{t:0,q:"¿Cuál es la situación actual de la salud infanto juvenil en Argentina?",opts:["La mortalidad infantil ha desaparecido por completo gracias a las vacunas","Existen desigualdades regionales importantes con altas tasas de mortalidad infantil en provincias más vulnerables y diferencias entre lo urbano y lo rural","La salud infantil es homogénea en todo el país sin diferencias regionales","Solo las grandes ciudades tienen problemas de salud infantil, no las zonas rurales"],a:1},
{t:0,q:"¿Qué estudia la reserva histórica de la Pediatría?",opts:["Solo los avances tecnológicos en diagnóstico pediátrico de los últimos 10 años","La evolución histórica del concepto de infancia, los aportes de grandes pediatras y la consolidación de la especialidad como ciencia","Solo la estadística de enfermedades infantiles sin los aspectos históricos","Únicamente la historia de las vacunas y la inmunización pediátrica"],a:1},
{t:0,q:"¿Cuál es el rol de la enfermera/o en la atención infanto juvenil?",opts:["Solo administrar medicamentos indicados por el médico sin otras funciones","Brindar cuidados integrales al niño enfermo, realizar educación a la familia, prevención, promoción y acompañamiento durante la hospitalización","Solo vigilar al niño durante la noche sin intervenciones directas de cuidado","Únicamente tomar signos vitales y registrar datos sin otras acciones de enfermería"],a:1},
{t:0,q:"¿Qué factores económicos influyen negativamente en la salud infanto juvenil?",opts:["La riqueza económica siempre garantiza la buena salud del niño","Pobreza, desnutrición, hacinamiento, falta de acceso a agua potable y servicios de salud incrementan la morbimortalidad infantil","Solo el desempleo de los padres sin otras variables económicas relevantes","Únicamente el nivel de educación de los padres sin factores económicos directos"],a:1},
{t:0,q:"¿Qué factores culturales influyen en la salud del niño?",opts:["Los factores culturales no tienen influencia en la salud infantil","Creencias sobre alimentación, crianza, uso de medicina tradicional, acceso a servicios de salud y prácticas de higiene moldean la salud del niño","Solo la religión de la familia sin otras variables culturales importantes","Únicamente el nivel educativo de la madre sin otros factores culturales"],a:1},
{t:0,q:"¿Qué es la mortalidad infantil y cuáles son sus principales causas en Argentina?",opts:["Es la muerte de personas mayores de 65 años; causas: enfermedades crónicas","Muerte de niños menores de 1 año por cada 1000 nacidos vivos; causas principales: afecciones perinatales, malformaciones congénitas, infecciones y causas externas","Es solo la muerte de recién nacidos en la primera semana de vida","Solo enfermedades infecciosas sin malformaciones ni causas perinatales"],a:1},
{t:0,q:"¿Cuál es la diferencia entre mortalidad neonatal y posneonatal?",opts:["Son términos sinónimos sin diferencia conceptual ni estadística","La mortalidad neonatal ocurre en los primeros 28 días de vida; la posneonatal entre los 29 días y el primer año, con causas y factores distintos","La mortalidad neonatal ocurre en el primer año y la posneonatal entre 1 y 5 años","Solo se diferencia por el sexo del niño sin importar la edad de fallecimiento"],a:1},
{t:0,q:"¿Qué son los programas de salud infanto juvenil provinciales?",opts:["Solo programas de vacunación sin otras intervenciones de salud","Conjunto de acciones organizadas por el Estado para reducir la mortalidad, mejorar la nutrición, promover la lactancia y garantizar el desarrollo integral del niño","Solo hospitales pediátricos sin programas preventivos en la comunidad","Únicamente controles médicos anuales sin seguimiento continuo del desarrollo"],a:1},
{t:0,q:"¿Qué comprende la atención del niño sano?",opts:["Solo la atención cuando el niño está enfermo y necesita hospitalización","Controles de crecimiento y desarrollo, vacunación, educación a la familia, prevención de enfermedades y promoción de la salud en cada etapa de la infancia","Solo la administración de vitaminas y suplementos nutricionales","Únicamente el examen físico anual sin otras intervenciones preventivas"],a:1},
{t:0,q:"¿Cómo impacta la cultura en el acceso a los servicios de salud pediátricos?",opts:["La cultura no tiene ningún impacto en el acceso a los servicios de salud","Barreras idiomáticas, creencias sobre la enfermedad, desconfianza en el sistema médico y tradiciones familiares pueden limitar o retrasar la búsqueda de atención para el niño","Solo el nivel económico determina el acceso sin influencia de factores culturales","Únicamente la distancia geográfica limita el acceso sin factores culturales"],a:1},

// ─── TEMA 2 ─── Proceso Salud-Enfermedad en Pediatría (13)
{t:1,q:"¿Cómo se define el proceso salud-enfermedad en pediatría?",opts:["Solo como la presencia o ausencia de enfermedades diagnosticadas por el médico","Proceso dinámico influenciado por factores biológicos, ambientales y sociales donde la salud y la enfermedad coexisten como un continuo en el niño","Solo como el estado nutricional del niño evaluado por su peso y talla","Únicamente como la presencia o ausencia de infecciones en la infancia"],a:1},
{t:1,q:"¿Qué significa conservar el equilibrio en salud pediátrica?",opts:["Mantener al niño en reposo absoluto para evitar enfermedades","Mantener el balance entre los factores protectores y los factores de riesgo que influyen en el bienestar físico, psíquico y social del niño","Solo dar medicamentos preventivos para evitar todo tipo de enfermedad","Únicamente controlar la alimentación sin otros aspectos del equilibrio"],a:1},
{t:1,q:"¿Qué comprende la promoción de la salud en pediatría?",opts:["Solo la vacunación y la administración de vitaminas al niño sano","Conjunto de acciones para que los niños y sus familias adopten estilos de vida saludables, conozcan sus derechos y accedan a entornos seguros que favorezcan el desarrollo","Solo la atención de enfermedades en fase temprana para evitar complicaciones","Únicamente la educación en el consultorio sin acción comunitaria"],a:1},
{t:1,q:"¿Cuáles son los factores de riesgo más importantes en la infancia?",opts:["Solo la falta de vacunación es factor de riesgo en la infancia","Desnutrición, pobreza, hacinamiento, falta de acceso a agua segura, violencia familiar, falta de controles médicos y exposición a contaminantes ambientales","Solo la predisposición genética sin factores ambientales ni sociales","Únicamente las enfermedades infecciosas sin otros factores de riesgo"],a:1},
{t:1,q:"¿Cómo impacta la enfermedad como fenómeno social en la niñez?",opts:["La enfermedad solo tiene impacto biológico sin consecuencias sociales","Genera ausencia escolar, afecta el desarrollo, altera dinámicas familiares, produce gastos económicos y puede perpetuar ciclos de pobreza si no se trata adecuadamente","Solo afecta al niño enfermo sin consecuencias para la familia ni la comunidad","Únicamente tiene impacto durante la hospitalización sin efectos a largo plazo"],a:1},
{t:1,q:"¿Cuál es el impacto de la enfermedad en la familia del niño enfermo?",opts:["La familia no se ve afectada por la enfermedad del niño","Genera estrés, modificación de rutinas, impacto económico, alteración del vínculo fraterno y necesidad de reorganización de roles en el hogar","Solo afecta emocionalmente a la madre sin impacto en otros miembros","Únicamente modifica la alimentación familiar sin otros efectos"],a:1},
{t:1,q:"¿Qué es la prevención de enfermedades en pediatría?",opts:["Solo el tratamiento precoz de enfermedades ya presentes en el niño","Conjunto de medidas para evitar que los niños enfermen, detectar precozmente las enfermedades y minimizar sus consecuencias mediante acciones en distintos niveles","Solo la vacunación como única medida preventiva en pediatría","Únicamente la educación alimentaria sin otras acciones preventivas"],a:1},
{t:1,q:"¿Cómo afecta la enfermedad al adolescente en su desarrollo?",opts:["La enfermedad no tiene impacto especial en la etapa adolescente","Puede interferir con el proceso de identidad, la socialización, el rendimiento escolar, la imagen corporal y la construcción de la autonomía del joven","Solo afecta el rendimiento escolar sin otras consecuencias en el desarrollo","Únicamente produce cambios físicos sin impacto psicológico ni social"],a:1},
{t:1,q:"¿Qué rol tiene la comunidad en la prevención de enfermedades infantiles?",opts:["La comunidad no tiene rol; solo el sistema médico puede prevenir enfermedades","La comunidad organizada puede generar entornos seguros, redes de apoyo, identificación temprana de familias en riesgo y fortalecer las acciones preventivas del sistema de salud","Solo los maestros tienen rol preventivo sin otros actores comunitarios","Únicamente las organizaciones religiosas pueden ayudar en la prevención"],a:1},
{t:1,q:"¿Cuáles son los indicadores de salud más usados en pediatría?",opts:["Solo el peso y la talla como únicos indicadores de salud pediátrica","Mortalidad infantil, neonatal y posneonatal, desnutrición, cobertura de vacunación, morbilidad por enfermedades prevalentes y acceso a controles de salud","Solo la temperatura corporal y la frecuencia cardíaca como indicadores","Únicamente el nivel de hemoglobina en sangre como indicador de salud"],a:1},
{t:1,q:"¿Qué se entiende por enfermedad como impacto social en la comunidad?",opts:["La enfermedad solo impacta individualmente sin efectos comunitarios","Brotes epidémicos, ausentismo escolar y laboral, sobrecarga del sistema de salud y aumento de la morbimortalidad afectan a toda la comunidad cuando las enfermedades no son controladas","Solo afecta a las familias pobres sin impacto en otras clases sociales","Únicamente produce impacto en la etapa neonatal sin efectos comunitarios mayores"],a:1},
{t:1,q:"¿Cuáles son las principales acciones de enfermería en promoción de salud pediátrica?",opts:["Solo administrar medicamentos preventivos sin otras acciones de enfermería","Educación a familias, visitas domiciliarias, control de crecimiento y desarrollo, orientación sobre lactancia, vacunación y detección temprana de factores de riesgo","Solo tomar signos vitales y registrar datos sin intervenciones preventivas","Únicamente derivar al médico sin intervención directa de la enfermera"],a:1},
{t:1,q:"¿Qué es la salud en la infancia desde un enfoque integral?",opts:["Solo ausencia de enfermedades diagnosticadas por laboratorio o imágenes","Estado de bienestar físico, psíquico, social y espiritual del niño que le permite crecer, desarrollarse y participar activamente en su entorno familiar y comunitario","Solo el adecuado peso y talla para la edad sin otros aspectos del bienestar","Únicamente la ausencia de fiebre y síntomas físicos observables"],a:1},

{t:2,q:"¿Qué es la inmunidad en el niño y cuáles son sus tipos?",opts:["Solo la inmunidad adquirida por vacunación sin otros tipos posibles","La capacidad del organismo de defenderse ante agentes extraños; tipos: innata (al nacer) y adquirida (activa por enfermedad o vacuna; pasiva por transferencia materna o inmunoglobulinas)","Solo la inmunidad innata sin posibilidad de adquirir inmunidad durante la vida","Únicamente la inmunidad pasiva transferida por la madre durante la lactancia"],a:1},
{t:2,q:"¿Cuáles son las enfermedades prevalentes en la niñez según el programa?",opts:["Solo enfermedades metabólicas y endocrinas sin enfermedades infecciosas","Infecciones respiratorias, diarreicas, inmunoprevenibles, desnutrición y enfermedades dermatológicas como las más frecuentes en la infancia","Solo enfermedades cardíacas congénitas sin enfermedades infecciosas","Únicamente enfermedades neurológicas sin otras patologías prevalentes"],a:1},
{t:2,q:"¿Qué son las vacunas y cuál es su mecanismo de acción?",opts:["Son medicamentos que curan enfermedades ya existentes en el organismo","Preparados biológicos que estimulan el sistema inmune para producir anticuerpos protectores sin causar la enfermedad, generando memoria inmunológica de larga duración","Son solo vitaminas reforzadas que mejoran las defensas del organismo","Son antibióticos preventivos que eliminan bacterias antes de que causen enfermedad"],a:1},
{t:2,q:"¿Cómo se conservan correctamente las vacunas?",opts:["A temperatura ambiente entre 18-25°C sin necesidad de refrigeración","En cadena de frío entre 2-8°C para la mayoría de las vacunas; algunas requieren congelación; nunca deben exponerse al calor ni a la luz directa del sol","A temperatura de congelación en todo momento sin excepción alguna","Solo en recipientes oscuros a temperatura ambiente sin refrigeración"],a:1},
{t:2,q:"¿Qué es la cadena de frío en vacunación y por qué es fundamental?",opts:["Solo el transporte en heladera durante pocas horas sin controles especiales","Sistema de procedimientos para mantener las vacunas a la temperatura adecuada desde su producción hasta su aplicación; su ruptura puede inactivar las vacunas haciéndolas ineficaces","Solo la refrigeración en el centro de salud sin consideraciones durante el transporte","Es irrelevante porque las vacunas modernas son estables a cualquier temperatura"],a:1},
{t:2,q:"¿Qué incluye el Calendario Nacional de Vacunación en Argentina para niños?",opts:["Solo BCG y polio como únicas vacunas obligatorias para los niños","BCG, hepatitis B, pentavalente, antipolio, rotavirus, neumococo, meningococo, varicela, triple viral, hepatitis A, fiebre amarilla y otras según grupo de riesgo y edad","Solo vacunas contra enfermedades respiratorias sin otras obligatorias","Únicamente vacunas contra enfermedades digestivas sin vacunas respiratorias"],a:1},
{t:2,q:"¿Qué son las enfermedades inmunoprevenibles?",opts:["Enfermedades que no pueden prevenirse con ninguna medida sanitaria","Enfermedades infecciosas que pueden evitarse mediante la vacunación; ejemplos: sarampión, polio, difteria, tétanos, tos convulsa, varicela y hepatitis","Solo enfermedades crónicas que se controlan con medicación permanente","Únicamente enfermedades autoinmunes que se previenen con dieta"],a:1},
{t:2,q:"¿Qué es la bioseguridad en el contexto de la vacunación pediátrica?",opts:["Solo el uso de guantes durante la aplicación de vacunas","Conjunto de normas y procedimientos para proteger al vacunador y al niño: uso de descartables, eliminación segura de residuos patógenos, higiene de manos y manejo adecuado de material biológico","Solo la esterilización del material sin otras medidas de seguridad","Únicamente el uso de barbijo sin otros elementos de protección personal"],a:1},
{t:2,q:"¿Cuáles son las contraindicaciones más frecuentes para la vacunación?",opts:["La fiebre leve y los resfríos comunes siempre contraindican la vacunación","Reacciones anafilácticas previas a componentes de la vacuna, inmunodeficiencias graves para vacunas vivas, y embarazo para algunas vacunas; la fiebre leve no contraindica","Cualquier enfermedad leve del niño contraindica la vacunación hasta su curación","Solo la alergia al huevo contraindica todas las vacunas del calendario"],a:1},
{t:2,q:"¿Qué es la epidemiología de las enfermedades en la niñez?",opts:["Solo el estudio de enfermedades infecciosas en hospitales pediátricos","Estudio de la distribución, frecuencia y determinantes de las enfermedades en la población infantil para planificar acciones de prevención y control más efectivas","Solo el conteo de casos de una enfermedad sin análisis de causas","Únicamente la vigilancia de brotes epidémicos sin análisis preventivo"],a:1},
{t:2,q:"¿Cómo se mide la cobertura de vacunación y por qué es importante?",opts:["Solo por el número absoluto de vacunas aplicadas sin relación con la población","Porcentaje de niños vacunados respecto al total esperado; es clave para alcanzar la inmunidad de rebaño y prevenir brotes de enfermedades inmunoprevenibles","Solo se mide en hospitales sin incluir los centros de atención primaria","Únicamente al final del año sin seguimiento mensual de la cobertura"],a:1},
{t:2,q:"¿Cuáles son los efectos adversos más frecuentes de las vacunas en el niño?",opts:["Las vacunas no producen ningún efecto adverso en ningún niño","Eritema y dolor en el sitio de aplicación, fiebre leve, irritabilidad y malestar general; son transitorios; las reacciones graves como anafilaxia son muy poco frecuentes","Siempre producen fiebre alta de más de 40°C que requiere hospitalización","Solo producen erupciones cutáneas generalizadas que duran más de una semana"],a:1},
{t:2,q:"¿Cuál es el rol del enfermero en el Programa de Vacunación Infantil?",opts:["Solo aplicar las vacunas sin funciones de educación ni registro","Aplicar vacunas con técnica correcta, conservar la cadena de frío, registrar en el carnet, educar a los padres, reportar efectos adversos y monitorear la cobertura vacunal","Solo registrar las vacunas aplicadas sin otras responsabilidades de enfermería","Únicamente ordenar el stock de vacunas sin contacto directo con el niño"],a:1},

// ─── TEMA 4 ─── Valoración del Crecimiento y Desarrollo (13)
{t:3,q:"¿Qué es el crecimiento y cómo se evalúa en el niño?",opts:["Solo el aumento de peso sin considerar la talla ni otros parámetros","Aumento de la masa corporal por multiplicación y diferenciación celular; se evalúa con peso, talla, perímetro cefálico y comparación con tablas percentilar de referencia","Solo la talla para la edad sin otros indicadores de crecimiento","Únicamente el perímetro cefálico en los primeros 6 meses de vida"],a:1},
{t:3,q:"¿Qué es el desarrollo en la infancia y cómo se valora?",opts:["Solo el aumento de la talla a lo largo del tiempo como único indicador","Proceso de maduración progresiva de las funciones motoras, del lenguaje, cognitivas y socioafectivas; se valora con pruebas como el Test de Denver, Bayley y observación clínica","Solo el desarrollo del lenguaje sin evaluar otras áreas del desarrollo","Únicamente el peso corporal como indicador del desarrollo del niño"],a:1},
{t:3,q:"¿Cuál es la secuencia correcta del examen físico en el niño?",opts:["Primero la auscultación, luego la percusión, la palpación y la inspección","Examen cefalocaudal: inspección general, cabeza, cuello, tórax, abdomen, genitales, extremidades y sistema nervioso; adaptando la técnica a la edad y cooperación del niño","Solo explorar los órganos que refiera el paciente o su familiar","Únicamente medir peso y talla sin realizar examen físico completo"],a:1},
{t:3,q:"¿Cuáles son las pruebas diagnósticas más usadas en la niñez y adolescencia?",opts:["Solo análisis de sangre y orina sin otras pruebas diagnósticas","Hemograma, glucemia, orina completa, radiografías, ecografías, Test de tuberculina, cultivos, electrocardiograma y pruebas de desarrollo psicomotor según la patología sospechada","Solo tomografías computadas como prueba diagnóstica de elección","Únicamente pruebas serológicas sin pruebas de imagen ni de laboratorio clínico"],a:1},
{t:3,q:"¿Cómo se evalúan las necesidades básicas del niño en la valoración?",opts:["Solo las necesidades de alimentación e hidratación sin otras necesidades","Se evalúan las 14 necesidades básicas de Henderson adaptadas a la infancia: respiración, nutrición, hidratación, eliminación, movimiento, sueño, temperatura, higiene, seguridad, comunicación, valores y juego","Solo las necesidades físicas sin las psicológicas ni espirituales del niño","Únicamente las necesidades que refieran los padres sin valoración objetiva"],a:1},
{t:3,q:"¿Cuáles son los hitos del desarrollo motor grueso en el primer año de vida?",opts:["Caminar a los 6 meses como hito normal del desarrollo motor grueso","Control cefálico (3 meses), girar sobre sí mismo (5-6 meses), sentarse solo (7-8 meses), gatear (9-10 meses) y primeros pasos (12 meses aproximadamente)","Caminar y correr en los primeros 3 meses como desarrollo normal","Solo el control cefálico al mes de vida como único hito del primer año"],a:1},
{t:3,q:"¿Cómo se interpreta la curva de crecimiento con los percentiles?",opts:["Solo el percentil 50 es normal; cualquier otro valor indica enfermedad","Los percentiles 3 a 97 son considerados normales; un niño por debajo del percentil 3 o una desaceleración del crecimiento requieren evaluación más detallada","Solo el percentil 100 indica crecimiento adecuado en todos los niños","Únicamente el peso al nacer determina el crecimiento posterior sin necesidad de seguimiento"],a:1},
{t:3,q:"¿Cuáles son los sistemas generales para examinar al niño?",opts:["Solo el sistema cardiovascular y el respiratorio como prioritarios","Inspección, palpación, percusión y auscultación adaptadas a la edad; se usa juego, distractores y posiciones cómodas para facilitar la cooperación del niño durante el examen","Solo la inspección visual sin necesidad de palpación ni auscultación","Únicamente auscultación cardíaca y medición de presión arterial"],a:1},
{t:3,q:"¿Cuál es la importancia del perímetro cefálico en la evaluación del lactante?",opts:["No tiene relevancia diagnóstica en la evaluación del lactante","Refleja el crecimiento del cerebro; su aumento acelerado puede indicar hidrocefalia y su detención puede sugerir microcefalia o desnutrición grave; se mide hasta los 2 años","Solo se mide al nacer sin seguimiento posterior en los controles de salud","Únicamente se mide en niños con sospecha de enfermedad neurológica"],a:1},
{t:3,q:"¿Cómo se detectan las alteraciones del desarrollo psicomotor en el niño?",opts:["Solo cuando el niño tiene más de 5 años y el retraso es evidente","Mediante observación del cumplimiento de hitos del desarrollo en cada control, pruebas estandarizadas como el Test de Denver y valoración de señales de alarma desde los primeros meses","Solo con estudios de imagen cerebral sin observación clínica del desarrollo","Únicamente si los padres refieren preocupación sin evaluación sistemática"],a:1},
{t:3,q:"¿Cuáles son las señales de alarma en el desarrollo del lactante?",opts:["Solo la ausencia de la sonrisa social al mes de vida como señal de alarma","Ausencia de sonrisa social a los 3 meses, no sostener la cabeza a los 4 meses, no sentarse a los 9 meses, no decir bisílabos a los 12 meses y pérdida de habilidades ya adquiridas","Solo el llanto excesivo sin otras señales de alarma en el desarrollo","Únicamente la falta de marcha al año como única señal de alarma"],a:1},
{t:3,q:"¿Qué es la antropometría y qué parámetros incluye en pediatría?",opts:["Solo la medición del peso como único parámetro antropométrico","Medición de dimensiones corporales: peso, talla/longitud, perímetro cefálico, perímetro braquial y pliegues cutáneos; comparados con tablas de referencia para evaluar el estado nutricional y el crecimiento","Solo la talla y el peso sin otros parámetros corporales en niños","Únicamente el índice de masa corporal sin otros parámetros antropométricos"],a:1},
{t:3,q:"¿Cuál es la importancia de la satisfacción de las necesidades básicas en el crecimiento del niño?",opts:["Las necesidades básicas no influyen en el crecimiento ni en el desarrollo","La satisfacción adecuada de necesidades de nutrición, afecto, estimulación, sueño y seguridad es indispensable para que el niño alcance su potencial máximo de crecimiento y desarrollo","Solo la nutrición sin otros aspectos de las necesidades básicas influye en el crecimiento","Únicamente el sueño nocturno es determinante del crecimiento del niño"],a:1},

// ─── TEMA 5 ─── Hospitalización del Niño y su Familia (13)
{t:4,q:"¿Cuál es el impacto de la hospitalización en el niño pequeño?",opts:["La hospitalización no tiene impacto en el niño porque no comprende lo que ocurre","Genera ansiedad de separación, miedo al abandono, regresión en el desarrollo, alteraciones del sueño y de la alimentación, y sentimientos de culpa y confusión","Solo produce miedo a las agujas sin otras consecuencias psicológicas","Únicamente produce tristeza pasajera que desaparece al volver a casa"],a:1},
{t:4,q:"¿Cómo impacta la hospitalización en la familia del niño?",opts:["La familia no se ve afectada por la hospitalización de su hijo","Genera estrés, ansiedad, sentimientos de culpa, reorganización familiar, impacto económico, conflictos de pareja y alteración de rutinas de los hermanos del niño internado","Solo afecta a la madre sin impacto en el resto de la familia","Únicamente produce gastos económicos sin consecuencias emocionales en la familia"],a:1},
{t:4,q:"¿Cuáles son las acciones de enfermería en el ingreso del niño?",opts:["Solo tomar los signos vitales y registrar en la historia clínica","Recibir al niño y su familia con calidez, completar la historia de enfermería, valorar al niño, orientar sobre normas de la sala, presentar el equipo, y colocar pulsera identificatoria","Solo administrar la medicación indicada al momento del ingreso","Únicamente pesar y tallar al niño sin otras acciones de acogida"],a:1},
{t:4,q:"¿Qué incluye la estadía hospitalaria del niño desde el punto de vista de enfermería?",opts:["Solo administrar medicamentos y controlar signos vitales durante la internación","Monitoreo clínico continuo, administración de tratamientos, educación continua a la familia, apoyo emocional al niño y familia, estimulación del desarrollo y coordinación con el equipo de salud","Solo la vigilancia nocturna sin intervenciones diurnas de enfermería","Únicamente los cuidados físicos sin atender las necesidades emocionales del niño"],a:1},
{t:4,q:"¿Qué consideraciones son esenciales en el egreso hospitalario del niño?",opts:["Solo dar el alta médica sin preparación del niño ni de la familia","Verificar comprensión de la medicación, indicar controles posteriores, educar sobre signos de alarma, gestionar la continuidad del cuidado y asegurar que la familia se sienta capaz del cuidado en el hogar","Solo entregar los papeles del alta sin educación a la familia","Únicamente indicar reposo domiciliario sin otras instrucciones al egreso"],a:1},
{t:4,q:"¿Qué es la historia clínica pediátrica y qué debe contener?",opts:["Solo los diagnósticos médicos y la medicación administrada durante la internación","Documento legal y científico que contiene: identificación del paciente, motivo de consulta, antecedentes perinatales y familiares, evolución, diagnósticos, tratamientos, evolución de enfermería y alta","Solo los signos vitales registrados durante la internación sin otros datos","Únicamente el diagnóstico médico y la fecha de ingreso y egreso"],a:1},
{t:4,q:"¿Cuáles son los aspectos legales más importantes en enfermería pediátrica?",opts:["La enfermera no tiene responsabilidad legal en la atención pediátrica","Consentimiento informado de los padres, confidencialidad, registro preciso y completo, deber de denuncia en casos de maltrato, y responsabilidad profesional en cada intervención realizada","Solo el consentimiento para cirugía sin aspectos legales en otros procedimientos","Únicamente el registro de la medicación como único aspecto legal relevante"],a:1},
{t:4,q:"¿Cuáles son los registros de enfermería más usados en la internación pediátrica?",opts:["Solo la planilla de medicación sin otros registros de enfermería","Historia de enfermería, balance hidroelectrolítico, registros de signos vitales, nota de evolución de enfermería, planilla de medicación y registro de procedimientos realizados","Solo la temperatura y la frecuencia cardíaca sin otros parámetros","Únicamente el diagnóstico médico registrado por el enfermero"],a:1},
{t:4,q:"¿Cuáles son los aspectos éticos fundamentales en enfermería pediátrica?",opts:["Solo la obediencia al médico como único principio ético de la enfermería","Beneficencia, no maleficencia, autonomía (respetando la voz del niño según su edad), justicia, veracidad, confidencialidad y trato digno e individualizado","Solo no causar daño físico sin otros principios éticos aplicables","Únicamente la honestidad con los padres sin considerar los derechos del niño"],a:1},
{t:4,q:"¿Cómo debe la enfermera apoyar emocionalmente al niño durante la hospitalización?",opts:["La enfermera no debe involucrarse emocionalmente con el niño hospitalizado","Usando lenguaje apropiado a su edad, juego terapéutico, explicar procedimientos con anticipación, permitir la presencia de los padres, respetar sus miedos y brindar contención continua","Solo realizando procedimientos rápidos para minimizar el tiempo de contacto","Únicamente informando a los padres sin hablar directamente con el niño"],a:1},
{t:4,q:"¿Qué estrategias se usan para minimizar el impacto de la hospitalización en el niño?",opts:["No existen estrategias; la hospitalización siempre produce daño inevitable","Sala de juegos, presencia continua de los padres, humanización del espacio, explicación anticipada de procedimientos, minimizar separaciones y respetar rutinas del hogar","Solo la sedación farmacológica para reducir la ansiedad del niño hospitalizado","Únicamente pinturas y juguetes en la habitación sin otras estrategias de humanización"],a:1},
{t:4,q:"¿Qué derechos tiene el niño hospitalizado?",opts:["El niño hospitalizado no tiene derechos especiales por estar enfermo","Derecho a la atención humanizada, presencia de sus padres, juego, privacidad, información comprensible, no sufrir dolor innecesario, participar en decisiones según su madurez y a la confidencialidad","Solo tiene derecho a recibir medicamentos y atención médica","Únicamente tiene derecho a visitas familiares sin otros derechos reconocidos"],a:1},
{t:4,q:"¿Qué información deben recibir los padres al ingreso del niño?",opts:["Solo el diagnóstico médico sin información sobre rutinas ni cuidados de enfermería","Normas de la sala, horario de visitas, personal de salud responsable, plan de tratamiento, cómo participar en el cuidado del niño y a quién consultar ante cualquier preocupación","Solo el nombre del médico tratante sin otra información sobre la internación","Únicamente el número de cama y el horario de comidas sin más información"],a:1},

// ─── TEMA 6 ─── El Niño con Problemas de Nutrición (13)
{t:5,q:"¿Qué es el marasmo y cuáles son sus características?",opts:["Déficit grave de proteínas con edema y apariencia de luna llena en el niño","Desnutrición calórico-proteica grave con pérdida severa de masa muscular y grasa subcutánea, aspecto de 'piel y huesos', irritabilidad e inmunodepresión","Solo déficit de vitamina D que produce deformidades óseas en el niño","Únicamente déficit de hierro con anemia y palidez extrema del niño"],a:1},
{t:5,q:"¿Qué es el Kwashiorkor y en qué se diferencia del marasmo?",opts:["Son exactamente lo mismo con el mismo tratamiento y pronóstico","El Kwashiorkor es déficit proteico con aporte calórico relativamente conservado; produce edema, pelo rojo y quebradizo, dermatosis, apatía y cara de luna llena; el marasmo es déficit calórico-proteico global sin edema","Solo se diferencian por el agente causante sin diferencias clínicas","El Kwashiorkor es una infección parasitaria y el marasmo es una alergia alimentaria"],a:1},
{t:5,q:"¿Cuáles son los signos clínicos del Kwashiorkor?",opts:["Solo pérdida de peso sin otros signos clínicos específicos","Edema (principal signo), pelo decolorado y quebradizo, dermatosis de piel, distensión abdominal, hepatomegalia, anorexia, irritabilidad y retraso del crecimiento","Solo fiebre alta y tos como signos clínicos principales del Kwashiorkor","Únicamente ictericia y coluria sin otros signos clínicos del trastorno"],a:1},
{t:5,q:"¿Qué es la obesidad infantil y cuáles son sus factores de riesgo?",opts:["Solo un problema estético sin consecuencias para la salud del niño","Exceso de grasa corporal que compromete la salud; factores de riesgo: dieta hipercalórica, sedentarismo, antecedentes familiares, uso excesivo de pantallas y ambiente obesogénico","Solo herencia genética sin influencia de factores ambientales ni alimentarios","Únicamente el consumo excesivo de azúcar sin otros factores de riesgo"],a:1},
{t:5,q:"¿Qué es el raquitismo y por qué se produce en el niño?",opts:["Enfermedad infecciosa que afecta el sistema óseo del niño","Trastorno del metabolismo óseo por déficit de vitamina D que produce mineralización inadecuada de los huesos con deformidades óseas como piernas en O o X, rosario raquítico y fontanela tardía","Solo déficit de calcio sin relación con la vitamina D ni con la exposición solar","Únicamente falta de hierro que produce deformidades óseas en el niño"],a:1},
{t:5,q:"¿Cuáles son los cuidados de enfermería en el niño con desnutrición?",opts:["Solo administrar suplementos vitamínicos sin otras intervenciones de enfermería","Valoración nutricional completa, monitoreo del peso y la talla, supervisión de la alimentación, educación a la familia sobre dieta adecuada, control de complicaciones y apoyo emocional al niño y su familia","Solo pesar al niño sin otras intervenciones de enfermería nutricional","Únicamente administrar alimentación parenteral sin educación familiar"],a:1},
{t:5,q:"¿Qué es la anorexia en la infancia y cómo se aborda?",opts:["Solo la falta de apetito transitoria sin consecuencias para el desarrollo","Rechazo persistente a comer que puede tener causas orgánicas o psicológicas; requiere evaluación multidisciplinaria, educación a los padres sobre conductas alimentarias y abordaje psicológico si es necesario","Solo un problema de conducta sin relación con factores emocionales ni orgánicos","Únicamente una enfermedad adulta sin presentación real en la infancia"],a:1},
{t:5,q:"¿Qué es la bulimia y cuáles son sus características en el adolescente?",opts:["Solo el consumo excesivo de alimentos sin vómitos ni compensación posterior","Trastorno de la conducta alimentaria con episodios de atracones seguidos de conductas compensatorias como vómitos, laxantes o ayuno, con sentimientos de culpa y vergüenza intensos","Es un trastorno exclusivo de adultos sin presentación en adolescentes","Solo produce pérdida de peso severa sin comportamientos compensatorios"],a:1},
{t:5,q:"¿Cómo se clasifica la desnutrición infantil?",opts:["Solo en leve y grave sin subdivisiones adicionales posibles","Por grado (leve, moderada, grave), por tipo (aguda con delgadez; crónica con talla baja; global con bajo peso) y por mecanismo (marasmo, Kwashiorkor, mixta)","Solo por la causa (orgánica vs. psicológica) sin gradación por severidad","Únicamente como desnutrición primaria o secundaria sin otras clasificaciones"],a:1},
{t:5,q:"¿Qué es la arteriosclerosis en relación con la infancia?",opts:["No existe arteriosclerosis en la infancia; es exclusiva de adultos mayores","Los factores de riesgo cardiovascular como la obesidad, la dieta inadecuada y el sedentarismo en la infancia pueden iniciar el proceso aterosclerótico que se manifiesta en la edad adulta","Solo afecta a niños con enfermedades cardíacas congénitas graves","Únicamente se produce por factores genéticos sin relación con el estilo de vida infantil"],a:1},
{t:5,q:"¿Cuáles son los trastornos del apetito más frecuentes en la niñez?",opts:["Solo la falta de apetito como único trastorno posible en la infancia","Anorexia (rechazo del alimento), hiperfagia (exceso), neofobia alimentaria, selectividad extrema y pica (ingesta de sustancias no comestibles) son los trastornos más relevantes","Solo el exceso de apetito sin otros trastornos en la infancia","Únicamente la náusea y el vómito como únicos trastornos del apetito"],a:1},
{t:5,q:"¿Cuál es el tratamiento del raquitismo en el niño?",opts:["Solo cirugía para corregir las deformidades óseas sin tratamiento médico","Suplementación con vitamina D y calcio, exposición solar adecuada, corrección dietética, tratamiento de las deformidades óseas y educación a la familia sobre prevención","Solo vacunación preventiva sin necesidad de suplementos vitamínicos","Únicamente fisioterapia para las deformidades sin suplementación vitamínica"],a:1},
{t:5,q:"¿Qué educación debe recibir la familia del niño con desnutrición?",opts:["Solo informar el diagnóstico sin educación nutricional a la familia","Preparación de alimentos nutritivos y accesibles, importancia de la lactancia materna, señales de alarma, control periódico del peso, higiene de los alimentos y recursos comunitarios disponibles","Solo indicar medicamentos sin educación sobre alimentación ni hábitos","Únicamente derivar al nutricionista sin intervención educativa de enfermería"],a:1},

// ─── TEMA 7 ─── Enfermedades del Aparato Digestivo (13)
{t:6,q:"¿Qué es el síndrome diarreico en el niño y cuáles son sus causas?",opts:["Solo una enfermedad bacteriana sin otras causas posibles en la infancia","Aumento de la frecuencia y disminución de la consistencia de las deposiciones; causas: virus (rotavirus), bacterias (E. coli, Salmonella), parásitos (Giardia), intolerancia alimentaria y uso de antibióticos","Solo viral sin posibilidad de causas bacterianas ni parasitarias en el niño","Únicamente por contaminación del agua sin otras causas reconocidas"],a:1},
{t:6,q:"¿Cuáles son los grados de deshidratación en el niño y cómo se evalúan?",opts:["Solo existe deshidratación grave sin grados intermedios posibles","Leve (pérdida <5% del peso, sed, irritabilidad), moderada (5-10%, ojos hundidos, mucosas secas, llanto sin lágrimas), grave (>10%, letargo, fontanela deprimida, oliguria severa)","Solo se evalúa por la cantidad de orina sin otros parámetros clínicos","Únicamente con análisis de laboratorio sin evaluación clínica del niño"],a:1},
{t:6,q:"¿Cuál es el tratamiento de la deshidratación leve a moderada en el niño?",opts:["Solo vía endovenosa inmediata en todos los grados de deshidratación","Sales de rehidratación oral (SRO): 50-100 ml/kg en 3-4 horas con monitoreo continuo; continuar la lactancia si aplica; solo si fracasa el tratamiento oral se pasa a vía endovenosa","Solo antibióticos orales sin aporte de líquidos en la deshidratación","Únicamente ayuno total y sueros endovenosos sin intentar la vía oral"],a:1},
{t:6,q:"¿Qué es el síndrome de mala absorción en el niño?",opts:["Solo una enfermedad infecciosa del intestino delgado por bacterias","Incapacidad del intestino para absorber adecuadamente nutrientes; causas: celiaquía, fibrosis quística, intolerancia a la lactosa; produce diarrea crónica, desnutrición y distensión abdominal","Solo un síntoma de reflujo sin relación con la absorción de nutrientes","Únicamente diarrea aguda sin impacto nutricional a largo plazo"],a:1},
{t:6,q:"¿Qué es el reflujo gastroesofágico en el niño y cuándo es patológico?",opts:["Siempre es patológico en cualquier cantidad en el niño menor de 2 años","El paso del contenido gástrico al esófago es fisiológico en lactantes; se vuelve patológico cuando produce síntomas como esofagitis, falta de medro, apnea o aspiraciones recurrentes","Solo es patológico si produce vómitos visibles con cada alimentación","Únicamente es relevante si produce pérdida de peso severa en el lactante"],a:1},
{t:6,q:"¿Cuáles son los cuidados de enfermería en el niño con apendicitis?",opts:["Solo administrar analgésicos y esperar la resolución espontánea","Preparación preoperatoria, control de signos vitales y dolor, vigilancia de peritonismo, ayuno, vía permeable, preparación para cirugía y cuidados postoperatorios con educación a la familia","Solo control del dolor sin preparación para cirugía ni cuidados postoperatorios","Únicamente administración de antibióticos sin preparación quirúrgica"],a:1},
{t:6,q:"¿Cuáles son los parásitos intestinales más frecuentes en niños de Argentina?",opts:["Solo Plasmodium (paludismo) sin parásitos intestinales en Argentina","Giardia lamblia, Enterobius vermicularis (oxiuros), Ascaris lumbricoides, Blastocystis hominis y Trichuris trichiura son los más frecuentes, asociados a déficit de higiene y agua contaminada","Solo Taenia solium sin otros parásitos intestinales relevantes en la infancia","Únicamente hongos intestinales como Candida sin parásitos en Argentina"],a:1},
{t:6,q:"¿Cuál es la clínica de la hepatitis viral en el niño y su tratamiento?",opts:["Siempre grave con insuficiencia hepática en todos los casos pediátricos","Fase preictérica con fatiga, fiebre, náuseas y vómitos; fase ictérica con ictericia, coluria y acolia; tratamiento: reposo, dieta hipograsa, hidratación y seguimiento; vacunación preventiva para A y B","Solo produce ictericia sin síntomas sistémicos previos en el niño","Únicamente requiere trasplante hepático en todos los niños afectados"],a:1},
{t:6,q:"¿Cómo se produce la hemorragia digestiva en el niño y cuáles son sus causas?",opts:["Solo por úlcera gástrica sin otras causas posibles en la infancia","Alta (hematemesis, melena): por esofagitis, varices, úlcera; baja (hematoquecia): por invaginación, poliposis, colitis, fisura anal o divertículo de Meckel; requiere evaluación urgente","Solo por trauma abdominal sin causas internas en el niño","Únicamente por infecciones bacterianas intestinales sin otras causas"],a:1},
{t:6,q:"¿Cuáles son las manifestaciones clínicas y el tratamiento de la úlcera péptica en niños?",opts:["Solo produce dolor de cabeza sin síntomas digestivos en el niño","Dolor abdominal epigástrico, náuseas, vómitos, pérdida de peso y posible sangrado; tratamiento: inhibidores de la bomba de protones, erradicación de H. pylori si está presente y dieta adecuada","Solo se presenta con hemorragia digestiva masiva sin síntomas previos","Únicamente requiere cirugía sin tratamiento médico previo"],a:1},
{t:6,q:"¿Cómo se trata la deshidratación grave en el niño?",opts:["Solo con sales de rehidratación oral en todos los grados de deshidratación","Vía endovenosa urgente con solución fisiológica 20 ml/kg en bolo; monitoreo estricto de signos vitales, diuresis y estado de conciencia; luego continuación con plan de hidratación ajustado","Solo con leche materna sin necesidad de líquidos endovenosos","Únicamente con antidiarreicos sin aporte de líquidos ni electrolitos"],a:1},
{t:6,q:"¿Cuáles son los cuidados de enfermería en el niño con diarrea y deshidratación?",opts:["Solo controlar la temperatura sin otras intervenciones de enfermería","Control de signos vitales y estado de hidratación, balance hídrico estricto, administración de SRO o soluciones EV, educación a la familia, higiene de manos y registros detallados","Solo administrar antibióticos sin control del balance hídrico","Únicamente administrar antieméticos sin control del estado de hidratación"],a:1},
{t:6,q:"¿Cuáles son los signos y síntomas de la apendicitis en el niño?",opts:["Solo fiebre alta sin dolor abdominal ni resistencia muscular","Dolor abdominal que migra a la fosa ilíaca derecha, fiebre, náuseas, vómitos, signo de Blumberg positivo, resistencia muscular y posición antiálgica en flexión; más inespecífico en menores de 5 años","Solo vómitos sin fiebre ni dolor abdominal localizado en el niño","Únicamente diarrea sin dolor abdominal ni signos peritoneales"],a:1},

// ─── TEMA 8 ─── Anomalías Congénitas (13)
{t:7,q:"¿Qué es el labio leporino y cuál es su tratamiento?",opts:["Infección bacteriana del labio superior en el recién nacido","Malformación congénita por falta de fusión del labio superior; puede ser unilateral o bilateral; tratamiento: cirugía correctiva entre los 3-6 meses; requiere cuidados de alimentación especiales en el período preoperatorio","Solo una deformidad cosmética sin necesidad de tratamiento quirúrgico","Únicamente afecta a niños prematuros sin presentación en niños a término"],a:1},
{t:7,q:"¿Qué es el paladar hendido y qué cuidados requiere el recién nacido afectado?",opts:["Solo afecta el labio sin compromiso del paladar en ningún caso","Defecto de la fusión del paladar que dificulta la succión y deglución; requiere técnicas especiales de alimentación (tetina especial, posición vertical), prevención de aspiraciones y cirugía correctiva entre los 9-18 meses","Es una malformación que siempre se resuelve espontáneamente sin cirugía","Solo requiere cirugía estética sin ningún cuidado de alimentación especial"],a:1},
{t:7,q:"¿Qué es la atresia de esófago y cuáles son sus formas clínicas?",opts:["Infección bacteriana del esófago en el recién nacido que impide la deglución","Malformación congénita por falta de continuidad del esófago; formas: con o sin fístula traqueoesofágica; se sospecha ante hipersalivación, cianosis con la alimentación y sonda nasogástrica que no avanza; requiere cirugía urgente","Solo una malformación del esófago adulto sin presentación en recién nacidos","Únicamente se diagnostica después de los 3 meses de vida por ecografía"],a:1},
{t:7,q:"¿Qué es la estenosis pilórica y cuáles son sus síntomas característicos?",opts:["Malformación que produce diarrea explosiva en el recién nacido","Obstrucción del píloro por hipertrofia del músculo; produce vómitos proyectivos no biliosos en el lactante entre las 3-6 semanas de vida, deshidratación, alcalosis metabólica y masa palpable en epigastrio; tratamiento: piloromiotomía","Solo produce vómitos con bilis desde el primer día de vida","Únicamente dificultad respiratoria sin síntomas digestivos en el lactante"],a:1},
{t:7,q:"¿Cuáles son los cuidados de enfermería preoperatorios en anomalías congénitas digestivas?",opts:["Solo administrar antibióticos y esperar la cirugía sin preparación específica","Ayuno adecuado, hidratación parenteral, estabilización clínica, aspiración de secreciones si hay riesgo de aspiración, monitoreo de signos vitales, apoyo emocional a los padres y preparación quirúrgica","Solo dar de comer normalmente hasta la cirugía sin restricciones","Únicamente informar a los padres sin intervenciones de enfermería previas a la cirugía"],a:1},
{t:7,q:"¿Qué es el mielomeningocele y qué implica para el niño afectado?",opts:["Inflamación de las meninges por infección bacteriana en el recién nacido","Defecto del tubo neural con herniación del tejido nervioso y las meninges a través de un defecto vertebral; produce parálisis de miembros inferiores, vejiga e intestino neurógenos, y frecuentemente hidrocefalia","Solo una deformidad de la columna sin compromiso neurológico alguno","Únicamente afecta a niños prematuros sin presentación en niños a término"],a:1},
{t:7,q:"¿Cuáles son los cuidados de enfermería del recién nacido con mielomeningocele?",opts:["Solo administrar antibióticos sin otros cuidados específicos","Protección del saco meningomielocele con apósitos húmedos y estériles, posición prona, prevención de infección, monitoreo neurológico, medición del perímetro cefálico y apoyo a los padres en crisis de duelo","Solo colocar al niño en posición supina sin otros cuidados específicos","Únicamente alimentar normalmente sin cuidados posturales ni de la lesión"],a:1},
{t:7,q:"¿Qué son las oclusiones intestinales congénitas y cómo se presentan?",opts:["Solo infecciones del intestino que producen obstrucción temporal","Obstrucción del tránsito intestinal por atresias, estenosis o malrotación; se manifiestan con distensión abdominal, vómitos biliosos desde el primer día de vida, ausencia de meconio y requieren cirugía urgente","Solo producen constipación leve sin distensión abdominal ni vómitos","Únicamente se diagnostican después del primer mes de vida por ecografía"],a:1},
{t:7,q:"¿Qué es el megacolon congénito (enfermedad de Hirschsprung)?",opts:["Solo una dilatación adquirida del colon por alimentación inadecuada","Ausencia congénita de células ganglionares en el colon distal que impide el peristaltismo; produce constipación severa desde el nacimiento, distensión abdominal y obstrucción intestinal; tratamiento: resección del segmento afectado","Solo una infección bacteriana crónica que produce dilatación del colon","Únicamente se presenta en niños mayores de 5 años sin casos en recién nacidos"],a:1},
{t:7,q:"¿Cuáles son las hernias más frecuentes en la infancia y cuándo requieren cirugía?",opts:["Solo la hernia umbilical es posible en la infancia sin otros tipos","Hernia umbilical (frecuente, generalmente se cierra sola antes de los 4-5 años), inguinal (siempre quirúrgica por riesgo de encarcelamiento) e inguinoescrotal; la inguinal requiere corrección temprana","Las hernias en la infancia siempre se resuelven solas sin cirugía","Únicamente las hernias umbilicales requieren cirugía sin otros tipos"],a:1},
{t:7,q:"¿Cuáles son los cuidados postoperatorios en el niño con malformación congénita digestiva?",opts:["Solo reiniciar la alimentación normal al día siguiente de la cirugía","Control de signos vitales, vigilancia de la herida quirúrgica, manejo del dolor, reinicio progresivo de la alimentación, prevención de complicaciones (íleo, infección, dehiscencia) y educación a los padres","Solo cambiar los apósitos sin control de signos vitales ni del dolor","Únicamente administrar analgésicos sin otras intervenciones postoperatorias"],a:1},
{t:7,q:"¿Cómo impactan las anomalías congénitas en la familia del recién nacido afectado?",opts:["La familia no se ve afectada por el diagnóstico de malformación congénita","Genera crisis emocional, sentimientos de culpa, duelo por el niño idealizado, necesidad de información clara, apoyo profesional y reorganización familiar para adaptarse a las necesidades del niño","Solo produce tristeza pasajera sin necesidad de apoyo psicológico","Únicamente impacto económico sin consecuencias emocionales para los padres"],a:1},
{t:7,q:"¿Qué es el paladar hendido aislado y cómo afecta al desarrollo del lenguaje?",opts:["No afecta en absoluto al lenguaje ni a la alimentación del niño","El paladar hendido aislado puede afectar la articulación, producir escape nasal de aire al hablar y requerir fonoaudiología además de la cirugía correctiva para lograr un habla normal","Solo produce problemas de alimentación sin impacto en el desarrollo del lenguaje","Únicamente se corrige con medicamentos sin necesidad de cirugía ni fonoaudiología"],a:1},

// ─── TEMA 9 ─── Disfunción Respiratoria (13)
{t:8,q:"¿Qué es la bronquitis en el niño y cuál es su cuadro clínico?",opts:["Solo inflamación de los alvéolos con fiebre alta y expectoración purulenta","Inflamación de los bronquios; clínica: tos seca inicial que se vuelve productiva, fiebre variable, rinorrea, sibilancias y signos de dificultad respiratoria variable según la edad del niño","Solo afecta a adolescentes sin presentación en niños pequeños","Únicamente fiebre alta sin síntomas respiratorios específicos en el niño"],a:1},
{t:8,q:"¿Qué es la bronconeumonía en el niño y cómo se diferencia de la neumonía lobar?",opts:["Son exactamente iguales sin diferencia en distribución ni en clínica","La bronconeumonía afecta bronquios y alvéolos en forma parcheada bilateral; la neumonía lobar compromete un lóbulo completo; ambas producen fiebre, tos productiva, dificultad respiratoria y crepitantes a la auscultación","Solo se diferencian por el agente causal sin diferencias en la distribución","La bronconeumonía es solo en adultos y la neumonía lobar solo en niños"],a:1},
{t:8,q:"¿Cuál es la fisiopatología del asma bronquial en el niño?",opts:["Infección bacteriana de los bronquios que produce obstrucción permanente","Inflamación crónica de las vías aéreas con hiperreactividad bronquial; ante desencadenantes (alérgenos, virus, ejercicio) se produce broncoespasmo, edema de mucosa y producción de moco espeso que generan obstrucción reversible","Solo obstrucción fija por malformación anatómica de los bronquios","Únicamente contracción muscular sin inflamación ni producción de moco"],a:1},
{t:8,q:"¿Cuáles son los desencadenantes del asma en el niño?",opts:["Solo los alérgenos son desencadenantes sin otros factores posibles","Alérgenos (polvo, ácaros, hongos, pelo de animales), infecciones virales, ejercicio físico, humo de tabaco, contaminación ambiental, cambios de temperatura y emociones intensas","Solo el ejercicio físico sin otros desencadenantes en el niño asmático","Únicamente infecciones bacterianas sin otros desencadenantes del asma"],a:1},
{t:8,q:"¿Cuál es el cuadro clínico del asma bronquial en el niño?",opts:["Solo tos nocturna sin disnea ni sibilancias en la mayoría de los niños","Tos (frecuentemente nocturna), sibilancias, sensación de opresión torácica y disnea de intensidad variable; las crisis pueden ser leves, moderadas o graves con riesgo de vida","Solo disnea de reposo sin tos ni sibilancias como síntomas del asma","Únicamente fiebre alta sin síntomas respiratorios en el niño asmático"],a:1},
{t:8,q:"¿Qué es la faringoamigdalitis y cuáles son sus tipos?",opts:["Inflamación de los bronquios por bacterias con fiebre y tos","Inflamación de la faringe y/o las amígdalas; viral (más frecuente, autolimitada) o bacteriana por estreptococo grupo A (que puede producir fiebre reumática); síntomas: dolor de garganta, fiebre, disfagia y exudado amigdalino","Solo inflamación de los ganglios del cuello sin compromiso faríngeo","Únicamente inflamación de la laringe con disfonía y tos perruna"],a:1},
{t:8,q:"¿Qué es la rinitis en el niño y cuáles son sus tipos más frecuentes?",opts:["Solo infección bacteriana de la nariz que requiere antibióticos","Inflamación de la mucosa nasal; tipos: alérgica (por sensibilización a alérgenos, crónica), viral (resfriado común, autolimitada) e infecciosa bacteriana; síntomas: rinorrea, congestión nasal, estornudos y prurito nasal en la forma alérgica","Solo rinitis alérgica sin otros tipos de rinitis en la infancia","Únicamente produce obstrucción nasal sin rinorrea ni estornudos"],a:1},
{t:8,q:"¿Qué es la atelectasia en el niño y cuáles son sus causas?",opts:["Es la hiperinflación pulmonar por atrapamiento de aire en los alvéolos","Colapso de una zona pulmonar por obstrucción bronquial, compresión extrínseca o falta de surfactante; causas: cuerpo extraño, tapones de moco, presión de ganglios o tumores; puede producir disnea y desplazamiento mediastínico","Solo por infección bacteriana sin otras causas posibles en el niño","Únicamente se produce en prematuros por falta de surfactante pulmonar"],a:1},
{t:8,q:"¿Cuáles son los signos de dificultad respiratoria en el niño?",opts:["Solo la fiebre alta como signo de dificultad respiratoria en el niño","Taquipnea, tiraje (subcostal, intercostal, supraesternal), aleteo nasal, quejido espiratorio, cianosis, saturación de O2 disminuida y alteración del estado de conciencia en los casos graves","Solo la cianosis como único signo de dificultad respiratoria","Únicamente la frecuencia respiratoria elevada sin otros signos observables"],a:1},
{t:8,q:"¿Cuáles son los cuidados de enfermería en el niño con crisis asmática?",opts:["Solo administrar broncodilatadores sin otras intervenciones de enfermería","Posición semisentada, O2 húmedo, administración de broncodilatadores inhalados, monitoreo de saturación y frecuencia respiratoria, hidratación, calmar al niño y educar a la familia sobre el manejo de la crisis","Solo posición supina y nebulización sin monitoreo ni educación a la familia","Únicamente administrar corticoides sin broncodilatadores ni otras medidas"],a:1},
{t:8,q:"¿Cuáles son los cuidados de enfermería en el niño con bronconeumonía?",opts:["Solo administrar antibióticos sin otras intervenciones específicas","Control de signos vitales, temperatura y saturación de O2, posición semisentada, O2 húmedo si es necesario, fisioterapia respiratoria, hidratación, antipirético y educación a la familia sobre cuidados en el hogar","Solo nebulizaciones sin otros cuidados de enfermería específicos","Únicamente reposo sin intervenciones activas de enfermería"],a:1},
{t:8,q:"¿Cuál es el tratamiento del asma bronquial en el niño?",opts:["Solo antihistamínicos sin broncodilatadores ni corticoides","Broncodilatadores beta-2 de acción corta para la crisis, corticoides inhalados como controladores, evitar desencadenantes, plan de acción escrito para la familia y seguimiento regular con el especialista","Solo antibióticos porque es siempre de origen infeccioso el asma","Únicamente corticoides sistémicos sin broncodilatadores ni manejo ambiental"],a:1},
{t:8,q:"¿Cómo se evalúa la dificultad respiratoria en el lactante?",opts:["Solo contando la frecuencia respiratoria sin evaluar otros signos","Frecuencia respiratoria (taquipnea si >60 rpm en menores de 2 meses, >50 entre 2-12 meses), tiraje, quejido, saturación de O2, coloración y estado de alerta como indicadores de gravedad","Solo la coloración de la piel sin otros parámetros respiratorios","Únicamente la auscultación sin evaluación de la frecuencia ni del tiraje"],a:1},

// ─── TEMA 10 ─── Enfermedades Infectocontagiosas (13)
{t:9,q:"¿Cuáles son las características del sarampión y su modo de transmisión?",opts:["Se transmite por contacto directo con lesiones cutáneas sin vía aérea","Enfermedad viral altamente contagiosa por vía aérea; produce fiebre alta, tos, coriza, conjuntivitis y exantema maculopapular que comienza en la cara; manchas de Koplik patognomónicas; puede producir complicaciones graves","Solo produce erupciones sin fiebre ni síntomas respiratorios previos","Únicamente se contagia por contacto con secreciones bucales sin vía aérea"],a:1},
{t:9,q:"¿Cuáles son las características de la rubeola y cuál es su principal complicación?",opts:["Enfermedad grave que siempre produce hospitalización en todos los niños","Enfermedad viral leve con exantema rosado, adenopatías occipitales y artralgia; su principal riesgo es la infección durante el embarazo (rubeola congénita) que produce malformaciones cardíacas, cataratas y sordera en el feto","Solo produce fiebre alta sin exantema ni adenopatías en el niño","Únicamente grave en adultos sin riesgo especial en el embarazo"],a:1},
{t:9,q:"¿Qué es la escarlatina, cuál es su agente causal y cómo se trata?",opts:["Infección viral que produce exantema generalizado sin angina asociada","Infección por estreptococo beta-hemolítico grupo A; produce faringoamigdalitis con exantema micropapular eritematoso, lengua aframbuesada y descamación posterior; tratamiento: penicilina o amoxicilina por 10 días","Solo produce exantema sin afectación de la faringe ni de las amígdalas","Únicamente se trata con antivirales sin necesidad de antibióticos"],a:1},
{t:9,q:"¿Qué es la coqueluche (tos convulsa) y cuáles son sus fases clínicas?",opts:["Infección viral leve que dura solo 3 días en todos los niños","Infección bacteriana por Bordetella pertussis; fases: catarral (tos leve, contagiosa), paroxística (tos en quintas con galleo inspiratorio, vómitos y apnea) y de convalecencia; peligrosa en menores de 6 meses; tratamiento: azitromicina","Solo fiebre alta sin tos característica en forma de quintas","Únicamente produce bronquitis sin la tos característica en quintas"],a:1},
{t:9,q:"¿Cuáles son las características de la varicela y cómo se maneja?",opts:["Solo produce fiebre sin lesiones cutáneas en la mayoría de los casos","Infección viral altamente contagiosa por varicela-zóster; produce vesículas pruriginosas en distintos estadios simultáneos; tratamiento: sintomático (antihistamínicos, antisépticos locales, corte de uñas); antivirales en inmunodeprimidos; vacuna preventiva","Solo produce costras sin fase vesicular previa ni prurito","Únicamente se contagia por contacto directo con las lesiones sin vía aérea"],a:1},
{t:9,q:"¿Qué es la fiebre urliana (parotiditis) y cuáles son sus complicaciones?",opts:["Infección bacteriana de las amígdalas sin compromiso de las glándulas salivales","Infección viral por paramixovirus que produce inflamación dolorosa de las glándulas parótidas bilateral; complicaciones: orquitis (en adolescentes varones, riesgo de infertilidad), pancreatitis, meningitis y encefalitis; vacuna: triple viral","Solo produce inflamación unilateral de una sola parótida sin fiebre","Únicamente afecta el páncreas sin compromiso de las glándulas salivales"],a:1},
{t:9,q:"¿Cuáles son las precauciones de aislamiento en enfermedades infectocontagiosas pediátricas?",opts:["Solo lavado de manos sin otras precauciones de aislamiento posibles","Aislamiento de contacto (exantemas, heridas), de gotitas (influenza, meningococo), aéreo (sarampión, varicela, TBC); uso de EPP adecuado, habitación individual y educación a la familia sobre medidas preventivas","Solo mascarilla sin necesidad de habitación individual ni otros EPP","Únicamente aislamiento para enfermedades de transmisión aérea sin otras precauciones"],a:1},
{t:9,q:"¿Cuáles son los cuidados de enfermería en el niño con enfermedad infectocontagiosa?",opts:["Solo administrar antibióticos sin otras intervenciones de enfermería","Control de temperatura y fiebre, manejo del prurito si hay exantema, aislamiento adecuado, hidratación, educación a la familia sobre contagio y prevención, y monitoreo de complicaciones","Solo aislar al niño sin educación a la familia ni cuidados específicos","Únicamente tomar signos vitales sin otras intervenciones de enfermería"],a:1},
{t:9,q:"¿Cuál es la importancia de las inmunizaciones en las enfermedades infectocontagiosas?",opts:["Las vacunas no previenen realmente las enfermedades infectocontagiosas","Son la principal herramienta de prevención; generan inmunidad individual y comunitaria (efecto rebaño), han erradicado enfermedades (viruela) y reducido dramáticamente la mortalidad por enfermedades inmunoprevenibles","Solo previenen las enfermedades de transmisión aérea sin efecto en otras","Únicamente protegen al niño vacunado sin impacto en la comunidad"],a:1},
{t:9,q:"¿Cuáles son las complicaciones más graves del sarampión?",opts:["El sarampión no produce complicaciones en niños bien nutridos","Neumonía (causa más frecuente de muerte), encefalitis, crup, diarrea grave, otitis media y malnutrición; los niños desnutridos y menores de 5 años tienen mayor riesgo de complicaciones graves","Solo produce otitis media sin otras complicaciones posibles","Únicamente meningitis sin otras complicaciones del sarampión"],a:1},
{t:9,q:"¿Cuándo un niño con enfermedad infectocontagiosa puede reincorporarse a la escuela?",opts:["Al día siguiente de iniciado el tratamiento sin necesidad de aislamiento","Cuando no hay más riesgo de contagio: varicela (cuando todas las lesiones están en costra), sarampión y rubeola (7 días desde el exantema), coqueluche (5 días de antibiótico), ajustando según el tipo de enfermedad","Solo cuando el médico lo indique sin criterios específicos conocidos","Únicamente cuando la fiebre cede sin considerar el período de contagiosidad"],a:1},
{t:9,q:"¿Cuál es el diagnóstico diferencial entre sarampión, rubeola y varicela por el exantema?",opts:["Los tres exantemas son idénticos sin diferencias clínicas observables","Sarampión: maculopapular, comienza en cara, manchas de Koplik; rubeola: rosado fino, adenopatías occipitales; varicela: vesiculoso pruriginoso con distintos estadios simultáneos en todo el cuerpo","Solo se diferencian por la temperatura de la fiebre sin diferencias en el exantema","Únicamente por la edad del niño sin diferencias en las características de las lesiones"],a:1},
{t:9,q:"¿Cómo se previene la coqueluche especialmente en el lactante?",opts:["Solo con antibióticos preventivos sin necesidad de vacunación","Vacunación del lactante desde los 2 meses, estrategia capullo (vacunar a adultos en contacto con el recién nacido), vacunación de embarazadas en el tercer trimestre para transferir anticuerpos al neonato","Solo aislamiento del niño de otros menores sin vacunación posible","Únicamente con antibióticos profilácticos en los contactos expuestos"],a:1},

// ─── TEMA 11 ─── Disfunción Cardiovascular (13)
{t:10,q:"¿Qué son las cardiopatías congénitas y cuáles son las más frecuentes?",opts:["Solo malformaciones adquiridas después del nacimiento por infecciones","Anomalías estructurales del corazón presentes desde el nacimiento; más frecuentes: comunicación interventricular (CIV), comunicación interauricular (CIA), tetralogía de Fallot, ductus arterioso persistente y estenosis pulmonar","Solo malformaciones de las válvulas sin defectos del tabique cardíaco","Únicamente defectos de los grandes vasos sin compromisos de las cámaras cardíacas"],a:1},
{t:10,q:"¿Cómo se clasifican las cardiopatías congénitas según el flujo pulmonar?",opts:["Solo en graves y leves según el estado general del niño","Acianóticas con flujo pulmonar aumentado (CIA, CIV, ductus), acianóticas con flujo normal o disminuido (estenosis aórtica/pulmonar) y cianóticas con flujo disminuido (tetralogía de Fallot) o aumentado (transposición de grandes vasos)","Solo en cianóticas y no cianóticas sin otras subdivisiones posibles","Únicamente por el tamaño del defecto sin considerar el flujo pulmonar"],a:1},
{t:10,q:"¿Cuáles son los signos y síntomas de la cardiopatía congénita en el recién nacido?",opts:["Solo soplo cardíaco sin otros signos en el recién nacido con cardiopatía","Cianosis central, dificultad para la alimentación con fatiga al mamar, taquicardia, taquipnea, dificultad para aumentar de peso, soplos cardíacos y signos de insuficiencia cardíaca congestiva en los casos graves","Solo dificultad respiratoria sin compromiso cardíaco en el recién nacido","Únicamente palidez sin otros signos de compromiso circulatorio"],a:1},
{t:10,q:"¿Qué es la tetralogía de Fallot y cuáles son sus cuatro componentes?",opts:["Cardiopatía acianótica con tres defectos sin compromiso de los grandes vasos","Cardiopatía cianótica con cuatro componentes: estenosis pulmonar, hipertrofia del ventrículo derecho, comunicación interventricular y dextroposición de la aorta; produce cianosis intensa, crisis hipóxicas y dedos en palillo de tambor","Solo estenosis pulmonar sin otros defectos asociados en la tetralogía","Únicamente comunicación interventricular sin otros componentes de la tetralogía"],a:1},
{t:10,q:"¿Qué es la endocarditis infecciosa en el niño y cuáles son sus manifestaciones?",opts:["Inflamación del pericardio por infección bacteriana sin compromisos valvulares","Infección del endocardio y válvulas cardíacas generalmente bacteriana (estreptococo, estafilococo); produce fiebre prolongada, soplos de nueva aparición o cambiantes, esplenomegalia y fenómenos embólicos en distintos órganos","Solo infección del músculo cardíaco sin compromisos valvulares","Únicamente fiebre sin compromiso cardíaco en el niño con endocarditis"],a:1},
{t:10,q:"¿Cuáles son los cuidados de enfermería en el niño con cardiopatía congénita?",opts:["Solo administrar diuréticos sin otras intervenciones de enfermería","Control de signos vitales y saturación de O2, posición semisentada, O2 si es necesario, control del balance hídrico, alimentación con técnica adecuada (períodos cortos), educación a la familia y preparación para procedimientos diagnósticos o quirúrgicos","Solo control del peso sin otras intervenciones específicas de enfermería","Únicamente apoyo emocional sin intervenciones clínicas de enfermería"],a:1},
{t:10,q:"¿Qué son las cardiopatías adquiridas en el niño?",opts:["Solo malformaciones cardíacas de origen genético presentes al nacer","Enfermedades cardíacas que se desarrollan después del nacimiento; causas: fiebre reumática (valvulopatía), miocarditis viral, pericarditis, enfermedad de Kawasaki y endocarditis infecciosa","Son exactamente iguales a las cardiopatías congénitas sin diferencia","Solo enfermedades del pericardio sin compromiso de otras estructuras cardíacas"],a:1},
{t:10,q:"¿Qué es la insuficiencia cardíaca en el niño y cuáles son sus causas?",opts:["Solo ocurre en adultos sin presentación en la edad pediátrica","Incapacidad del corazón para cubrir las demandas del organismo; causas: cardiopatías congénitas con shunt grande, miocarditis, cardiopatía reumática, hipertensión y arritmias graves; clínica: taquicardia, hepatomegalia, edemas y dificultad respiratoria","Solo por malformaciones congénitas sin otras causas en el niño","Únicamente por hipertensión arterial sin otras causas de insuficiencia cardíaca"],a:1},
{t:10,q:"¿Cómo se diagnostica una cardiopatía congénita?",opts:["Solo con auscultación del soplo sin otros estudios complementarios","Examen físico (soplos, cianosis, pulsos), electrocardiograma, radiografía de tórax, ecocardiograma (estudio clave), saturometría y cateterismo cardíaco si es necesario para planificación quirúrgica","Solo con radiografía de tórax sin otros estudios diagnósticos","Únicamente con análisis de sangre sin estudios de imagen cardíaca"],a:1},
{t:10,q:"¿Cuáles son los cuidados de enfermería en el niño con insuficiencia cardíaca?",opts:["Solo administrar diuréticos sin otros cuidados de enfermería específicos","Posición semisentada, O2 húmedo, balance hídrico estricto, control de peso diario, restricción de sodio y líquidos según indicación, monitoreo de arritmias y educación a los padres sobre señales de alarma","Solo reposo absoluto sin control de signos vitales ni balance hídrico","Únicamente control de la temperatura sin otras intervenciones de enfermería"],a:1},
{t:10,q:"¿Qué es la fiebre reumática y cuál es su relación con las cardiopatías adquiridas?",opts:["No tiene relación con las enfermedades cardíacas en la infancia","Complicación inflamatoria de la faringoamigdalitis estreptocócica que puede afectar el corazón produciendo valvulopatías (especialmente mitral), miocarditis y pericarditis; es la principal causa de cardiopatía adquirida en niños de países en desarrollo","Solo produce artritis sin comprometer el corazón ni otras estructuras","Únicamente afecta el sistema nervioso sin compromisos cardíacos"],a:1},
{t:10,q:"¿Cuál es el tratamiento de la cardiopatía congénita cianótica?",opts:["Solo tratamiento médico sin posibilidad de corrección quirúrgica","Estabilización clínica, O2 para paliar la cianosis, corrección quirúrgica temprana o paliativa según el tipo de cardiopatía, prostaglandinas E1 para mantener el ductus en cardiopatías ductus-dependientes","Solo tratamiento farmacológico permanente sin cirugía posible","Únicamente dieta y restricción física sin tratamiento quirúrgico ni farmacológico"],a:1},
{t:10,q:"¿Qué es el cateterismo cardíaco y cuáles son los cuidados de enfermería post-procedimiento?",opts:["Es solo una radiografía del corazón sin procedimiento invasivo alguno","Procedimiento diagnóstico y terapéutico que introduce catéteres en las cavidades cardíacas; post-procedimiento: control del sitio de punción, pulsos distales, signos vitales, coloración y temperatura de la extremidad, hidratación y reposo con la extremidad extendida","Solo requiere control del dolor sin otras medidas post-procedimiento","Únicamente informar los resultados sin intervenciones de enfermería post-cateterismo"],a:1},

// ─── TEMA 12 ─── Disfunciones Hematológicas e Inmunológicas (13)
{t:11,q:"¿Cuáles son las anemias más frecuentes en la infancia y sus causas?",opts:["Solo la anemia perniciosa sin otras formas posibles en niños","Ferropénica (déficit de hierro, la más frecuente), hemolítica (destrucción de eritrocitos), aplásica, megaloblástica (déficit de B12/folatos) y de células falciformes; cada una con causas y tratamientos específicos","Solo la anemia por infecciones bacterianas sin otras formas en niños","Únicamente anemia genética sin formas nutricionales en la infancia"],a:1},
{t:11,q:"¿Cuáles son los signos clínicos de la anemia ferropénica en el niño?",opts:["Solo palidez cutánea sin otros signos clínicos de la anemia ferropénica","Palidez de piel y mucosas, astenia, irritabilidad, taquicardia, soplo funcional, pica (ingesta de tierra u otros materiales), alopecia, uñas frágiles (coiloniquia) y retraso del desarrollo cognitivo en casos prolongados","Solo cansancio sin palidez ni otros signos sistémicos del déficit de hierro","Únicamente ictericia sin palidez ni otros signos de anemia ferropénica"],a:1},
{t:11,q:"¿Cuáles son los cuidados de enfermería en el niño con anemia?",opts:["Solo administrar hierro sin otras intervenciones de enfermería específicas","Control del color de la piel y mucosas, monitoreo de la frecuencia cardíaca, administración de hierro con técnica correcta (en ayunas con vitamina C), educación sobre la dieta rica en hierro, control de hemograma y apoyo emocional","Solo controlar la hemoglobina sin intervenciones dietéticas ni educativas","Únicamente transfusiones de sangre sin tratamiento médico previo"],a:1},
{t:11,q:"¿Qué son las púrpuras en la infancia y cuáles son sus tipos?",opts:["Solo las petequias sin otras formas de sangrado en la infancia","Trastornos hemorrágicos con petequias y equimosis; tipos: trombocitopénica idiopática (PTI, más frecuente), por drogas, por infección viral y vasculitis de Henoch-Schönlein (púrpura palpable en miembros inferiores y glúteos)","Solo por déficit de vitamina K sin otras causas de púrpura en niños","Únicamente por leucemia sin otras causas de púrpura en la infancia"],a:1},
{t:11,q:"¿Qué es la hemofilia y cuáles son sus tipos?",opts:["Déficit de plaquetas que produce sangrado espontáneo frecuente","Trastorno hereditario ligado al cromosoma X que afecta la coagulación; tipo A (déficit del factor VIII, más frecuente) y tipo B (déficit del factor IX); produce hemartrosis, hematomas musculares y sangrado prolongado ante lesiones","Exceso de factores de coagulación que produce trombosis en el niño","Solo déficit de vitamina K sin relación con los factores de coagulación"],a:1},
{t:11,q:"¿Cuáles son los cuidados de enfermería en el niño con hemofilia?",opts:["Solo administrar plasma fresco sin otras intervenciones de enfermería","Evitar punciones venosas repetidas e inyecciones intramusculares, aplicar presión prolongada en sitios de punción, administrar el factor deficitario según indicación, educación sobre el manejo del hogar seguro y signos de alarma de sangrado","Solo reposo absoluto permanente sin otras intervenciones específicas","Únicamente analgésicos para el dolor sin otras medidas de enfermería"],a:1},
{t:11,q:"¿Qué son las leucemias en la infancia y cuál es la más frecuente?",opts:["Solo en adultos sin presentación en la edad pediátrica","Cánceres hematológicos por proliferación maligna de células inmaduras de la médula ósea; la leucemia linfoblástica aguda (LLA) es la más frecuente en niños con buen pronóstico con el tratamiento actual","Solo leucemia mielóide crónica como única forma pediátrica","Únicamente leucemia linfocítica crónica sin otras formas en niños"],a:1},
{t:11,q:"¿Cuál es el cuadro clínico de la leucemia linfoblástica aguda (LLA) en el niño?",opts:["Solo leucocitosis elevada sin síntomas clínicos en la mayoría","Palidez, astenia, fiebre recurrente por infecciones, sangrado (petequias, equimosis), dolor óseo, adenopatías, hepatoesplenomegalia y síntomas del sistema nervioso central en algunos casos","Solo síntomas digestivos sin compromiso hematológico ni sistémico","Únicamente dolor óseo sin fiebre ni palidez como únicos síntomas"],a:1},
{t:11,q:"¿Cuáles son los cuidados de enfermería en el niño con leucemia?",opts:["Solo administrar quimioterapia sin otras intervenciones de enfermería","Prevención de infecciones (higiene estricta, restricción de visitas con infección), manejo cuidadoso del acceso venoso central, control de sangrados, apoyo emocional al niño y familia, y educación sobre la quimioterapia y sus efectos adversos","Solo control de hemograma sin otras intervenciones de enfermería","Únicamente aislamiento sin apoyo emocional ni educación familiar"],a:1},
{t:11,q:"¿Cómo se trata la leucemia linfoblástica aguda en el niño?",opts:["Solo con trasplante de médula ósea sin quimioterapia previa","Quimioterapia en fases (inducción, consolidación, mantenimiento), con tasas de curación superiores al 80% en países desarrollados; trasplante de médula ósea en casos de alto riesgo o recaída","Solo con radioterapia sin quimioterapia ni trasplante de médula ósea","Únicamente con corticosteroides sin quimioterapia específica"],a:1},
{t:11,q:"¿Cuáles son los estudios diagnósticos en las disfunciones hematológicas pediátricas?",opts:["Solo el hemograma como único estudio necesario en todos los casos","Hemograma completo con recuento diferencial, frotis de sangre periférica, mielograma, biopsia de médula ósea, estudios de coagulación, ferritina, reticulocitos y estudios moleculares según la patología sospechada","Solo la radiografía de tórax sin estudios de laboratorio específicos","Únicamente el grupo sanguíneo y factor RH sin otros estudios hematológicos"],a:1},
{t:11,q:"¿Qué es la purpura de Henoch-Schönlein y cuáles son sus manifestaciones?",opts:["Solo petequias aisladas sin otros órganos comprometidos en el niño","Vasculitis sistémica mediada por IgA más frecuente en la infancia; produce púrpura palpable en miembros inferiores y glúteos, artritis, dolor abdominal cólico y glomerulonefritis con hematuria; generalmente autolimitada","Solo compromiso articular sin manifestaciones cutáneas ni renales","Únicamente compromiso renal sin manifestaciones cutáneas en el niño"],a:1},
{t:11,q:"¿Cuáles son los factores predisponentes de la anemia ferropénica en niños argentinos?",opts:["Solo la herencia genética sin factores nutricionales ni sociales","Alimentación complementaria inadecuada, destete precoz, bajo peso al nacer, prematurez, dieta pobre en hierro hemínico, infecciones repetidas y nivel socioeconómico bajo son los principales factores de riesgo en nuestro país","Solo el consumo de leche de vaca sin otros factores predisponentes","Únicamente factores genéticos sin influencia de la dieta ni de lo social"],a:1},

// ─── TEMA 13 ─── Disfunción Genitourinaria (13)
{t:12,q:"¿Cuáles son las infecciones de las vías urinarias más frecuentes en niños?",opts:["Solo las infecciones del riñón sin infecciones de la vejiga en niños","Cistitis (vejiga, más frecuente en niñas por proximidad anatómica) y pielonefritis (riñón, con fiebre alta y compromiso sistémico); agente más frecuente: E. coli; los niños menores de 2 años tienen mayor riesgo de cicatrices renales","Solo en niños varones sin presentación en niñas","Únicamente infecciones del riñón sin infecciones vesicales en la infancia"],a:1},
{t:12,q:"¿Cuáles son los síntomas de infección urinaria en el niño mayor y en el lactante?",opts:["Los mismos síntomas en todas las edades sin diferencia por etapa de la vida","Niño mayor: disuria, polaquiuria, urgencia miccional, dolor suprapúbico y fiebre; lactante: fiebre sin foco aparente, irritabilidad, rechazo del alimento, vómitos y orina de olor fétido","Solo fiebre alta sin síntomas urinarios en todas las edades","Únicamente incontinencia urinaria sin fiebre ni síntomas sistémicos"],a:1},
{t:12,q:"¿Qué es el síndrome nefrótico en el niño y cuáles son sus características?",opts:["Solo proteinuria leve sin edema ni alteraciones en los lípidos","Síndrome por lesión glomerular que produce proteinuria masiva (mayor de 40 mg/m²/hora), hipoalbuminemia, edema generalizado (anasarca) e hiperlipidemia; la forma más frecuente en niños es la de cambios mínimos con buena respuesta a corticoides","Solo edema localizado en cara sin proteinuria ni hipoalbuminemia","Únicamente hiperlipidemia sin proteinuria ni edema en el niño"],a:1},
