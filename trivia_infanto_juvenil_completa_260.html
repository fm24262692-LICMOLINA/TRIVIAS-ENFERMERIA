{t:12,q:"¿Cuáles son los cuidados de enfermería en el niño con síndrome nefrótico?",opts:["Solo administrar corticoides sin otras intervenciones de enfermería","Control de peso diario, balance hídrico estricto, control de presión arterial, cuidado de la piel edematosa (riesgo de úlceras), dieta hiposódica, educación a la familia sobre signos de alerta y prevención de infecciones","Solo control del peso sin otras intervenciones de enfermería específicas","Únicamente restricción hídrica sin control de signos vitales ni balance"],a:1},
{t:12,q:"¿Qué es la glomerulitis aguda (glomerulonefritis aguda postestreptocócica) en el niño?",opts:["Infección bacteriana directa de los glomérulos por E. coli","Inflamación glomerular mediada por inmunocomplejos tras infección estreptocócica; produce hematuria (orina color coca-cola), hipertensión arterial, edema y oliguria; aparece 1-3 semanas después de la infección de garganta o piel","Solo por infecciones virales sin relación con el estreptococo","Únicamente produce proteinuria masiva sin hematuria ni hipertensión"],a:1},
{t:12,q:"¿Qué es la insuficiencia renal aguda en el niño y cuáles son sus causas?",opts:["Solo en adultos sin presentación en la edad pediátrica","Deterioro brusco de la función renal con acumulación de productos nitrogenados; causas: prerrenal (deshidratación, sepsis), renal (glomerulonefritis, SHU) y posrenal (obstrucción); se manifiesta con oligoanuria, edema, hipertensión y alteraciones electrolíticas","Solo por deshidratación sin otras causas posibles en el niño","Únicamente por infecciones urinarias sin otras causas de IRA en pediatría"],a:1},
{t:12,q:"¿Qué es la enuresis y cómo se aborda en el niño?",opts:["Solo un capricho del niño sin base fisiológica ni psicológica","Emisión involuntaria e inconsciente de orina durante el sueño en niños mayores de 5 años; tipos: primaria (nunca logró el control) y secundaria (regresión); abordaje: educación a la familia, técnicas conductuales, alarma de enuresis y medicación en casos seleccionados","Solo se trata con medicamentos sin intervenciones conductuales","Únicamente requiere castigo para corregir el comportamiento del niño"],a:1},
{t:12,q:"¿Cuáles son los cuidados de enfermería en el niño con infección urinaria?",opts:["Solo administrar antibióticos sin otras intervenciones de enfermería","Administración de antibióticos según indicación, estimular hidratación adecuada, educación sobre higiene perineal (limpieza de adelante hacia atrás), control de temperatura, seguimiento de urocultivo de control y educación a los padres","Solo tomar cultivo de orina sin otras intervenciones de enfermería","Únicamente reposo absoluto sin intervenciones activas de enfermería"],a:1},
{t:12,q:"¿Cómo se diagnostica una infección urinaria en el niño?",opts:["Solo con síntomas clínicos sin necesidad de estudios de laboratorio","Urocultivo con recuento de colonias mayor a 100.000 UFC/ml como gold standard; análisis de orina (piuria, bacteriuria, nitritos positivos); sedimento urinario; y ecografía renal para descartar anomalías estructurales","Solo con tira reactiva de orina sin necesidad de urocultivo confirmatorio","Únicamente con hemograma sin estudios de orina específicos"],a:1},
{t:12,q:"¿Qué es la insuficiencia renal crónica en el niño y cuáles son sus consecuencias?",opts:["Siempre se resuelve espontáneamente sin consecuencias a largo plazo","Pérdida progresiva e irreversible de la función renal con retención de toxinas, anemia, alteraciones óseas (osteodistrofia renal), hipertensión, retraso del crecimiento y compromiso del desarrollo del niño; requiere diálisis o trasplante","Solo produce anemia sin otras consecuencias para el desarrollo del niño","Únicamente hipertensión arterial sin otras complicaciones de la IRC"],a:1},
{t:12,q:"¿Cuáles son los estudios de imagen utilizados en las nefropatías pediátricas?",opts:["Solo la ecografía sin otras técnicas de imagen disponibles","Ecografía renal y vesical (primer estudio), cistouretrografía miccional seriada (CUMS) para detectar reflujo vesicoureteral, gammagrafía renal con DMSA para evaluar cicatrices y función diferencial, y URO-TAC en casos complejos","Solo tomografía computada sin otros estudios de imagen posibles","Únicamente radiografía simple sin estudios ecográficos ni gammagráficos"],a:1},
{t:12,q:"¿Qué es el reflujo vesicoureteral y cuál es su importancia clínica?",opts:["Solo un trastorno benigno sin consecuencias para la función renal","Flujo retrógrado de orina desde la vejiga hacia los uréteres y riñones que predispone a infecciones urinarias altas y cicatrices renales; grados I a V según gravedad; puede requerir profilaxis antibiótica o corrección quirúrgica","Solo estético sin riesgo de daño renal ni infecciones urinarias recurrentes","Únicamente produce síntomas en el período neonatal sin consecuencias posteriores"],a:1},
{t:12,q:"¿Cómo se trata el síndrome nefrótico en el niño?",opts:["Solo con restricción hídrica y dieta hiposódica sin medicación","Corticosteroides (prednisona) como primera línea; en casos refractarios o frecuentemente recidivantes: ciclofosfamida, ciclosporina o rituximab; dieta hiposódica, control de edemas, profilaxis de infecciones y seguimiento estricto","Solo con diuréticos sin corticoides ni otras medicaciones específicas","Únicamente con trasplante renal sin tratamiento médico previo"],a:1},

// ─── TEMA 14 ─── Alteraciones del Sistema Nervioso Central (13)
{t:13,q:"¿Qué es la disfunción cerebral mínima (TDAH) y cuáles son sus características?",opts:["Solo retraso mental severo sin hiperactividad ni déficit de atención","Trastorno del neurodesarrollo con inatención, hiperactividad e impulsividad que impactan en el aprendizaje y la conducta; más frecuente en varones; diagnóstico clínico basado en criterios del DSM-5; tratamiento multimodal incluye psicoeducación, terapia conductual y medicación","Solo en adultos sin presentación en niños en edad escolar","Únicamente déficit motor sin problemas de atención ni hiperactividad"],a:1},
{t:13,q:"¿Qué es la hidrocefalia y cuáles son sus tipos?",opts:["Solo acumulación de sangre en el cerebro por traumatismo craneal","Acumulación excesiva de líquido cefalorraquídeo en el sistema ventricular; tipos: comunicante (absorción deficiente) y no comunicante u obstructiva (bloqueo del flujo); produce macrocefalia, fontanela abombada, puesta del sol ocular y vómitos en el lactante","Solo dilatación de los ventrículos sin aumento del perímetro cefálico","Únicamente inflamación del cerebro sin acumulación de líquido cefalorraquídeo"],a:1},
{t:13,q:"¿Cuáles son los cuidados de enfermería en el niño con hidrocefalia y válvula derivativa?",opts:["Solo controlar el perímetro cefálico sin otras intervenciones específicas","Control del perímetro cefálico, monitoreo de signos de hipertensión endocraneana (irritabilidad, vómitos, fontanela abombada), posición de la cabeza según indicación, detección precoz de disfunción de la válvula y educación a los padres sobre señales de alarma","Solo vigilar la herida quirúrgica sin otras intervenciones de enfermería","Únicamente administrar anticonvulsivantes sin control del perímetro cefálico"],a:1},
{t:13,q:"¿Qué es el síndrome de Reye y cuáles son sus manifestaciones?",opts:["Infección bacteriana del hígado sin compromiso neurológico en el niño","Encefalopatía aguda no inflamatoria con degeneración hepática asociada al uso de aspirina en infecciones virales; produce vómitos intensos, alteración del estado de conciencia, hepatomegalia y hipoglucemia; actualmente raro por la restricción del uso de aspirina en niños","Solo hepatitis viral sin compromiso neurológico ni encefalopatía","Únicamente convulsiones sin compromiso hepático en el niño"],a:1},
{t:13,q:"¿Qué es la epilepsia en el niño y cómo se clasifica?",opts:["Solo convulsiones febriles sin otras formas de epilepsia en la infancia","Trastorno crónico caracterizado por convulsiones recurrentes no provocadas; se clasifica en focal (un hemisferio) y generalizada (ambos hemisferios); tipos: ausencias, tónico-clónicas, mioclónicas, espasmos infantiles y síndrome de Dravet, entre otros","Solo convulsiones febriles como única forma de epilepsia infantil","Únicamente gran mal tónico-clónico sin otras formas de epilepsia"],a:1},
{t:13,q:"¿Qué son las convulsiones febriles y cuándo son simples o complejas?",opts:["Son lo mismo que la epilepsia sin diferencias clínicas ni pronósticas","Convulsiones provocadas por fiebre entre 6 meses y 5 años; simples: tónico-clónicas generalizadas <15 min, únicas en 24hs, sin déficit neurológico posterior; complejas: focales, >15 min, múltiples en 24hs o con déficit postcrítico (mayor riesgo de epilepsia futura)","Siempre complejas y siempre requieren tratamiento antiepiléptico crónico","Solo se producen en meningitis sin presentación con otras causas de fiebre"],a:1},
{t:13,q:"¿Cuáles son los cuidados de enfermería durante una convulsión en el niño?",opts:["Sujetar fuertemente al niño e introducir un objeto entre los dientes","Proteger de traumatismos sin sujetar al niño, lateralizar la cabeza para evitar broncoaspiración, cronometrar la crisis, mantener la vía aérea permeable, administrar diazepam si dura más de 5 minutos y monitorear signos vitales","Solo controlar el tiempo sin intervenciones activas durante la convulsión","Únicamente administrar antipiréticos sin otras acciones de enfermería"],a:1},
{t:13,q:"¿Qué es la meningitis en el niño y cuáles son sus agentes causales más frecuentes?",opts:["Solo inflamación del cerebro sin compromiso de las meninges","Inflamación de las meninges; viral (más frecuente, mejor pronóstico): enterovirus; bacteriana (más grave): N. meningitidis, S. pneumoniae y H. influenzae en niños no vacunados; produce fiebre, cefalea, rigidez de nuca y fotofobia","Solo por bacterias sin posibilidad de meningitis viral en niños","Únicamente por hongos sin presentación bacteriana ni viral"],a:1},
{t:13,q:"¿Cuáles son los signos meníngeos en el niño mayor y cuál es su significado?",opts:["Son signos cardíacos sin relación con el compromiso meníngeo","Rigidez de nuca (resistencia a la flexión del cuello), signo de Kernig (imposibilidad de extender la rodilla con cadera flexionada) y signo de Brudzinski (flexión involuntaria de rodillas al flexionar el cuello); indican irritación meníngea","Son signos de deshidratación sin relación con la infección del SNC","Solo en adultos sin presentación en niños menores de 10 años"],a:1},
{t:13,q:"¿Cuáles son los cuidados de enfermería en el niño con meningitis bacteriana?",opts:["Solo administrar antibióticos sin otras intervenciones de enfermería","Aislamiento de gotitas hasta 24h de antibiótico, control neurológico frecuente, monitoreo de hipertensión endocraneana, hidratación controlada, mantenimiento de ambiente tranquilo y oscuro, y educación a la familia sobre signos de complicación","Solo aislamiento sin control neurológico ni administración de antibióticos","Únicamente hidratación sin aislamiento ni control neurológico estricto"],a:1},
{t:13,q:"¿Qué es la encefalitis y cómo se diferencia de la meningitis?",opts:["Son exactamente iguales sin diferencias clínicas ni de tratamiento","La encefalitis es inflamación del parénquima cerebral que produce alteración del estado de conciencia, convulsiones, focalidad neurológica y delirio; la meningitis afecta las meninges con rigidez de nuca y fiebre sin necesariamente alterar la conciencia","La encefalitis solo afecta la médula espinal sin compromisos cerebrales","Solo se diferencia por el agente causal sin diferencias clínicas ni de pronóstico"],a:1},
{t:13,q:"¿Cuál es el tratamiento del estado epiléptico en el niño?",opts:["Solo esperar que cese espontáneamente sin tratamiento farmacológico","Benzodiazepinas como primera línea (diazepam rectal o midazolam bucal/IM); si no responde: fenitoína o levetiracetam EV; si persiste: ingreso a UCI con drogas de segunda línea; siempre tratar la causa subyacente identificada","Solo antipiréticos si hay fiebre sin tratamiento específico del estado epiléptico","Únicamente restricción física sin tratamiento farmacológico de ningún tipo"],a:1},
{t:13,q:"¿Cuál es el diagnóstico de la meningitis bacteriana y qué hallazgos se esperan en el LCR?",opts:["Solo con el cuadro clínico sin punción lumbar ni estudios de laboratorio","Punción lumbar: LCR turbio, pleocitosis con predominio de neutrófilos, proteínas elevadas, glucosa baja (menor a 2/3 de la glucemia simultánea); cultivo positivo en bacteriana; hemocultivo y PCR también son útiles para la identificación del agente causal","Solo con hemograma sin necesidad de punción lumbar confirmatorio","Únicamente con tomografía craneal sin punción lumbar como estudio inicial"],a:1},

// ─── TEMA 15 ─── Disfunción del Sistema Endocrino (13)
{t:14,q:"¿Cuáles son las alteraciones del crecimiento más frecuentes en pediatría?",opts:["Solo el gigantismo como única alteración posible del crecimiento","Talla baja (más frecuente; causas: déficit de GH, hipotiroidismo, desnutrición, enfermedades crónicas, causas genéticas); talla alta (más rara; causas: exceso de GH, síndromes genéticos como Marfan) y obesidad como alteración del peso","Solo el enanismo sin otras alteraciones del crecimiento en la infancia","Únicamente alteraciones de peso sin compromiso de la talla lineal"],a:1},
{t:14,q:"¿Qué es la diabetes mellitus tipo 1 en el niño y cuál es su fisiopatología?",opts:["Resistencia a la insulina por obesidad y sedentarismo en el niño","Destrucción autoinmune de las células beta del páncreas que produce déficit absoluto de insulina; la glucosa no puede ingresar a las células, se acumula en sangre (hiperglucemia) y el organismo usa grasa produciendo cetonas (cetoacidosis)","Solo déficit relativo de insulina sin destrucción de células beta","Únicamente exceso de glucagón sin compromisos de las células beta"],a:1},
{t:14,q:"¿Cuáles son los síntomas de presentación de la diabetes tipo 1 en el niño?",opts:["Solo aumento de peso como único síntoma de presentación en la infancia","Poliuria, polidipsia y polifagia (las tres P) con pérdida de peso, astenia, visión borrosa y posible presentación en cetoacidosis diabética con vómitos, dolor abdominal, respiración de Kussmaul y alteración del estado de conciencia","Solo aumento de peso sin los síntomas cardinales de poliuria y polidipsia","Únicamente hipoglucemia como forma de presentación de la DM tipo 1"],a:1},
{t:14,q:"¿Cuáles son los cuidados de enfermería en el niño con diabetes mellitus tipo 1?",opts:["Solo administrar insulina sin educación ni otras intervenciones","Educación intensiva al niño y familia sobre automonitoreo glucémico, técnica de aplicación de insulina, reconocimiento y manejo de hipoglucemia, plan de alimentación, actividad física y ajuste de dosis; control de la HbA1c cada 3 meses","Solo control de la glucemia sin educación diabetológica al niño","Únicamente dieta sin insulina como tratamiento de la DM tipo 1 en niños"],a:1},
{t:14,q:"¿Qué es el hipotiroidismo congénito y por qué es importante su detección precoz?",opts:["Solo afecta al adulto mayor sin presentación en recién nacidos","Déficit de hormonas tiroideas presente desde el nacimiento; si no se trata oportunamente produce cretinismo con daño intelectual irreversible y retraso del crecimiento; el tamizaje neonatal (pesquisa de TSH) permite diagnóstico y tratamiento precoz","Solo produce bocio sin daño neurológico en el recién nacido","Únicamente afecta el crecimiento sin impacto en el desarrollo intelectual"],a:1},
{t:14,q:"¿Cuáles son las manifestaciones del hipotiroidismo congénito no tratado?",opts:["Solo bocio sin otros síntomas en el recién nacido con hipotiroidismo","Ictericia prolongada, hipotonía, macroglosia, fontanela posterior abierta, llanto ronco, estreñimiento, bradicardia, piel seca, y si no se trata: cretinismo con retraso mental grave e irreversible, talla baja y desarrollo sexual retardado","Solo constipación sin otras manifestaciones clínicas del hipotiroidismo","Únicamente problemas de alimentación sin impacto en el desarrollo cerebral"],a:1},
{t:14,q:"¿Qué es el hipertiroidismo en el niño y cuáles son sus causas?",opts:["Solo se produce en adultos sin presentación en la edad pediátrica","Exceso de hormonas tiroideas; causa más frecuente en niños: enfermedad de Graves-Basedow (autoinmune); también puede ser neonatal transitorio por anticuerpos maternos; produce nerviosismo, palpitaciones, pérdida de peso, bocio y exoftalmos","Solo por déficit de yodo sin causas autoinmunes en el niño","Únicamente por nódulos tiroideos sin causas autoinmunes en pediatría"],a:1},
{t:14,q:"¿Qué es la hipocalcemia en el niño y cuáles son sus manifestaciones clínicas?",opts:["Solo produce hipotensión sin manifestaciones neuromusculares en el niño","Niveles bajos de calcio sérico que producen tetania (calambres musculares, espasmo carpopedal, signo de Chvostek y Trousseau), convulsiones, laringoespasmo y prolongación del QT en el ECG; causas: hipoparatiroidismo, déficit de vitamina D, prematurez","Solo aumento de peso sin manifestaciones neuromusculares","Únicamente bradicardia sin otros signos de hipocalcemia en el niño"],a:1},
{t:14,q:"¿Cuál es el tratamiento de la diabetes mellitus tipo 1 en el niño?",opts:["Solo dieta sin insulina como tratamiento de la DM tipo 1 en niños","Insulinoterapia intensificada (múltiples inyecciones o bomba de insulina), plan de alimentación saludable, actividad física regular, automonitoreo glucémico, educación continua al niño y familia, y control periódico con el equipo de diabetología","Solo insulina en ayunas sin monitoreo ni plan de alimentación","Únicamente medicación oral sin insulina en niños con DM tipo 1"],a:1},
{t:14,q:"¿Qué es el pesaje hormonal (tamizaje neonatal) y cuáles son las enfermedades que detecta?",opts:["Solo detecta la PKU sin otras enfermedades en el tamizaje neonatal","Prueba de detección de enfermedades congénitas en el recién nacido en las primeras 48-72 horas de vida; en Argentina detecta hipotiroidismo congénito, fenilcetonuria, fibrosis quística, galactosemia, deficiencia de biotinidasa e hiperplasia suprarrenal congénita","Solo detecta hipotiroidismo sin otras enfermedades metabólicas","Únicamente se realiza a prematuros sin hacerse en niños a término"],a:1},
{t:14,q:"¿Qué es la cetoacidosis diabética y cómo se maneja?",opts:["Solo se produce en adultos sin presentación en niños diabéticos","Complicación grave de la DM tipo 1 con hiperglucemia, cetonemia, acidosis metabólica y deshidratación; manejo: hidratación endovenosa, insulina EV en infusión continua, corrección electrolítica gradual (especialmente potasio) y monitoreo neurológico estricto","Solo se trata con bicarbonato sin hidratación ni insulina","Únicamente con insulina subcutánea sin hidratación ni corrección electrolítica"],a:1},
{t:14,q:"¿Cómo se realiza el automonitoreo glucémico en el niño diabético?",opts:["Solo en el hospital sin posibilidad de monitoreo domiciliario","Punción del pulpejo del dedo con lanceta, aplicación de la gota de sangre en la tira reactiva del glucómetro; se realiza antes de las comidas, 2 horas después, antes de dormir, ante síntomas y en ejercicio; los resultados orientan el ajuste de dosis","Solo en ayunas una vez por día sin otros momentos de monitoreo","Únicamente en el consultorio del médico sin automonitoreo domiciliario"],a:1},
{t:14,q:"¿Cuáles son los objetivos glucémicos en el niño diabético tipo 1?",opts:["Solo la normalización completa de la glucemia en todos los momentos","Glucemia en ayunas 70-130 mg/dl, postprandial menor a 180 mg/dl y HbA1c menor al 7% (menos de 7.5% en niños más pequeños); los objetivos se individualizan según la edad, las capacidades del niño y el riesgo de hipoglucemia","Solo HbA1c menor al 10% sin objetivos de glucemia diaria","Únicamente glucemia en ayunas menor a 100 mg/dl sin objetivos postprandiales"],a:1},

// ─── TEMA 16 ─── Trastornos Musculoesqueléticos (13)
{t:15,q:"¿Cuáles son las lesiones traumáticas más frecuentes en la infancia y la adolescencia?",opts:["Solo las fracturas sin otras lesiones traumáticas posibles en niños","Fracturas (especialmente en radio distal, cúbito y clavícula), luxaciones, esguinces, contusiones y lesiones musculotendinosas; las fracturas en niños tienen características especiales por la presencia del cartílago de crecimiento","Solo las contusiones sin fracturas ni lesiones ligamentarias posibles","Únicamente lesiones de partes blandas sin fracturas posibles en niños por su elasticidad"],a:1},
{t:15,q:"¿Cuáles son las características especiales de las fracturas en niños?",opts:["Iguales a las fracturas del adulto sin características particulares","Los huesos del niño son más flexibles y pueden producir fracturas en tallo verde (un lado del hueso), fracturas de Salter-Harris que comprometen el cartílago de crecimiento, y mayor capacidad de remodelación que en el adulto","Solo fracturas completas sin fracturas en tallo verde en la infancia","Únicamente fracturas de cráneo sin otras formas de fractura en niños"],a:1},
{t:15,q:"¿Cuáles son los cuidados de enfermería en el niño con fractura y yeso?",opts:["Solo administrar analgésicos sin otros cuidados específicos del yeso","Control neurovascular distal (pulsos, sensibilidad, coloración y temperatura de los dedos), vigilancia de signos del síndrome compartimental, cuidado de la piel bajo el yeso, educación a la familia sobre cuidados en el hogar y signos de alarma","Solo cambio de yeso sin control neurovascular ni educación a la familia","Únicamente movilización activa sin controles de la extremidad enyesada"],a:1},
{t:15,q:"¿Qué es el lupus eritematoso sistémico (LES) en el niño?",opts:["Solo una enfermedad de adultos mayores sin presentación en pediatría","Enfermedad autoinmune sistémica que afecta múltiples órganos; más frecuente en adolescentes mujeres; produce erupción en alas de mariposa, artritis, nefritis, serositis, anemia hemolítica y compromiso del SNC; exige seguimiento multidisciplinario","Solo una enfermedad de la piel sin compromiso de órganos internos","Únicamente artritis sin manifestaciones cutáneas ni sistémicas en el niño"],a:1},
{t:15,q:"¿Qué es la artritis idiopática juvenil (AIJ) y cuáles son sus formas de presentación?",opts:["Solo en adultos mayores de 18 años sin presentación en la infancia","Artritis inflamatoria crónica de inicio antes de los 16 años sin causa identificada; formas: oligoarticular (más frecuente), poliarticular, sistémica (enfermedad de Still con fiebre en picos, exantema y serositis) y otras formas","Solo poliarticular como única forma de presentación en niños","Únicamente artritis séptica sin formas autoinmunes en pediatría"],a:1},
{t:15,q:"¿Qué es la artritis séptica en el niño y cómo se trata?",opts:["Solo inflamación autoinmune de las articulaciones sin infección bacteriana","Infección bacteriana de una articulación (Staphylococcus aureus el más frecuente); produce articulación caliente, eritematosa, muy dolorosa con impotencia funcional y fiebre; es una urgencia ortopédica; tratamiento: drenaje quirúrgico + antibióticos EV prolongados","Solo tratamiento con antiinflamatorios sin antibióticos ni drenaje quirúrgico","Únicamente reposo articular sin antibióticos ni cirugía de drenaje"],a:1},
{t:15,q:"¿Cuáles son los cuidados de enfermería en el niño con artritis?",opts:["Solo administrar antiinflamatorios sin otras intervenciones de enfermería","Manejo del dolor (calor/frío, analgésicos), posicionamiento para reducir la rigidez, estimulación de la movilidad dentro del límite del dolor, educación a la familia sobre la enfermedad y su tratamiento, y apoyo psicológico al niño","Solo reposo absoluto sin ninguna movilización ni terapia de posicionamiento","Únicamente control de temperatura sin otras intervenciones de enfermería"],a:1},
{t:15,q:"¿Cómo se evalúan las lesiones traumáticas de partes blandas en el niño?",opts:["Solo con radiografía sin evaluación clínica de las partes blandas","Historia del mecanismo traumático, inspección (edema, equimosis, deformidad), palpación (dolor, crepitación), evaluación de la movilidad activa y pasiva, y comparación con el miembro contralateral; radiografía para descartar fractura asociada","Solo por imagen sin evaluación clínica del niño traumatizado","Únicamente por síntomas referidos por el niño sin examen físico objetivo"],a:1},
{t:15,q:"¿Qué es la osteomielitis en el niño y cuáles son sus características?",opts:["Solo inflamación de los músculos sin compromiso del hueso en niños","Infección del hueso, generalmente bacteriana (S. aureus el más frecuente); localización más frecuente: metáfisis de huesos largos; produce fiebre, dolor localizado, calor e impotencia funcional; diagnóstico: RMN y hemocultivo; tratamiento: antibióticos EV","Solo por hongos sin presentación bacteriana en la infancia","Únicamente afecta las articulaciones sin compromiso del tejido óseo"],a:1},
{t:15,q:"¿Cuál es el tratamiento del LES en el niño?",opts:["Solo antiinflamatorios sin inmunosupresores ni seguimiento multidisciplinario","Depende de la actividad y los órganos comprometidos; base: antipalúdicos (hidroxicloroquina), corticosteroides, inmunosupresores (micofenolato, azatioprina) para nefritis; protección solar; seguimiento nefrológico, reumatológico y psicológico","Solo corticosteroides permanentes sin otros inmunosupresores","Únicamente antipalúdicos sin corticosteroides ni inmunosupresores en ningún caso"],a:1},
{t:15,q:"¿Qué es el síndrome compartimental y cómo se reconoce?",opts:["Solo edema leve sin urgencia quirúrgica ni riesgo para la extremidad","Aumento de presión en un compartimento muscular cerrado que compromete la perfusión; señales de alarma: dolor desproporcionado, dolor al estiramiento pasivo del músculo, parestesias, palidez y ausencia de pulso; es una emergencia quirúrgica que requiere fasciotomía urgente","Solo un problema estético sin consecuencias para la función de la extremidad","Únicamente requiere elevación de la extremidad sin tratamiento quirúrgico"],a:1},
{t:15,q:"¿Cuáles son las lesiones traumáticas más frecuentes en el deporte en adolescentes?",opts:["Solo fracturas en todos los deportes sin otras lesiones posibles","Esguinces de tobillo y rodilla, lesiones del ligamento cruzado anterior, fracturas por estrés, tendinitis, contusiones y luxaciones de hombro; más frecuentes en deportes de contacto y de alta exigencia física","Solo contusiones sin esguinces ni lesiones ligamentarias en deportistas","Únicamente lesiones musculares sin compromisos óseos ni ligamentarios"],a:1},
{t:15,q:"¿Cuál es la importancia del cartílago de crecimiento en las fracturas pediátricas?",opts:["No tiene importancia clínica especial en las fracturas del niño","Es la zona de mayor vulnerabilidad en el hueso del niño; las fracturas que lo afectan (Salter-Harris) pueden producir deformidad y dismetría si no se tratan adecuadamente, especialmente en las de grado III, IV y V","Solo protege el hueso sin riesgo de daño en las fracturas infantiles","Únicamente relevante en los prematuros sin importancia en niños mayores"],a:1},

// ─── TEMA 17 ─── Alteraciones de los Tegumentos (13)
{t:16,q:"¿Qué es la dermatitis y cuáles son sus tipos más frecuentes en la infancia?",opts:["Solo la dermatitis por hongos como único tipo posible en niños","Inflamación de la piel; tipos: atópica (eccema, hereditaria, pruriginosa, crónica y recidivante), de contacto (alérgica o irritativa por sustancias), del pañal (eritema perianal/glúteo) y seborreica (costra láctea en lactantes)","Solo la dermatitis de contacto sin otras formas en la infancia","Únicamente dermatitis infectada sin formas alérgicas en niños"],a:1},
{t:16,q:"¿Cuáles son las características de la dermatitis atópica y su tratamiento?",opts:["Solo lesiones secas sin prurito ni afectación de la calidad de vida","Eccema crónico y recurrente con prurito intenso, piel seca, eritema y vesículas en pliegues de codos y rodillas, cara y cuello; tratamiento: emolientes diarios, corticoides tópicos en los brotes, antihistamínicos, evitar desencadenantes y educación familiar","Solo lesiones exudativas sin prurito como característica principal","Únicamente compromiso del cuero cabelludo sin otras localizaciones"],a:1},
{t:16,q:"¿Qué es la escabiosis (sarna) y cómo se transmite?",opts:["Infestación por piojos sin relación con el ácaro Sarcoptes scabiei","Infestación por el ácaro Sarcoptes scabiei que excava galerías en la epidermis; se transmite por contacto directo prolongado con piel infectada; produce prurito intenso nocturno, surcos acarinos en espacios interdigitales, muñecas y genitales; tratamiento: permetrina tópica","Solo se transmite por contacto con ropa sin infestación directa de la piel","Únicamente afecta el cuero cabelludo sin presentación en otras zonas corporales"],a:1},
{t:16,q:"¿Cuáles son los cuidados de enfermería en el niño con escabiosis?",opts:["Solo aplicar permetrina sin otras medidas de prevención o educación","Aplicación correcta del escabicida (toda la superficie corporal), tratamiento simultáneo de todos los convivientes, lavado de ropa y ropa de cama a alta temperatura, educación sobre el modo de transmisión y prevención de reinfestación","Solo tratar al niño enfermo sin tratar a los contactos convivientes","Únicamente cambio de ropa sin aplicación de tratamiento tópico alguno"],a:1},
{t:16,q:"¿Qué es la pediculosis y cuáles son sus tipos en la infancia?",opts:["Solo una infestación de hongos sin relación con los piojos en niños","Infestación por piojos (Pediculus humanus); tipos: capitis (del cuero cabelludo, la más frecuente en niños escolares), corporis (del cuerpo) y pubis (del pubis, en adolescentes); produce prurito intenso; se transmite por contacto directo cabeza a cabeza","Solo afecta el cuerpo sin infestación del cuero cabelludo en niños","Únicamente en adolescentes sin presentación en niños escolares"],a:1},
{t:16,q:"¿Cuál es el tratamiento de la pediculosis capitis?",opts:["Solo corte del cabello sin tratamiento farmacológico específico","Pediculicidas tópicos (permetrina, malatión) según resistencia local, revisión y eliminación de liendres con peine fino, tratamiento de contactos, lavado de ropa y artículos personales, y educación sobre el modo de transmisión","Solo lavado frecuente del cabello sin pediculicidas tópicos","Únicamente antihistamínicos para el prurito sin tratamiento antiparasitario"],a:1},
{t:16,q:"¿Qué es el acné y cuáles son sus factores desencadenantes en la adolescencia?",opts:["Solo una infección bacteriana grave que requiere siempre antibióticos sistémicos","Enfermedad inflamatoria del folículo pilosebáceo; desencadenantes: andrógenos (aumento en la pubertad), P. acnes, hiperqueratinización folicular; factores agravantes: estrés, cosméticos oclusivos, ciertos alimentos y algunos medicamentos","Solo factores dietéticos sin influencia hormonal ni bacteriana en el acné","Únicamente factor hormonal sin rol de la bacteria P. acnes en el acné"],a:1},
{t:16,q:"¿Cuáles son los grados del acné y su tratamiento según la gravedad?",opts:["Solo un grado de acné con el mismo tratamiento para todos los pacientes","Comedónico (leve: solo retinoides tópicos), papulopustuloso moderado (retinoides + antibióticos tópicos/orales) y nodular grave (isotretinoína sistémica bajo control médico estricto); siempre incluye educación sobre higiene facial y cosmética no comedogénica","Solo tratamiento quirúrgico de lesiones sin tratamiento farmacológico","Únicamente antibióticos sistémicos sin retinoides tópicos en ningún grado"],a:1},
{t:16,q:"¿Cuáles son los cuidados de enfermería en el adolescente con acné?",opts:["Solo indicar no tocarse las lesiones sin otras intervenciones de enfermería","Educación sobre higiene facial adecuada, uso correcto de medicamentos tópicos y sistémicos, impacto emocional del acné en la autoimagen, adherencia al tratamiento, fotoprotección si usa retinoides y derivación al dermatólogo cuando corresponda","Solo prescribir antibióticos sin educación ni seguimiento del adolescente","Únicamente apoyo emocional sin intervención farmacológica ni educativa"],a:1},
{t:16,q:"¿Qué es el impétigo y cómo se trata en el niño?",opts:["Solo una infección viral de la piel sin tratamiento antibiótico","Infección bacteriana superficial de la piel (S. aureus o estreptococo); produce costras melicéricas amarillentas, generalmente en cara y extremidades; tratamiento: antibióticos tópicos (mupirocina) en casos leves y sistémicos en casos extensos o complicados","Solo una dermatitis sin tratamiento antibiótico de ningún tipo","Únicamente antisépticos sin antibióticos tópicos ni sistémicos"],a:1},
{t:16,q:"¿Cuáles son las medidas de prevención de enfermedades de la piel en la infancia?",opts:["Solo el baño diario como única medida preventiva de enfermedades cutáneas","Higiene corporal adecuada, cambio frecuente de ropa, uso de ropa de algodón, control de humedad (especialmente en pliegues), protección solar, uso de emolientes en piel seca y detección temprana de infestaciones para evitar el contagio familiar","Solo la aplicación de crema hidratante sin otras medidas preventivas","Únicamente evitar el contacto social sin otras medidas de higiene"],a:1},
{t:16,q:"¿Cómo se realiza el diagnóstico diferencial entre escabiosis y pediculosis?",opts:["Son la misma enfermedad con el mismo tratamiento sin diferencias","Escabiosis: surcos acarinos, prurito nocturno intenso, toda la familia afectada, distribución en pliegues y genitales; pediculosis: liendres en el tallo del pelo, prurito en el cuero cabelludo, transmisión en ambiente escolar; diagnóstico: examen clínico y lupa si es necesario","Solo se diferencian por el agente tratante sin diferencias clínicas","Únicamente por la edad del niño sin diferencias en las manifestaciones"],a:1},
{t:16,q:"¿Cuál es el impacto psicológico de las enfermedades cutáneas en el niño y el adolescente?",opts:["Las enfermedades de la piel no producen impacto psicológico en ninguna edad","Pueden producir baja autoestima, aislamiento social, burlas en el ámbito escolar, ansiedad y depresión especialmente en adolescentes con acné visible o dermatitis crónica; el abordaje integral debe incluir el apoyo psicológico","Solo impacto estético sin consecuencias emocionales en ninguna edad","Únicamente en adultos sin impacto psicológico en niños ni adolescentes"],a:1},

// ─── TEMA 18 ─── Problemas de Salud en la Adolescencia (13)
{t:17,q:"¿Cuáles son las características del consumo problemático de sustancias en adolescentes?",opts:["Solo el consumo de alcohol sin otras sustancias en la adolescencia","Uso repetido de sustancias (alcohol, tabaco, cannabis, cocaína, psicofármacos) con impacto en la salud, el rendimiento escolar y las relaciones sociales; factores de riesgo: familia disfuncional, pares consumidores, baja autoestima y escasa contención","Solo el consumo de cannabis sin otras sustancias en la adolescencia","Únicamente el consumo ocasional sin consecuencias para la salud del adolescente"],a:1},
{t:17,q:"¿Cuál es el rol de enfermería en la prevención del alcoholismo en adolescentes?",opts:["Solo informar sobre los riesgos sin intervención activa de enfermería","Educación sobre efectos del alcohol en el organismo adolescente, identificación de factores de riesgo, derivación a consejería, participación en programas de prevención escolar y fortalecimiento de los factores protectores del adolescente","Solo derivar al psicólogo sin intervenciones educativas propias","Únicamente administración de medicamentos sin educación ni prevención"],a:1},
{t:17,q:"¿Cuáles son las consecuencias del tabaquismo iniciado en la adolescencia?",opts:["El tabaco no produce consecuencias si se inicia en la adolescencia","Mayor riesgo de dependencia, daño pulmonar precoz, peor rendimiento deportivo, cáncer a largo plazo, enfermedades cardiovasculares, bronquitis crónica y dificultad para dejar de fumar en la vida adulta por la instalación temprana de la dependencia nicotínica","Solo consecuencias estéticas sin efectos sobre la salud orgánica","Únicamente consecuencias cardíacas sin compromiso pulmonar ni otras patologías"],a:1},
{t:17,q:"¿Qué es la blenorragia (gonorrea) en el adolescente y cómo se previene?",opts:["Solo afecta a personas mayores de 30 años sin presentación en adolescentes","Infección de transmisión sexual por Neisseria gonorrhoeae; en adolescentes produce uretritis con secreción purulenta en varones y puede ser asintomática en mujeres; prevención: uso correcto del preservativo, educación sexual y detección temprana","Solo se transmite por beso sin relación con las prácticas sexuales","Únicamente por vía sanguínea sin transmisión sexual en la adolescencia"],a:1},
{t:17,q:"¿Cuál es el abordaje del VIH/SIDA en la adolescencia?",opts:["Solo tratamiento médico sin prevención ni educación en la adolescencia","Prevención mediante educación sexual integral, uso del preservativo, conocer el estado serológico; tratamiento antirretroviral que controla la infección; abordar el estigma, la adherencia al tratamiento y el apoyo psicosocial del adolescente","Solo abstinencia sexual como única medida preventiva en la adolescencia","Únicamente información sobre la enfermedad sin acceso a preservativos ni tratamiento"],a:1},
{t:17,q:"¿Qué es la sífilis en el adolescente y cuáles son sus etapas de presentación?",opts:["Solo afecta a adultos sin presentación en la población adolescente","Infección de transmisión sexual por Treponema pallidum; etapas: primaria (chancro indoloro en el sitio de inoculación), secundaria (rash, adenopatías, malestar), latente (sin síntomas) y terciaria (compromiso cardiovascular y del SNC años después)","Solo produce lesiones cutáneas sin compromiso de órganos internos","Únicamente se presenta en estadio terciario sin fases previas en adolescentes"],a:1},
{t:17,q:"¿Qué es el maltrato infantil y cuáles son sus tipos?",opts:["Solo el abuso físico visible sin otras formas de maltrato posibles","Cualquier forma de daño no accidental a un menor; tipos: físico (golpes, quemaduras), emocional/psicológico (humillación, rechazo), sexual (contacto o no contacto), negligencia (omisión de cuidados básicos) y el presenciado (violencia doméstica)","Solo el abuso sexual como único tipo de maltrato reconocido","Únicamente la negligencia sin otras formas de maltrato en la infancia"],a:1},
{t:17,q:"¿Cuál es el rol del enfermero ante la sospecha de maltrato infantil?",opts:["Solo registrar lo observado sin intervención directa ni denuncia","Registro objetivo y detallado de los hallazgos clínicos, comunicación al equipo de salud, activación de la red de protección infanto-juvenil, denuncia obligatoria según ley, y apoyo al niño sin presionar para que cuente lo sucedido","Solo derivar al médico sin ninguna intervención directa del enfermero","Únicamente hablar con los padres sin hacer la denuncia correspondiente"],a:1},
{t:17,q:"¿Qué es la depresión en el adolescente y cuáles son sus señales de alarma?",opts:["Solo tristeza pasajera sin consecuencias para la salud del adolescente","Trastorno del estado de ánimo con tristeza persistente, pérdida del placer, alteraciones del sueño y apetito, baja autoestima, dificultad de concentración y pensamientos de muerte; señales de alarma: aislamiento, cambios de conducta y expresiones de desesperanza","Solo bajo rendimiento escolar sin otros síntomas de depresión","Únicamente llanto frecuente sin otros signos depresivos en el adolescente"],a:1},
{t:17,q:"¿Cuáles son los factores protectores de la salud mental en la adolescencia?",opts:["Solo la medicación psiquiátrica como factor protector de la salud mental","Vínculo familiar sólido, autoestima positiva, red de pares saludables, acceso a actividades deportivas y artísticas, educación de calidad, habilidades para resolver conflictos y adultos de referencia disponibles y confiables","Solo la ausencia de enfermedades físicas sin factores psicosociales","Únicamente el nivel socioeconómico alto sin otros factores protectores"],a:1},
{t:17,q:"¿Cuáles son las características del embarazo adolescente y sus riesgos?",opts:["El embarazo adolescente no tiene riesgos diferentes al de mujeres adultas","Mayor riesgo de preeclampsia, anemia, bajo peso al nacer, parto prematuro, deserción escolar, impacto en el proyecto de vida y vulnerabilidad de la madre y el recién nacido; requiere abordaje multidisciplinario y social","Solo riesgos para el bebé sin consecuencias para la adolescente madre","Únicamente riesgo de parto prematuro sin otros riesgos obstétricos ni sociales"],a:1},
{t:17,q:"¿Cómo abordar la prevención de las enfermedades de transmisión sexual en adolescentes?",opts:["Solo abstinencia sexual sin información sobre métodos de barrera","Educación sexual integral, información objetiva sobre ETS y su prevención, acceso a preservativos, vacunación contra HPV y hepatitis B, consejería confidencial y espacios de salud amigables para adolescentes sin juicio ni estigma","Solo la vacunación sin educación sobre comportamiento sexual seguro","Únicamente información teórica sin acceso a métodos preventivos concretos"],a:1},
{t:17,q:"¿Cuál es el abordaje de la drogadicción en el adolescente desde la enfermería?",opts:["Solo informar sobre los daños de las drogas sin otras intervenciones","Identificación precoz de consumo problemático, abordaje sin estigma, derivación a equipos especializados (CPA), educación a la familia, fortalecimiento de factores protectores y seguimiento del adolescente en el centro de salud","Solo derivar a internación sin abordaje ambulatorio previo","Únicamente sancionar al adolescente sin abordaje terapéutico ni de prevención"],a:1},

// ─── TEMA 19 ─── Quemaduras (13)
{t:18,q:"¿Cómo se clasifican las quemaduras según su profundidad?",opts:["Solo en leves y graves sin subdivisión por profundidad del tejido","Primer grado (solo epidermis: eritema, sin ampollas, dolor intenso), segundo grado (epidermis y dermis: ampollas, húmedo, muy doloroso) y tercer grado (espesor total: piel acartonada, indoloro, riesgo de infección)","Solo en superficiales y profundas sin subdivisión más específica","Únicamente por el agente causante sin considerar la profundidad"],a:1},
{t:18,q:"¿Cómo se estima la extensión de las quemaduras en el niño?",opts:["Solo por la superficie quemada en cm² sin relación con el peso","Regla de los 9 modificada para niños (la cabeza tiene mayor proporción que en adultos) o tabla de Lund y Browder; la extensión determina la gravedad, la necesidad de hospitalización y la fluidoterapia de reposición","Solo por la profundidad sin considerar la extensión en el niño","Únicamente por la localización sin estimar la superficie quemada"],a:1},
{t:18,q:"¿Cuáles son los criterios de hospitalización en el niño con quemaduras?",opts:["Solo quemaduras de tercer grado sin otros criterios de internación","Quemaduras >10% SCT en niños, tercer grado en cualquier extensión, quemaduras en cara/manos/genitales/articulaciones, lesión inhalatoria, sospecha de maltrato, quemaduras circulares y niños menores de 2 años con cualquier quemadura relevante","Solo quemaduras >50% de SCT sin otros criterios de internación","Únicamente quemaduras químicas sin criterios para quemaduras térmicas"],a:1},
{t:18,q:"¿Cuál es el tratamiento inmediato de una quemadura en el niño?",opts:["Aplicar mantequilla o pasta de dientes como primeros auxilios","Retirar la ropa y joyas, enfriar la zona con agua fresca (no helada) durante 15-20 minutos, cubrir con apósito limpio y no adhesivo, no pinchar las ampollas, analgesia y traslado si corresponde; NO aplicar pastas, grasas ni elementos caseros","Solo aplicar hielo durante 30 minutos sin otros cuidados inmediatos","Únicamente cubrir con vendaje sin enfriar ni analgesia en los primeros auxilios"],a:1},
{t:18,q:"¿Cuál es la semiología de las quemaduras en el niño?",opts:["Solo el color de la piel sin otros parámetros de la evaluación semiólogica","Profundidad (grado), extensión (% SCT), localización (zonas especiales), agente causal, tiempo de exposición, mecanismo, presencia de lesión inhalatoria, signos de infección y estado general del niño quemado","Solo el porcentaje de superficie afectada sin otras variables semiólogicas","Únicamente el agente causante sin evaluación de la profundidad ni extensión"],a:1},
{t:18,q:"¿Cuáles son los cuidados de enfermería en el niño hospitalizado por quemaduras?",opts:["Solo administrar analgésicos sin otros cuidados de enfermería específicos","Control de signos vitales, manejo del dolor (analgesia y ansiólisis antes de las curaciones), fluidoterapia de reposición, cuidado de heridas con técnica aséptica, prevención de infección, nutrición hipercalórica e hiperproteica y apoyo emocional al niño y familia","Solo cambio de apósitos sin control de signos vitales ni hidratación","Únicamente reposo sin intervenciones activas de enfermería en el quemado"],a:1},
{t:18,q:"¿Cuáles son las principales complicaciones de las quemaduras graves en el niño?",opts:["Solo cicatrices estéticas sin complicaciones funcionales ni sistémicas","Shock hipovolémico, infección y sepsis, síndrome de inhalación, insuficiencia renal, hipotermia, cicatrices hipertróficas y queloides, contracturas articulares y secuelas psicológicas por el trauma","Solo infección local sin complicaciones sistémicas en las quemaduras","Únicamente cicatrices sin compromiso funcional ni sistémico"],a:1},
{t:18,q:"¿Cuáles son las secuelas de las quemaduras graves en el niño?",opts:["No existen secuelas; todas las quemaduras curan completamente","Cicatrices hipertróficas y queloides, contracturas articulares que limitan la movilidad, alteraciones del desarrollo emocional y la imagen corporal, secuelas funcionales según la localización y posible necesidad de cirugías reconstructivas múltiples","Solo cicatrices cosméticas sin limitaciones funcionales o emocionales","Únicamente secuelas emocionales sin cicatrices ni limitaciones funcionales"],a:1},
{t:18,q:"¿Cómo se previenen las quemaduras en el hogar con niños?",opts:["Las quemaduras no pueden prevenirse porque son accidentes inevitables","Supervisión adulta constante, colocar barreras en la cocina, regular la temperatura del agua caliente a menos de 50°C, colocar enchufes con tapa, mantener fuera del alcance los fósforos y encendedores, y educación sobre el peligro del fuego","Solo supervisar en la cocina sin otras medidas preventivas en el hogar","Únicamente medidas técnicas sin educación al niño sobre los peligros del fuego"],a:1},
{t:18,q:"¿Qué es el síndrome de inhalación y cómo se reconoce?",opts:["Solo irritación leve de la garganta sin compromiso pulmonar real","Lesión de la vía aérea y los pulmones por inhalación de humo, gases calientes o tóxicos; signos: quemaduras en cara y narinas, pelo chamuscado, voz ronca, estridor, disnea, expectoración carbonácea y desaturación; es la principal causa de muerte en incendios","Solo tos seca sin otros signos de compromiso de la vía aérea","Únicamente sangrado nasal sin compromiso de la vía aérea inferior"],a:1},
{t:18,q:"¿Cuál es la fluidoterapia estándar en el niño quemado?",opts:["Solo agua oral en todos los casos sin necesidad de vía endovenosa","Fórmula de Parkland: 3-4 ml/kg/% SCT quemada de solución de Ringer lactato en 24 horas, con la mitad en las primeras 8 horas y la mitad restante en las siguientes 16 horas; ajustar según diuresis y signos vitales","Solo solución glucosada sin electrolitos en el niño quemado","Únicamente plasma fresco sin soluciones cristaloides en los primeros cuidados"],a:1},
{t:18,q:"¿Cómo se realiza la curación de las quemaduras en el niño?",opts:["Solo limpieza con agua de la canilla sin técnica aséptica específica","Con técnica aséptica: limpieza con solución fisiológica o antiséptico según la herida, desbridamiento del tejido necrótico, aplicación de apósito apropiado (hidrogel para quemaduras superficiales, plata nanocristalina para infectadas), con analgesia previa","Solo apósitos con antibióticos tópicos sin limpieza previa de la herida","Únicamente pomadas caseras sin técnica específica ni analgesia previa"],a:1},
{t:18,q:"¿Cuál es el impacto psicológico de las quemaduras en el niño y su familia?",opts:["Las quemaduras no producen impacto psicológico en ninguna edad ni en la familia","Generan trauma emocional, miedo al dolor y a los procedimientos, distorsión de la imagen corporal, ansiedad, depresión y en la familia: culpa intensa, estrés postraumático y sobreprotección; requieren apoyo psicológico especializado para el niño y la familia","Solo impacto en la familia sin consecuencias psicológicas en el niño","Únicamente durante la hospitalización sin secuelas emocionales posteriores"],a:1},

// ─── TEMA 20 ─── Primeros Auxilios en Pediatría (13)
{t:19,q:"¿Cómo se clasifica una fractura en la infancia y cuáles son los primeros auxilios?",opts:["Solo en completa e incompleta sin primeros auxilios específicos posibles","Abiertas (hueso visible) y cerradas (sin exposición); incompletas (tallo verde) y completas; primeros auxilios: inmovilizar sin reducir, no forzar la posición, cubrir en fractura expuesta con apósito limpio, analgesia y traslado urgente","Solo compresas frías sin inmovilización como únicos primeros auxilios","Únicamente inmovilización sin control de sangrado ni traslado urgente"],a:1},
{t:19,q:"¿Cómo se realiza la RCP básica en el niño de 1 a 8 años?",opts:["Igual que en el adulto con 30 compresiones y 2 respiraciones sin adaptación","Verificar seguridad, llamar ayuda, abrir la vía aérea (hiperextensión moderada), 5 ventilaciones de rescate iniciales, 30 compresiones torácicas con 2 dedos o 1 mano al tercio inferior del esternón, relación 30:2; DEA disponible lo antes posible","Solo respiraciones boca a boca sin compresiones cardíacas externas","Únicamente compresiones sin respiraciones de rescate en ningún niño"],a:1},
{t:19,q:"¿Cuáles son las diferencias de la RCP en el lactante respecto al niño mayor?",opts:["La RCP en el lactante es exactamente igual a la del adulto sin adaptaciones","En el lactante: hiperextensión leve del cuello (posición neutra), ventilaciones boca-nariz-boca, compresiones con 2 dedos en el tercio inferior del esternón (técnica de dos pulgares si hay 2 reanimadores), profundidad de 4 cm; mismo ritmo 30:2","Solo respiraciones más suaves sin modificar las compresiones en el lactante","Únicamente compresiones sin ventilaciones de rescate en el lactante"],a:1},
{t:19,q:"¿Cuáles son los tipos de intoxicaciones en el niño según la sustancia?",opts:["Solo medicamentos sin otras sustancias causantes de intoxicación","Medicamentos (principales en la infancia), productos del hogar (limpiadores, plaguicidas), plantas, setas, metales pesados, monóxido de carbono y drogas de abuso en adolescentes; cada una con manejo específico","Solo plaguicidas sin otras sustancias tóxicas en la infancia","Únicamente intoxicaciones alimentarias sin intoxicaciones por productos del hogar"],a:1},
{t:19,q:"¿Cuáles son los primeros auxilios ante una intoxicación medicamentosa en el niño?",opts:["Provocar el vómito siempre como primera medida ante cualquier intoxicación","Llamar al SAME/Centro de Toxicología, identificar la sustancia y la cantidad ingerida, no provocar vómito sin indicación médica (contraindicado en cáusticos y derivados del petróleo), trasladar al hospital con el envase del producto","Solo dar leche o agua antes de ir al hospital sin otras medidas","Únicamente carbón activado en el hogar sin consulta médica previa"],a:1},
{t:19,q:"¿Cuál es el manejo de los cuerpos extraños en la vía aérea del niño?",opts:["Solo golpes en la espalda sin maniobra de Heimlich en ningún caso","Lactante consciente: 5 palmadas en la espalda y 5 compresiones en el tórax; niño mayor de 1 año consciente: maniobra de Heimlich (compresiones subdiafragmáticas); si pierde la conciencia: iniciar RCP y visualizar el cuerpo extraño en cada apertura de la boca","Solo la maniobra de Heimlich igual que en el adulto para todas las edades","Únicamente traslado urgente sin maniobras de desobstrucción en el hogar"],a:1},
{t:19,q:"¿Cuál es el manejo de las mordeduras en el niño?",opts:["Solo cubrir la herida sin necesidad de lavado ni evaluación médica","Lavar abundantemente con agua y jabón durante 10-15 minutos, desinfectar, evaluar la gravedad de la herida, vacunación antitetánica y antirrábica según el caso, antibióticos si riesgo de infección, y denuncia si hay sospecha de animal no vacunado","Solo aplicar antiséptico sin lavado previo ni evaluación médica","Únicamente suturar la herida sin lavado ni profilaxis antirrábica"],a:1},
{t:19,q:"¿Cómo actuar ante un niño con convulsión en el hogar?",opts:["Sujetar al niño fuertemente para evitar movimientos durante la convulsión","Proteger de golpes sin sujetar, lateralizar la cabeza, cronometrar la duración, no introducir objetos en la boca, llamar al 107 si dura más de 5 minutos o es la primera convulsión, y observar el estado postictal","Solo introducir el dedo para evitar que se muerda la lengua","Únicamente administrar antipiréticos sin otras acciones de primeros auxilios"],a:1},
{t:19,q:"¿Cuáles son los signos de alarma que requieren traslado urgente en el niño?",opts:["Solo la fiebre alta como único signo que requiere traslado urgente","Dificultad respiratoria intensa, convulsión, alteración del estado de conciencia, cianosis, signos de deshidratación grave, sangrado activo no controlado, traumatismo de cráneo con pérdida de conciencia y shock son indicaciones de traslado urgente","Solo el sangrado como único signo de alarma sin otros criterios de urgencia","Únicamente vómitos sin otros signos de alarma en la infancia"],a:1},
{t:19,q:"¿Cómo se actuaría ante un niño que ingirió un cáustico?",opts:["Provocar el vómito de inmediato para eliminar el cáustico del estómago","No provocar vómito (provoca doble quemadura), no neutralizar, no dar leche; dar agua o leche en pequeñas cantidades solo si el centro de toxicología lo indica, traslado urgente con el envase, y evaluación de quemaduras en boca y vía aérea","Solo dar leche para neutralizar el cáustico antes del traslado","Únicamente traslado sin ninguna medida en el lugar del accidente"],a:1},
{t:19,q:"¿Cuáles son los cuidados de enfermería en el niño accidentado en urgencias?",opts:["Solo controlar signos vitales sin otras intervenciones de enfermería","Evaluación ABCDE, control de signos vitales, vía permeable, control de sangrado, inmovilización si hay fractura, alivio del dolor, control de temperatura, comunicación continua con el niño y la familia, y registro detallado de todos los hallazgos","Solo analgesia sin otras intervenciones en el niño accidentado","Únicamente traslado sin intervenciones antes de llegar al hospital"],a:1},
{t:19,q:"¿Cuál es el manejo del traumatismo craneoencefálico leve en el niño?",opts:["Solo reposo en casa sin ningún criterio de observación ni consulta médica","Observación hospitalaria o domiciliaria según criterios de gravedad, signos de alarma (vómitos repetidos, pérdida de conciencia, fontanela abombada, convulsiones), educación a los padres sobre síntomas de alarma, y TAC si hay criterios clínicos específicos","Solo TAC de cráneo inmediata en todos los traumatismos sin excepción","Únicamente analgésicos sin ningún criterio de evaluación neurológica"],a:1},
{t:19,q:"¿Cuáles son las medidas de prevención de accidentes en la infancia?",opts:["Los accidentes no pueden prevenirse porque siempre son imprevisibles","Supervisión adulta apropiada a la edad, sillas de seguridad en el auto, casco en bicicleta, barandas en escaleras y camas, protección de enchufes, guardado seguro de medicamentos y productos tóxicos, y natación supervisada para prevenir ahogamientos","Solo supervisión visual sin otras medidas preventivas en el hogar","Únicamente el uso de casco sin otras medidas de prevención de accidentes"],a:1},
];

let temaSeleccionado = null;
let questions = [], current = 0, score = 0;
let timer = null, timeLeft = TIME, answered = false;

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepQ(pool, n) {
  return shuffleArray(pool).slice(0, n).map(q => {
    const correctText = q.opts[q.a];
    const shuffled = shuffleArray([...q.opts]);
    return { ...q, shuffledOpts: shuffled, correctText };
  });
}

function renderStart() {
  clearInterval(timer);
  const temasBtns = temas.map((t, i) => `<button class="mode-btn" onclick="seleccionarTema(${i})">${t}</button>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="mode-card">
      <h2>Elegí el modo de juego</h2>
      <button class="mode-btn all-btn" onclick="iniciarTodos()">🎯 Todos los temas — 13 preguntas aleatorias (260 en total)</button>
      <div style="margin:12px 0;font-size:0.82rem;color:var(--muted);text-align:center;font-weight:700;">── O practicá por tema ──</div>
      <div class="mode-btns">${temasBtns}</div>
    </div>`;
}

function seleccionarTema(idx) {
  temaSeleccionado = idx;
  const pool = allQ.filter(q => q.t === idx);
  questions = prepQ(pool, pool.length);
  current = 0; score = 0;
  renderQuestion();
}

function iniciarTodos() {
  temaSeleccionado = null;
  questions = prepQ(allQ, 13);
  current = 0; score = 0;
  renderQuestion();
}

function renderQuestion() {
  answered = false; timeLeft = TIME;
  clearInterval(timer);
  const q = questions[current];
  const total = questions.length;
  const pct = Math.round((current / total) * 100);
  const C = 2 * Math.PI * 24;

  document.getElementById('content').innerHTML = `
    <div class="progress-row">
      <div class="progress-wrap"><div class="progress-fill" id="pbar" style="width:${pct}%"></div></div>
      <div class="progress-label">${current + 1} / ${total}</div>
    </div>
    <div class="question-card">
      <div class="q-meta">${temas[q.t]}</div>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="timer-row">
      <div class="timer-circle">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="24" fill="none" stroke="#e5e7eb" stroke-width="5"/>
          <circle id="timer-arc" cx="28" cy="28" r="24" fill="none" stroke="#0891b2" stroke-width="5"
            stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="0" stroke-linecap="round"/>
        </svg>
        <div class="timer-num" id="tnum">${TIME}</div>
      </div>
      <div class="timer-info">
        <div class="t-label" id="tl-label">Segundos restantes</div>
        <div class="t-msg">¡Elegí tu respuesta!</div>
      </div>
    </div>
    <div class="options" id="opts">
      ${q.shuffledOpts.map((o, i) => `<button class="opt-btn" onclick="choose(${i})">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="nav-btn" id="next-btn" style="display:none" onclick="next()">${current + 1 < total ? 'Siguiente pregunta →' : 'Ver resultados'}</button>`;

  timer = setInterval(() => {
    timeLeft--;
    const el = document.getElementById('tnum');
    const arc = document.getElementById('timer-arc');
    const lbl = document.getElementById('tl-label');
    if (el) el.textContent = timeLeft;
    if (arc) {
      arc.style.strokeDashoffset = (C * (1 - timeLeft / TIME)).toFixed(1);
      arc.style.stroke = timeLeft <= 7 ? '#E24B4A' : '#0891b2';
    }
    if (lbl) lbl.style.color = timeLeft <= 7 ? '#b91c1c' : '';
    if (timeLeft <= 0) { clearInterval(timer); if (!answered) timeUp(); }
  }, 1000);
}

function choose(idx) {
  if (answered) return;
  answered = true; clearInterval(timer);
  const q = questions[current];
  const btns = document.querySelectorAll('.opt-btn');
  const fb = document.getElementById('fb');
  const nextBtn = document.getElementById('next-btn');
  btns.forEach(b => b.disabled = true);
  btns.forEach((b, i) => { if (q.shuffledOpts[i] === q.correctText) b.classList.add('correct'); });
  if (q.shuffledOpts[idx] === q.correctText) {
    score++;
    btns[idx].classList.add('correct');
    fb.innerHTML = '✅ ¡Correcto!';
    fb.className = 'feedback ok';
  } else {
    btns[idx].classList.add('wrong');
    fb.innerHTML = '❌ Incorrecto. La respuesta correcta está marcada en verde.';
    fb.className = 'feedback fail';
  }
  nextBtn.style.display = 'block';
}

function timeUp() {
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.opt-btn');
  const fb = document.getElementById('fb');
  const nextBtn = document.getElementById('next-btn');
  btns.forEach(b => b.disabled = true);
  btns.forEach((b, i) => { if (q.shuffledOpts[i] === q.correctText) b.classList.add('correct'); });
  fb.innerHTML = '⏱️ ¡Tiempo! La respuesta correcta está marcada en verde.';
  fb.className = 'feedback fail';
  nextBtn.style.display = 'block';
}

function next() {
  current++;
  if (current >= questions.length) renderResult();
  else renderQuestion();
}

function renderResult() {
  clearInterval(timer);
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  let msg = '';
  if (pct >= 85) msg = '🏆 ¡Excelente! Estás muy preparado/a para el examen.';
  else if (pct >= 60) msg = '👍 Buen repaso. Revisá los temas donde fallaste.';
  else msg = '📖 Seguí estudiando, ¡podés mejorar mucho!';
  const temaNombre = temaSeleccionado !== null ? temas[temaSeleccionado] : 'Todos los temas';

  document.getElementById('content').innerHTML = `
    <div class="result-card">
      <h2>Trivia finalizada</h2>
      <div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.5rem;">${temaNombre}</div>
      <div class="score-big">${score}/${total}</div>
      <div class="score-sub">${pct}% de respuestas correctas</div>
      <div class="result-msg">${msg}</div>
      <div class="result-footer">Enfermería Infanto Juvenil · Lic. Francisco Molina<br>CENT N° 74 — ATSA — 3° Año</div>
      <button class="nav-btn" onclick="renderStart()">Volver al menú principal</button>
      ${temaSeleccionado !== null ? `<button class="nav-btn-sec" onclick="seleccionarTema(${temaSeleccionado})">Repetir este tema</button>` : `<button class="nav-btn-sec" onclick="iniciarTodos()">Jugar de nuevo</button>`}
    </div>`;
}

renderStart();
</script>
</body>
</html>
