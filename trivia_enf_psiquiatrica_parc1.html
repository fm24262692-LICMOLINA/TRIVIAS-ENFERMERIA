<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia – Enfermería Psiquiátrica y Salud Mental | 1° Parcial</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --accent: #3fb950;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --muted: #8b949e;
    --correct: #2ea043;
    --wrong: #da3633;
    --timer-ok: #3fb950;
    --timer-warn: #e3b341;
    --timer-danger: #da3633;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 32px;
    max-width: 760px;
    width: 100%;
  }
  .header .badge {
    display: inline-block;
    background: #21262d;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: .08em;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 13px;
    color: var(--muted);
  }
  .header .prof {
    font-size: 12px;
    color: var(--accent4);
    margin-top: 4px;
  }

  /* THEME SELECTOR */
  #theme-screen {
    max-width: 760px;
    width: 100%;
  }
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 14px;
    margin-top: 8px;
  }
  .theme-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
    cursor: pointer;
    text-align: left;
    transition: border-color .2s, background .2s;
    color: var(--text);
  }
  .theme-btn:hover {
    border-color: var(--accent2);
    background: var(--surface2);
  }
  .theme-btn .num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    margin-bottom: 6px;
    display: block;
  }
  .theme-btn .ttitle {
    font-weight: 600;
    font-size: 14px;
    line-height: 1.3;
  }
  .theme-btn .tsub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.4;
  }

  /* QUIZ SCREEN */
  #quiz-screen { display: none; max-width: 760px; width: 100%; }

  .quiz-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .back-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    transition: border-color .2s, color .2s;
  }
  .back-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .quiz-meta {
    flex: 1;
    font-size: 12px;
    color: var(--muted);
  }
  .quiz-meta strong { color: var(--text); }

  /* PROGRESS */
  .progress-bar-wrap {
    background: var(--surface);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent2);
    border-radius: 4px;
    transition: width .4s ease;
  }

  /* TIMER */
  .timer-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .timer-label {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    min-width: 52px;
    transition: color .3s;
  }
  .timer-bar-wrap {
    flex: 1;
    background: var(--surface);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .timer-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .9s linear, background .5s;
  }

  /* QUESTION */
  .question-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .question-text {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 24px;
    color: var(--text);
  }

  /* OPTIONS */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  @media (max-width: 520px) {
    .options-grid { grid-template-columns: 1fr; }
  }
  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    text-align: left;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    line-height: 1.4;
    color: var(--text);
    transition: border-color .15s, background .15s;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: var(--surface2);
  }
  .option-btn .opt-letter {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent2);
    min-width: 16px;
    padding-top: 2px;
    flex-shrink: 0;
  }
  .option-btn.correct {
    border-color: var(--correct);
    background: rgba(46,160,67,.12);
  }
  .option-btn.correct .opt-letter { color: var(--correct); }
  .option-btn.wrong {
    border-color: var(--wrong);
    background: rgba(218,54,51,.1);
  }
  .option-btn.wrong .opt-letter { color: var(--wrong); }
  .option-btn.reveal {
    border-color: var(--correct);
    background: rgba(46,160,67,.08);
  }
  .option-btn:disabled { cursor: default; }

  /* FEEDBACK */
  .feedback {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 20px;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback strong { color: var(--text); }

  /* NEXT BTN */
  .next-btn {
    background: var(--accent2);
    color: #0d1117;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 28px;
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    display: none;
    transition: opacity .2s;
  }
  .next-btn:hover { opacity: .88; }
  .next-btn.show { display: inline-block; }

  /* RESULT SCREEN */
  #result-screen { display: none; max-width: 760px; width: 100%; text-align: center; padding: 40px 0; }
  .result-score {
    font-family: 'Space Mono', monospace;
    font-size: 72px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-label { font-size: 15px; color: var(--muted); margin-bottom: 24px; }
  .result-msg { font-size: 18px; font-weight: 600; margin-bottom: 32px; }
  .result-details {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 28px;
    text-align: left;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row span:last-child { color: var(--text); font-weight: 600; }
  .result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .result-btns button {
    padding: 10px 24px;
    border-radius: var(--radius-sm);
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-retry { background: var(--accent2); color: #0d1117; border: none; }
  .btn-home { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-retry:hover, .btn-home:hover { opacity: .8; }
</style>
</head>
<body>

<div class="header">
  <div class="badge">Enfermería Psiquiátrica y Salud Mental</div>
  <h1>Trivia — 1° Parcial</h1>
  <p>Seleccioná un tema para comenzar el repaso</p>
  <p class="prof">Prof. Lic. Francisco Molina — CENT N°74 ATSA Tucumán</p>
</div>

<!-- PANTALLA: SELECCIÓN DE TEMA -->
<div id="theme-screen">
  <div class="theme-grid">
    <button class="theme-btn" onclick="startQuiz(0)">
      <span class="num">Tema 2</span>
      <div class="ttitle">El Equipo Psiquiátrico</div>
      <div class="tsub">Miembros, funciones y características de la enfermería psiquiátrica</div>
    </button>
    <button class="theme-btn" onclick="startQuiz(1)">
      <span class="num">Tema 3</span>
      <div class="ttitle">Salud y Enfermedad Mental</div>
      <div class="tsub">Concepto de normalidad, cultura, etiología y clasificación</div>
    </button>
    <button class="theme-btn" onclick="startQuiz(2)">
      <span class="num">Tema 4</span>
      <div class="ttitle">Exploración del Estado Mental I</div>
      <div class="tsub">Aspecto externo, conducta motora, conciencia, orientación</div>
    </button>
    <button class="theme-btn" onclick="startQuiz(3)">
      <span class="num">Tema 5</span>
      <div class="ttitle">Exploración del Estado Mental II</div>
      <div class="tsub">Lenguaje, pensamiento, afectividad, memoria, inteligencia</div>
    </button>
    <button class="theme-btn" onclick="startQuiz(4)">
      <span class="num">Tema 6</span>
      <div class="ttitle">La Entrevista Psiquiátrica</div>
      <div class="tsub">Tipos, pasos, anamnesis y relación enfermero-paciente</div>
    </button>
    <button class="theme-btn" onclick="startQuiz(5)">
      <span class="num">Tema 7</span>
      <div class="ttitle">Técnicas de Comunicación</div>
      <div class="tsub">Comunicación verbal, no verbal y técnicas terapéuticas</div>
    </button>
    <button class="theme-btn" onclick="startQuiz(6)">
      <span class="num">Tema 8</span>
      <div class="ttitle">Problemas de la Relación Enf-Pte</div>
      <div class="tsub">Indiferencia, alucinaciones, abatimiento, manipulación, suicidio</div>
    </button>
    <button class="theme-btn" onclick="startQuiz(7)">
      <span class="num">Tema 11</span>
      <div class="ttitle">Psicofarmacología</div>
      <div class="tsub">Antipsicóticos, benzodiacepinas, antidepresivos, estabilizadores</div>
    </button>
  </div>
</div>

<!-- PANTALLA: QUIZ -->
<div id="quiz-screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">← Temas</button>
    <div class="quiz-meta">
      <strong id="quiz-theme-label">—</strong><br>
      Pregunta <span id="q-current">1</span> de <span id="q-total">10</span>
    </div>
    <div style="font-family:'Space Mono',monospace;font-size:13px;color:var(--accent)">
      ✓ <span id="score-display">0</span>/<span id="score-total">10</span>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="timer-row">
    <div class="timer-label" id="timer-label">35</div>
    <div class="timer-bar-wrap">
      <div class="timer-bar-fill" id="timer-fill" style="width:100%;background:var(--timer-ok)"></div>
    </div>
  </div>
  <div class="question-num" id="question-num">Pregunta 1</div>
  <div class="question-text" id="question-text">—</div>
  <div class="options-grid" id="options-container"></div>
  <div class="feedback" id="feedback-box"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Siguiente →</button>
</div>

<!-- PANTALLA: RESULTADO -->
<div id="result-screen">
  <div class="result-score" id="res-score">0/10</div>
  <div class="result-label">Respuestas correctas</div>
  <div class="result-msg" id="res-msg">—</div>
  <div class="result-details" id="res-details"></div>
  <div class="result-btns">
    <button class="btn-retry" onclick="retryTheme()">Repetir tema</button>
    <button class="btn-home" onclick="goHome()">Elegir otro tema</button>
  </div>
</div>

<script>
const TOTAL_TIME = 35;
const LETTERS = ['A','B','C','D'];

/* ══════════════════════════════════════════════════
   BANCO DE PREGUNTAS — 10 por cada tema
   Formato: { q, opts:[str,str,str,str], answer:0-3, exp }
   Los opts ya están en el orden aleatorio definitivo
   (respuesta correcta en posición variable según
   distribución de tamaños acordada)
══════════════════════════════════════════════════ */
const BANKS = [

/* ─── TEMA 2: El Equipo Psiquiátrico ─── */
[
  {
    q: "¿Con qué nombre se designa al conjunto de personas que trabajan en unidad, aportando distintos conocimientos y técnicas, con la finalidad común de asistir y curar al enfermo mental?",
    opts:[
      "Red de asistencia social comunitaria con enfoque bio-psico-social",
      "Equipo psiquiátrico",
      "Equipo de atención primaria y salud mental integrada",
      "Grupo terapéutico multisectorial de internación"
    ],
    answer: 1,
    exp: "El término 'equipo psiquiátrico' designa a ese conjunto de personas multidisciplinarias que trabajan en unidad con la finalidad de asistir y curar al enfermo mental."
  },
  {
    q: "¿Cuál es la primera función del asistente social durante la internación del paciente psiquiátrico?",
    opts:[
      "Supervisar la medicación administrada por enfermería",
      "Elaborar el plan de alta médica en conjunto con el psiquiatra jefe",
      "La recepción del enfermo al ingresar, procurando su adaptación y conocimiento desde el mismo momento del ingreso",
      "Dirigir las reuniones de equipo interdisciplinario"
    ],
    answer: 2,
    exp: "El asistente social asume la recepción del enfermo al ingresar para favorecer su adaptación inmediata, además de organizar actividades sociales y resolver problemas extrahospitalarios."
  },
  {
    q: "El objetivo fundamental de la enfermería psiquiátrica es:",
    opts:[
      "Aplicar tratamientos farmacológicos prescritos por el psiquiatra jefe",
      "Ayudar a los enfermos a aceptarse a sí mismos y a mejorar las relaciones con otros individuos",
      "Realizar la exploración psicopatológica y formular el diagnóstico de enfermería",
      "Garantizar el cumplimiento del reglamento hospitalario durante las 24 horas"
    ],
    answer: 1,
    exp: "Según el texto, el objetivo fundamental de la enfermería psiquiátrica es ayudar a los enfermos a aceptarse a sí mismos y a mejorar las relaciones con otros individuos."
  },
  {
    q: "¿Qué es la acatisia en el contexto de los efectos secundarios de los medicamentos antipsicóticos?",
    opts:[
      "Estado de rigidez muscular y estupor mental propio de la catatonía",
      "Efecto secundario que consiste en la imposibilidad del paciente para permanecer sentado, con necesidad de deambulación permanente sin control voluntario adecuado",
      "Temblor involuntario de las extremidades inferiores",
      "Disminución brusca de la presión arterial al incorporarse"
    ],
    answer: 1,
    exp: "La acatisia es un efecto secundario a medicamentos antipsicóticos que consiste en la imposibilidad del paciente para permanecer sentado, con deambulación permanente sin adecuado control voluntario."
  },
  {
    q: "En el sistema de trabajo en equipo, ¿qué actitud debe adoptar el psiquiatra jefe respecto a las opiniones de los demás miembros?",
    opts:[
      "Reservarse el diagnóstico final",
      "Aceptar las opiniones de todos y ocasionalmente saber mudar de opinión e incluso de actuación, fomentando reuniones de discusión",
      "Delegar la decisión terapéutica al médico residente",
      "Filtrar las opiniones antes de la reunión de equipo"
    ],
    answer: 1,
    exp: "El psiquiatra jefe debe aceptar las opiniones de todos los miembros y saber modificar su postura, fomentando reuniones de discusión e integrando las conclusiones de miembros no psiquiátricos."
  },
  {
    q: "Según el texto, la administración de medicamentos en psiquiatría:",
    opts:[
      "Puede ser delegada al auxiliar de enfermería bajo supervisión",
      "Es una tarea exclusiva del personal de enfermería y constituye una oportunidad para favorecer una buena relación terapéutica",
      "Debe realizarse de forma rutinaria para asegurar eficiencia",
      "Corresponde al médico residente en turno nocturno"
    ],
    answer: 1,
    exp: "La administración de medicamentos es una tarea exclusiva del personal de enfermería, no puede delegarse y además constituye una oportunidad para favorecer la relación terapéutica."
  },
  {
    q: "¿Qué entiende el texto por 'empatía' en el contexto de las características del enfermero psiquiátrico?",
    opts:[
      "Sentir exactamente lo mismo que el paciente siente en cada momento",
      "Ser simpático y expresar solidaridad ante el sufrimiento del paciente",
      "La capacidad de ver la percepción del mundo que tiene el otro, entender cómo se siente y transmitirle esa comprensión con objetividad",
      "Compartir experiencias personales para generar confianza"
    ],
    answer: 2,
    exp: "La empatía es entender lo que el otro siente y responder en consecuencia, no sentir lo mismo que el paciente. Implica ponerse en su lugar pero con objetividad, y se diferencia de la simpatía."
  },
  {
    q: "En la alimentación del paciente psiquiátrico, ¿cuál es UNA función clave del enfermero durante las comidas?",
    opts:[
      "Suministrar la medicación durante el horario de comidas para ahorrar tiempo",
      "Observar cómo comen los pacientes y cómo utilizan los cubiertos, contribuyendo a crear un ambiente de tranquilidad",
      "Restringir el acceso al comedor a los pacientes agitados",
      "Registrar el peso corporal antes de cada comida"
    ],
    answer: 1,
    exp: "La presencia del enfermero en el comedor permite observar cómo comen los pacientes, cómo usan los cuchillos, y contribuye a crear un ambiente de tranquilidad. Las comidas son momentos relacionales importantes."
  },
  {
    q: "El terapeuta ocupacional aporta al equipo psiquiátrico:",
    opts:[
      "Diagnósticos psiquiátricos formales",
      "Toda la información que recoge del enfermo a lo largo de la jornada laboral, dato precioso porque en la relación laboral el enfermo se produce de forma muy diferente que en la entrevista médica",
      "La formulación del plan farmacológico",
      "El registro de enfermería y las notas de evolución clínica"
    ],
    answer: 1,
    exp: "El terapeuta ocupacional aporta información valiosa recopilada durante la jornada laboral, ya que el enfermo se expresa de forma diferente en ese contexto que en la entrevista médica, revelando síntomas o posibilidades insospechadas."
  },
  {
    q: "Las funciones de enfermería en el equipo psiquiátrico se dividen en:",
    opts:[
      "Técnicas y humanísticas",
      "Asistenciales, preventivas y docentes",
      "Técnicas, humanas y sociales",
      "Clínicas, administrativas y comunitarias"
    ],
    answer: 2,
    exp: "Según el texto, las funciones de enfermería en el equipo psiquiátrico se dividen en técnicas, humanas y sociales."
  }
],

/* ─── TEMA 3: Salud y Enfermedad Mental ─── */
[
  {
    q: "Según la OMS (2001), la salud se define como:",
    opts:[
      "Ausencia de enfermedad orgánica o mental diagnosticable",
      "Estado de bienestar físico confirmado por estudios clínicos",
      "Un estado de completo bienestar físico, mental y social y no solamente la ausencia de enfermedad o dolencia",
      "Adaptación eficaz del individuo al entorno sociocultural"
    ],
    answer: 2,
    exp: "En 2001, la OMS definió la salud como 'un estado de completo bienestar físico, mental y social y no solamente la ausencia de enfermedad o dolencia'."
  },
  {
    q: "¿Qué sostiene Sigmund Freud respecto a la normalidad?",
    opts:[
      "Es un estado de equilibrio psíquico verificable por tests estandarizados",
      "La normalidad es una ficción ideal; el individuo normal es aquel que no reniega de su realidad sino que sabe enfrentarla y transformarla",
      "La normalidad depende exclusivamente de la adaptación social del individuo",
      "Es la ausencia comprobada de psicopatología según criterios biológicos"
    ],
    answer: 1,
    exp: "Freud sostuvo que 'la normalidad es una ficción ideal'. Para él, una persona normal enfrenta y transforma su realidad; quienes no poseen estas características presentan algún trastorno emocional como la neurosis."
  },
  {
    q: "El criterio estadístico de normalidad implica que:",
    opts:[
      "Se juzga la conducta según su adaptación a las normas sociales",
      "Cualquier conducta fuera del promedio estadístico se clasifica como anormal, incluyendo tanto la conducta hiposexualizada como la hipersexualizada en los extremos de la curva de normalidad",
      "La anormalidad equivale siempre a un estado de sufrimiento personal",
      "La patología solo se diagnostica cuando altera el funcionamiento biológico"
    ],
    answer: 1,
    exp: "El criterio estadístico define como anormal lo que se ubica en los extremos de la curva de normalidad, tanto por exceso como por defecto. Tiene la limitación de que lo inusual no siempre es patológico."
  },
  {
    q: "Los factores endógenos generales que predisponen a trastornos mentales incluyen:",
    opts:[
      "Alcohol y plomo",
      "Edad y sexo",
      "Sífilis y tuberculosis",
      "Traumatismos craneales"

let currentTheme = -1;
let currentQ = 0;
let score = 0;
let answered = false;
let timerInterval = null;
let timeLeft = TOTAL_TIME;
let shuffledBank = [];
let wrongAnswers = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(themeIdx) {
  currentTheme = themeIdx;
  currentQ = 0;
  score = 0;
  wrongAnswers = [];
  shuffledBank = shuffle(BANKS[themeIdx]);

  document.getElementById('theme-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';

  const names = ['Tema 2: Equipo Psiquiátrico','Tema 3: Salud Mental','Tema 4: Exploración I','Tema 5: Exploración II','Tema 6: Entrevista','Tema 7: Comunicación','Tema 8: Relación Enf-Pte','Tema 11: Psicofarmacología'];
  document.getElementById('quiz-theme-label').textContent = names[themeIdx];
  document.getElementById('q-total').textContent = shuffledBank.length;
  document.getElementById('score-total').textContent = shuffledBank.length;

  renderQuestion();
}

function renderQuestion() {
  const q = shuffledBank[currentQ];
  answered = false;

  document.getElementById('q-current').textContent = currentQ + 1;
  document.getElementById('score-display').textContent = score;
  document.getElementById('question-num').textContent = 'Pregunta ' + (currentQ + 1);
  document.getElementById('question-text').textContent = q.q;

  const progress = ((currentQ) / shuffledBank.length) * 100;
  document.getElementById('progress-fill').style.width = progress + '%';

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback';
  fb.innerHTML = '';

  document.getElementById('next-btn').className = 'next-btn';

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, btn);
    container.appendChild(btn);
  });

  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = TOTAL_TIME;
  updateTimerUI();

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      if (!answered) timeExpired();
    }
  }, 1000);
}

function updateTimerUI() {
  const label = document.getElementById('timer-label');
  const fill = document.getElementById('timer-fill');
  const pct = (timeLeft / TOTAL_TIME) * 100;

  label.textContent = timeLeft;
  fill.style.width = pct + '%';

  if (timeLeft > 18) {
    fill.style.background = 'var(--timer-ok)';
    label.style.color = 'var(--timer-ok)';
  } else if (timeLeft > 8) {
    fill.style.background = 'var(--timer-warn)';
    label.style.color = 'var(--timer-warn)';
  } else {
    fill.style.background = 'var(--timer-danger)';
    label.style.color = 'var(--timer-danger)';
  }
}

function timeExpired() {
  answered = true;
  disableAll();
  const q = shuffledBank[currentQ];
  revealCorrect(q.answer);
  showFeedback('⏱ Tiempo agotado.', q.exp, false);
  wrongAnswers.push({ n: currentQ + 1, q: q.q });
  document.getElementById('next-btn').className = 'next-btn show';
}

function selectAnswer(idx, btn) {
  if (answered) return;
  clearInterval(timerInterval);
  answered = true;
  disableAll();

  const q = shuffledBank[currentQ];
  const isCorrect = idx === q.answer;

  if (isCorrect) {
    btn.classList.add('correct');
    score++;
    document.getElementById('score-display').textContent = score;
    showFeedback('✓ ¡Correcto!', q.exp, true);
  } else {
    btn.classList.add('wrong');
    revealCorrect(q.answer);
    showFeedback('✗ Incorrecto.', q.exp, false);
    wrongAnswers.push({ n: currentQ + 1, q: q.q });
  }
  document.getElementById('next-btn').className = 'next-btn show';
}

function revealCorrect(answerIdx) {
  const btns = document.querySelectorAll('.option-btn');
  if (btns[answerIdx]) btns[answerIdx].classList.add('reveal');
}

function disableAll() {
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
}

function showFeedback(prefix, exp, correct) {
  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback show';
  fb.innerHTML = `<strong>${prefix}</strong> ${exp}`;
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= shuffledBank.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  clearInterval(timerInterval);
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const total = shuffledBank.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('res-score').textContent = score + '/' + total;

  let msg = '', color = '';
  if (pct >= 90) { msg = '¡Excelente dominio del tema!'; color = 'var(--accent)'; }
  else if (pct >= 70) { msg = 'Buen desempeño. Repasar los errores.'; color = 'var(--accent2)'; }
  else if (pct >= 50) { msg = 'Regular. Se recomienda releer el tema.'; color = 'var(--timer-warn)'; }
  else { msg = 'Necesitás repasar el tema con más profundidad.'; color = 'var(--timer-danger)'; }

  document.getElementById('res-msg').textContent = msg;
  document.getElementById('res-msg').style.color = color;

  let detailsHTML = `
    <div class="detail-row"><span>Respuestas correctas</span><span>${score}</span></div>
    <div class="detail-row"><span>Respuestas incorrectas o sin respuesta</span><span>${total - score}</span></div>
    <div class="detail-row"><span>Porcentaje de acierto</span><span>${pct}%</span></div>
  `;
  if (wrongAnswers.length > 0) {
    detailsHTML += `<div style="margin-top:12px;font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Preguntas a repasar</div>`;
    wrongAnswers.forEach(w => {
      detailsHTML += `<div class="detail-row" style="flex-direction:column;align-items:flex-start;gap:2px;"><span style="color:var(--timer-danger)">P${w.n}</span><span style="color:var(--muted);font-size:12px;line-height:1.4;">${w.q}</span></div>`;
    });
  }
  document.getElementById('res-details').innerHTML = detailsHTML;
}

function retryTheme() {
  startQuiz(currentTheme);
}

function goHome() {
  clearInterval(timerInterval);
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('theme-screen').style.display = 'block';
}
</script>
</body>
