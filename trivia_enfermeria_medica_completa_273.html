{t:2,q:"¿Cuáles son las 4 áreas de adaptación del modelo de Callista Roy?",opts:["Diagnóstico, tratamiento, rehabilitación y prevención","Fisiológica, autoimagen, dominio de rol e independencia","Nutrición, eliminación, movilidad y comunicación","Biológica, psicológica, social y espiritual"],a:1},
{t:2,q:"¿Qué son los 11 patrones funcionales de salud de Marjory Gordon?",opts:["Técnicas de exploración física ordenadas de mayor a menor complejidad","Sistema de valoración de enfermería que organiza los datos del paciente en 11 áreas de funcionamiento","Protocolos de atención para 11 tipos distintos de enfermedades crónicas","Categorías de diagnósticos médicos utilizados en la historia clínica"],a:1},
{t:2,q:"¿Qué supuestos tiene Virginia Henderson con relación a la persona?",opts:["La persona es dependiente siempre del sistema de salud y no puede tomar decisiones","Cada individuo tiene 14 necesidades, mente y cuerpo son inseparables, necesita equilibrio fisiológico-emocional y ayuda para ser independiente","La persona es solo un receptor pasivo de los cuidados de enfermería","Cada individuo es idéntico en sus necesidades sin importar su contexto social"],a:1},
{t:2,q:"¿Qué supuestos tiene Virginia Henderson con relación a la enfermería?",opts:["La enfermería es subordinada al médico y ejecuta solo sus indicaciones","La enfermera tiene función única de ayuda, actúa como miembro del equipo, independiente del médico y formada en ciencias biológicas y sociales","La enfermería se limita a procedimientos técnicos y no incluye aspectos educativos","La enfermera solo actúa cuando el médico no está disponible en el servicio"],a:1},
{t:2,q:"¿Qué supuestos tiene Virginia Henderson con relación a la salud?",opts:["La salud es solo la ausencia de enfermedad diagnosticada por el médico","La salud representa calidad de vida, es necesaria para el funcionamiento humano y su promoción es más importante que atender al enfermo","La salud es un estado estático que no varía a lo largo de la vida del individuo","La salud depende exclusivamente de factores genéticos y hereditarios del individuo"],a:1},
{t:2,q:"¿Cuáles son las fuentes de dificultad según Virginia Henderson?",opts:["Solo factores físicos y genéticos pueden impedir la satisfacción de necesidades","Factores de origen físico, psicológico, sociológico, espiritual y de falta de conocimientos","Únicamente problemas económicos y sociales que limitan el acceso a los servicios de salud","Solo la edad avanzada y las enfermedades crónicas son fuentes de dificultad"],a:1},
{t:2,q:"¿Qué es la independencia en el modelo de Virginia Henderson?",opts:["Dependencia total del sistema hospitalario para todas las actividades de la vida","Alcanzar un nivel aceptable de satisfacción de necesidades por medio de acciones que la persona realiza por sí misma sin ayuda","La capacidad del enfermero para actuar sin supervisión del médico en todas sus funciones","La ausencia completa de enfermedades crónicas en el paciente ambulatorio"],a:1},
{t:2,q:"¿Cuándo aparece la enfermería como ciencia y quién fue pionera en su desarrollo?",opts:["En el siglo XVIII con Marie Curie como precursora del método científico enfermero","En la década del 50 del siglo XX; Florence Nightingale fue quien a mediados del XIX sentó bases del conocimiento enfermero","En el siglo XX con Dorothea Orem como única fundadora de las teorías enfermeras","En el siglo XXI cuando se reconoció formalmente como profesión universitaria"],a:1},

// ─── TEMA 4 ─── PAE (13)
{t:3,q:"¿Qué es el Proceso de Atención de Enfermería (PAE)?",opts:["Un protocolo de administración de medicamentos validado por el ministerio de salud","Método sistemático y organizado de administrar cuidados individualizados centrados en el diagnóstico y tratamiento de las respuestas del paciente a alteraciones de salud","Un manual de procedimientos técnicos para intervenciones quirúrgicas de enfermería","El registro administrativo de las actividades realizadas durante el turno de trabajo"],a:1},
{t:3,q:"¿Cuáles son las 5 etapas del PAE en orden correcto?",opts:["Diagnóstico, planificación, valoración, evaluación y ejecución","Valoración, diagnóstico, planificación, ejecución y evaluación","Ejecución, valoración, diagnóstico, evaluación y planificación","Planificación, diagnóstico, valoración, ejecución y evaluación"],a:1},
{t:3,q:"¿En qué consiste la etapa de valoración del PAE?",opts:["Juicio clínico que resulta del análisis de los datos recopilados sobre el paciente","Proceso organizado y sistemático de recogida y recopilación de datos sobre el estado de salud mediante diversas fuentes","Fase donde se establecen los objetivos y las intervenciones de enfermería planificadas","Etapa donde se pone en práctica el plan de cuidados elaborado con el paciente"],a:1},
{t:3,q:"¿Cuáles son los tipos de datos que se recopilan en la valoración?",opts:["Solo datos objetivos medidos con instrumentos de precisión clínica","Subjetivos, objetivos, histórico-antecedentes y actuales sobre el problema de salud","Únicamente datos de laboratorio y estudios de diagnóstico por imágenes","Solo datos que refiere el paciente y sus familiares durante la entrevista"],a:1},
{t:3,q:"¿Qué es el diagnóstico de enfermería?",opts:["Es una orden médica que el enfermero debe ejecutar sin cuestionarla","Juicio crítico que resulta de la valoración; enunciado del problema real o potencial que requiere intervención enfermera","El resultado final de todos los estudios de laboratorio e imágenes del paciente","El plan de cuidados diseñado por el médico para resolver los problemas del paciente"],a:1},
{t:3,q:"¿Cuáles son los tipos de diagnóstico de enfermería?",opts:["Solo existen diagnósticos reales y potenciales en la práctica clínica","Real, potencial, de alto riesgo, posible y de bienestar; cada uno con estructura diferente","Únicamente diagnósticos médicos adaptados a la terminología enfermera","Solo diagnósticos positivos y negativos según la evolución del paciente"],a:1},
{t:3,q:"¿Cómo se estructura correctamente un diagnóstico de enfermería real (PES)?",opts:["Primero el tratamiento, luego el diagnóstico médico y finalmente el pronóstico","Problema relacionado con la etiología manifestado por signos y síntomas del paciente","Solo el síntoma principal referido por el paciente sin etiología ni signos","Diagnóstico médico seguido de las intervenciones de enfermería planificadas"],a:1},
{t:3,q:"¿Cuáles son las características de un diagnóstico de enfermería bien redactado?",opts:["Puede mezclarse con diagnósticos médicos y mencionar dos problemas simultáneamente","Redactado en términos convenientes, basado en datos válidos, sin mencionar signos en la primera parte y sin diagnósticos médicos disfrazados","Puede redactarse con terminología médica si el enfermero tiene suficiente formación","Solo necesita mencionar el problema sin etiología ni manifestaciones clínicas"],a:1},
{t:3,q:"¿En qué consiste la etapa de planificación del PAE?",opts:["Recopilación de datos del paciente para establecer un diagnóstico de enfermería","Fase donde se establecen objetivos observables y medibles, y se planifican las intervenciones enfermeras","Puesta en práctica del plan de cuidados con participación del paciente y familia","Comparación entre el estado de salud del paciente y los resultados esperados"],a:1},
{t:3,q:"¿Cómo deben redactarse los objetivos en la etapa de planificación?",opts:["Deben ser ambiguos para adaptarse a cualquier situación clínica posible","Observables, medibles, expresados como logros del paciente, específicos, con tiempo determinado y realistas","Deben ser metas del enfermero y no del paciente para facilitar la evaluación","Solo a largo plazo para permitir la evolución natural de la enfermedad"],a:1},
{t:3,q:"¿En qué consiste la etapa de ejecución del PAE?",opts:["Juicio clínico que resulta de comparar los datos con patrones de normalidad","Puesta en práctica del plan de cuidados con responsabilidad del enfermero, incluyendo al paciente, familia y equipo","Recopilación inicial de datos sobre el estado de salud del paciente ingresado","Redacción de los diagnósticos de enfermería basados en los datos valorados"],a:1},
{t:3,q:"¿En qué consiste la evaluación del PAE?",opts:["Fase inicial de recopilación de datos sobre el estado de salud del paciente","Comparación planificada entre el estado de salud actual del paciente y los resultados esperados previamente","Redacción del plan de cuidados con objetivos a corto y largo plazo","Puesta en práctica de todas las intervenciones planificadas en la fase anterior"],a:1},
{t:3,q:"¿Cuáles son las ventajas del PAE para el paciente y para la enfermera?",opts:["No tiene ventajas comprobadas en la práctica clínica hospitalaria actual","Para el paciente: participación en su cuidado y continuidad de atención; para la enfermera: satisfacción laboral, desarrollo profesional y marco de responsabilidad","Solo beneficia administrativamente al hospital sin impacto directo en el paciente","Únicamente facilita el trabajo nocturno sin mejoras en la calidad de atención"],a:1},

// ─── TEMA 5 ─── Medio Interno (13)
{t:4,q:"¿Qué es el medio interno?",opts:["El ambiente físico donde vive el paciente y su familia","Líquido que baña a las células corporales, solución relativamente constante en composición y temperatura","El conjunto de órganos que componen el sistema digestivo y urinario","Los líquidos administrados por vía parenteral durante la hospitalización"],a:1},
{t:4,q:"¿Cómo se distribuye el agua en el organismo adulto?",opts:["El 50% es intracelular y el 50% es extracelular en partes iguales","El 70% del peso corporal es agua: 40% intracelular (LIC) y 30% extracelular (LEC)","El 80% es extracelular y el 20% es intracelular en adultos sanos","El 60% es intravascular y el 40% es intersticial en condiciones normales"],a:1},
{t:4,q:"¿Cómo se subdivide el líquido extracelular (LEC)?",opts:["Solo en intravascular y celular sin subdivisiones adicionales","En líquido intersticial (5%) y líquido intravascular (25%) del peso corporal","En líquido intracelular y extracelular en proporciones iguales","En plasma, linfa y líquido cefalorraquídeo en partes iguales"],a:1},
{t:4,q:"¿Qué es la homeostasis y qué mecanismos la regulan?",opts:["Es la enfermedad que produce cambios en el medio interno; regulada por la insulina pancreática","Equilibrio del medio interno frente a un entorno cambiante; regulada por hormona antidiurética, aldosterona y la sed","Proceso de absorción de nutrientes en el intestino; regulado por enzimas digestivas","Mecanismo de defensa inmunológico ante infecciones; regulado por anticuerpos y linfocitos"],a:1},
{t:4,q:"¿Qué es la difusión y cómo funciona en el intercambio de líquidos?",opts:["Transporte de agua a través de las membranas de mayor a menor concentración","Transporte de solutos de una zona de mayor concentración a otra de menor concentración","Mecanismo que usa energía (ATP) para transportar electrolitos contra gradiente","Proceso de filtración de sustancias en el glomérulo renal por presión hidrostática"],a:1},
{t:4,q:"¿Qué es la ósmosis y qué es la presión osmótica?",opts:["Transporte de solutos a través de membranas de mayor a menor concentración","Transporte de agua a través de membranas de solución menos concentrada a más concentrada; la presión osmótica depende del número de partículas disueltas","Mecanismo activo que usa ATP para transportar sodio y potasio a través de las células","Proceso de difusión de gases respiratorios en el alvéolo pulmonar"],a:1},
{t:4,q:"¿Cuál es el cuadro clínico de la deshidratación por pérdida de agua?",opts:["Edema, aumento de peso, tensión arterial elevada, taquicardia y piel húmeda","Sed intensa, lengua roja y seca, ojos hundidos, ausencia de lágrimas, fiebre, oliguria, piel seca e hipotensión postural","Bradicardia, piel húmeda, aumento de la presión venosa central y sibilancias","Nauseas, vómitos, ictericia y dolor en el hipocondrio derecho irradiado al dorso"],a:1},
{t:4,q:"¿Qué es la sobrehidratación, cuáles son sus causas y su cuadro clínico?",opts:["Pérdida excesiva de agua que causa sed intensa, oliguria y piel seca","Expansión isotónica del LEC por retención de agua y sodio; causas: insuficiencia cardíaca, cirrosis; clínica: edema, HTA, taquicardia, aumento de peso","Acumulación de potasio intracelular por administración excesiva de sueros potásicos","Déficit de proteínas plasmáticas que provoca edema con fóvea e hipotensión"],a:1},
{t:4,q:"¿Qué es el balance hidroelectrolítico y para qué sirve?",opts:["Análisis de sangre que mide los electrolitos séricos en el laboratorio clínico","Registro de ingresos y egresos de líquidos en el organismo para mantener la homeostasis del paciente","Técnica de administración de sueros por vía endovenosa controlada con bomba de infusión","Examen de orina completo para detectar alteraciones en la función renal"],a:1},
{t:4,q:"¿Qué constituye los ingresos y los egresos en el balance hidroelectrolítico?",opts:["Ingresos: solo vía oral; egresos: solo diuresis en 24 horas","Ingresos: vía oral, enteral, parenteral y agua endógena; egresos: respiración, renal, digestiva, fiebre y pérdidas basales","Ingresos: vía endovenosa exclusivamente; egresos: solo sudoración y respiración","Ingresos: alimentos sólidos; egresos: solo materia fecal y orina"],a:1},
{t:4,q:"¿Cuáles son los electrolitos principales del líquido intracelular?",opts:["Sodio y cloro en altas concentraciones con bajo nivel de potasio","Potasio (110 meq/L), magnesio y fosfato en altas concentraciones; bajo sodio y cloro","Calcio y fósforo como electrolitos predominantes con bicarbonato elevado","Solo sodio y bicarbonato en el espacio intracelular de todas las células"],a:1},
{t:4,q:"¿Cómo influye la presión oncotica y la presión hidrostática en la formación de edema?",opts:["Ambas presiones siempre actúan en el mismo sentido sin producir edema","Si la presión hidrostática está aumentada y la presión oncotica disminuida, se produce edema blando por salida de líquido al intersticio","La presión hidrostática siempre evita la formación de edema en tejidos periféricos","Solo la presión osmótica determina el movimiento de líquidos entre compartimentos"],a:1},
{t:4,q:"¿Qué es el transporte activo y cómo funciona en los electrolitos?",opts:["Paso espontáneo de solutos de mayor a menor concentración sin gasto energético","Mecanismo que transporta electrolitos contra gradiente de concentración usando la bomba sodio-potasio y ATP como energía","Movimiento del agua a través de membranas por diferencias de presión osmótica","Filtración de sustancias en el glomérulo renal impulsada por la presión hidrostática"],a:1},

// ─── TEMA 6 ─── Adulto Mayor (13)
{t:5,q:"¿Qué es la geriatría y qué diferencia tiene con la gerontología?",opts:["Son términos sinónimos que estudian lo mismo desde perspectivas iguales","La geriatría es la rama médica que trata al adulto mayor; la gerontología es la ciencia que estudia el envejecimiento en sus aspectos biológicos, fisiológicos y sociales","La geriatría estudia la nutrición y la gerontología estudia la psicología del anciano","La gerontología es la rama médica y la geriatría estudia el envejecimiento a nivel social"],a:1},
{t:5,q:"¿Cómo se clasifica la ancianidad según la edad?",opts:["Solo se divide en anciano joven (menores de 80) y anciano mayor (más de 80 años)","Joven anciano: 65-70 años; adulto anciano: 70-80 años; senectud de la ancianidad: mayores de 80 años","Adulto mayor: 60-70 años; anciano: 70-85 años; gran anciano: más de 85 años","Solo se considera anciano a partir de los 70 años sin subdivisiones adicionales"],a:1},
{t:5,q:"¿Cuáles son los principales cambios en la piel y sus anexos con el envejecimiento?",opts:["La piel se vuelve más gruesa, elástica y resistente con la edad avanzada","Aparecen arrugas, el cabello encanece y cae, las uñas se vuelven frágiles, disminuye la sudoración y aumenta la sequedad cutánea","La piel del anciano se regenera más rápido que en el adulto joven","Solo aparecen manchas solares sin otros cambios significativos en la piel"],a:1},
{t:5,q:"¿Qué cambios ocurren en el sistema musculoesquelético del anciano?",opts:["Aumento de la masa muscular, mayor flexibilidad articular y mayor densidad ósea","Marcha senil, osteoporosis, tendencia a fracturas, debilidad muscular y disminución de la talla por acuñamiento vertebral","Mejora de la coordinación motora y mayor tolerancia al ejercicio físico","Solo rigidez articular leve sin cambios en la masa muscular ni en la densidad ósea"],a:1},
{t:5,q:"¿Qué cambios ocurren en el aparato respiratorio durante el envejecimiento?",opts:["La capacidad respiratoria aumenta con la edad por fortalecimiento del diafragma","Disminuye la capacidad vital, aumenta la producción de moco, disminuye la capacidad respiratoria, mayor riesgo de atelectasias y neumonías por aspiración","El anciano tiene mayor resistencia a las infecciones respiratorias que el adulto joven","Solo disminuye la frecuencia respiratoria sin cambios en la capacidad pulmonar"],a:1},
{t:5,q:"¿Qué cambios cardiovasculares se producen con el envejecimiento?",opts:["El corazón del anciano bombea más eficientemente con el paso de los años","Disminución de la reserva cardíaca, reducción del gasto cardíaco, hipotensión ortostática, riesgo de trombosis venosa profunda y tromboembolismos","El sistema cardiovascular no sufre cambios significativos con el envejecimiento","Solo aumenta la frecuencia cardíaca sin otros cambios en la función cardíaca"],a:1},
{t:5,q:"¿Qué cambios se producen en el sistema nervioso del anciano?",opts:["Mejora la memoria y la coordinación con la experiencia acumulada a lo largo de los años","Alteración del equilibrio y coordinación, aparece memoria retrógrada y desaparece la anterógrada, deprivación sensorial y tendencia a la depresión","El sistema nervioso del anciano es igual al del adulto sin diferencias funcionales","Solo hay pérdida de la memoria a corto plazo sin otros cambios neurológicos"],a:1},
{t:5,q:"¿Qué son las úlceras por presión y cuáles son sus estadios?",opts:["Son infecciones cutáneas por hongos que aparecen en zonas húmedas del cuerpo","Lesiones de piel por presión constante; estadios: eritema, pérdida parcial de piel, pérdida total del grosor, y lesión con destrucción muscular y ósea","Son quemaduras químicas producidas por medicamentos tópicos mal administrados","Solo tienen dos estadios: superficial y profundo, independientemente de su extensión"],a:1},
{t:5,q:"¿En qué zonas del cuerpo aparecen con mayor frecuencia las úlceras por presión?",opts:["Cara, cuello y zona abdominal como zonas de mayor riesgo","Talones, sacro, codos, omoplatos y cabeza como zonas de mayor presión","Manos, pies y región inguinal como zonas de mayor frecuencia","Solo en la región sacra y no en otras zonas del cuerpo"],a:1},
{t:5,q:"¿Cuáles son las medidas de prevención y control de las úlceras por presión?",opts:["No existe prevención eficaz; solo el tratamiento quirúrgico resuelve las úlceras","Cambios posturales cada 2-3 horas, movilización pasiva, higiene cuidadosa, vigilar la dieta y usar medios que mitiguen la presión","Solo aplicar cremas hidratantes sin necesidad de cambiar la posición del paciente","Mantener al paciente en decúbito dorsal permanente y aplicar antibióticos tópicos"],a:1},
{t:5,q:"¿Qué cambios ocurren en el aparato digestivo del anciano?",opts:["El anciano digiere mejor los alimentos por mayor producción de enzimas digestivas","Pérdida de apetito, trastornos de la deglución, enlentecimiento digestivo, tendencia al reflujo, estreñimiento e impactación fecal","La función digestiva mejora con la edad por madurez del sistema enzimático","Solo hay pérdida de piezas dentarias sin otras alteraciones digestivas relevantes"],a:1},
{t:5,q:"¿Qué cambios se producen en el aparato genital con el envejecimiento?",opts:["La función sexual mejora con la edad por mayor experiencia y madurez emocional","Disminuye la producción de hormonas, reducción del tamaño de órganos, en mujeres la vagina se acorta, en hombres aumenta la próstata, mayor riesgo de infecciones","No hay cambios significativos en el aparato genital durante el proceso de envejecimiento","Solo cesa la reproducción sin otros cambios anatómicos ni funcionales del aparato"],a:1},
{t:5,q:"¿Qué cuidados de higiene corporal son importantes en el adulto mayor?",opts:["El anciano no necesita higiene diaria ya que la piel produce menos sudor","Aseo diario respetando costumbres y autonomía; al bañar con agua fría comenzar por pies y subir gradualmente; explicar el procedimiento y respetar su intimidad","Solo bañar al anciano una vez por semana para evitar el enfriamiento","Delegar completamente el aseo al familiar sin intervención del enfermero"],a:1},

// ─── TEMA 7 ─── Gastrointestinal (13)
{t:6,q:"¿Qué órganos forman el tubo digestivo?",opts:["Hígado, vesícula biliar, páncreas, intestino delgado y grueso","Boca, esófago, estómago, intestino delgado, intestino grueso, colon y recto","Solo estómago e intestinos como órganos principales del tubo digestivo","Boca, faringe, laringe, tráquea, bronquios y pulmones"],a:1},
{t:6,q:"¿Cuál es la etiología de la esofagitis y cuáles son sus tipos?",opts:["La esofagitis solo es causada por infecciones por Helicobacter pylori","Reflujo esofágico, infecciones por microorganismos, radiaciones y cáusticos; tipos: aguda y crónica con varias subclasificaciones","Solo es causada por el consumo de medicamentos antiinflamatorios no esteroideos","Únicamente por exceso de ácido gástrico sin otras causas posibles"],a:1},
{t:6,q:"¿Cuál es el cuadro clínico de la esofagitis y qué estudios confirman el diagnóstico?",opts:["Solo dolor abdominal difuso y náuseas sin otros síntomas específicos","Pirosis retroesternal, disfagia, dolor torácico, regurgitación y fenómenos aspirativos; diagnóstico: historia clínica, endoscopia y pHmetría","Solo fiebre y malestar general sin síntomas digestivos específicos","Únicamente pérdida de peso y anemia sin manifestaciones digestivas directas"],a:1},
{t:6,q:"¿Cuál es la etiología de la gastritis y cuáles son sus tipos según evolución?",opts:["Solo el alcohol y el tabaco son causantes de la gastritis crónica","Exceso de secreciones ácidas, AINES, H. pylori y comidas condimentadas; tipos: aguda, crónica, erosiva y atrófica","Únicamente infecciones virales sin otras causas posibles de gastritis","Solo factores genéticos determinan el tipo y la evolución de la gastritis"],a:1},
{t:6,q:"¿En qué consiste el seriado gastroduodenal y para qué se utiliza?",opts:["Es una endoscopia que permite visualizar directamente el interior del estómago","Estudio con rayos X donde el paciente bebe bario para visualizar esófago, estómago y duodeno y detectar úlceras, hernias o alteraciones del tránsito","Es un análisis de sangre para detectar Helicobacter pylori y enzimas hepáticas","Es una ecografía abdominal para medir el tamaño del hígado y la vesícula biliar"],a:1},
{t:6,q:"¿En qué consiste la fibroendoscopia alta y para qué se indica?",opts:["Estudio radiológico con contraste de bario para ver el esófago y el estómago","Procedimiento que introduce un tubo flexible con fibra óptica para ver el interior del esófago, estómago y duodeno, detectando causas de disfagia, reflujo y sangrado","Técnica de imagen ultrasónica para ver los órganos del abdomen superior","Biopsia percutánea del estómago guiada por tomografía computada"],a:1},
{t:6,q:"¿Qué cuidados de enfermería son esenciales en pacientes con afecciones gastrointestinales?",opts:["Solo administrar medicamentos y no intervenir en otros aspectos del cuidado","Control de signos vitales, venoclisis, control de ingesta, baño, medicación indicada, vigilar síntomas y valorar evolución del paciente","Solo control del peso y registrar la ingesta oral sin otras intervenciones adicionales","Fisioterapia respiratoria y cambios posturales cada 2 horas como únicos cuidados"],a:1},
{t:6,q:"¿Cuál es el tratamiento de la esofagitis por reflujo?",opts:["Solo cirugía inmediata sin tratamiento médico previo posible","Elevar la cabecera, disminuir tamaño de comidas, antiácidos, anti H2, inhibidores de la bomba de protones y fármacos que favorecen el vaciado gástrico","Solo dieta estricta sin medicamentos de ningún tipo","Solo antibióticos para eliminar el agente infeccioso causante del reflujo"],a:1},
{t:6,q:"¿Cuál es el tratamiento de la gastritis?",opts:["Solo reposo absoluto y ayuno sin medicación específica","Antiácidos, protectores de mucosa gástrica, inhibidores de la bomba de protones, citoprotectores, dieta blanda y evitar alcohol y cigarrillo","Solo antibióticos si hay infección por H. pylori sin otras medidas terapéuticas","Solo analgésicos para el dolor sin protección de la mucosa gástrica"],a:1},
{t:6,q:"¿Cómo se prepara al paciente para una fibroendoscopia alta?",opts:["No requiere ninguna preparación especial previa al procedimiento","Ayuno de 6-12 horas antes; se rocía la garganta con anestésico o se administra sedación intravenosa para relajación; procedimiento de 10-15 minutos","Solo informar al paciente sin ninguna preparación física previa","Ayuno de 24 horas y enema evacuante la noche anterior al procedimiento"],a:1},
{t:6,q:"¿Cuáles son los problemas más comunes de la boca y su tratamiento general?",opts:["Solo la caries dental y la pérdida de piezas dentarias son problemas bucales","Herpes labial, úlceras bucales, muguet por cándida, leucoplaquia y boca seca; tratamiento: mantener higiene con cepillado frecuente y hilo dental","Solo infecciones bacterianas graves que requieren antibióticos sistémicos","Únicamente problemas de maloclusión que requieren tratamiento ortodóncico"],a:1},
{t:6,q:"¿En qué consiste la fibroendoscopia baja y qué posición se utiliza?",opts:["Es la visualización del esófago y estómago en decúbito dorsal","Permite ver el interior del colon desde el recto hasta su unión con el intestino delgado; se usa posición decúbito lateral izquierdo; dura 20-30 minutos","Solo visualiza el recto y no puede alcanzar el colon transverso ni el ascendente","Es una radiografía del intestino grueso con contraste en decúbito ventral"],a:1},
{t:6,q:"¿Qué diferencia hay entre la esofagitis de Barrett y la esofagitis erosiva?",opts:["Son exactamente iguales y no tienen diferencias clínicas ni histológicas","La esofagitis erosiva tiene lesiones superficiales lineales; el esófago de Barrett cambia el epitelio a cilíndrico, considerándose lesión precancerosa","Solo se diferencian por el agente causal sin cambios histológicos ni pronóstico diferente","Ambas tienen el mismo tratamiento y evolución a largo plazo"],a:1},

// ─── TEMA 8 ─── Diabetes Mellitus (13)
{t:7,q:"¿Qué es la diabetes mellitus y cuál es su mecanismo patogénico principal?",opts:["Infección bacteriana del páncreas que destruye completamente las células beta","Conjunto de alteraciones metabólicas caracterizadas por hiperglucemia crónica por resistencia a la insulina, trastorno en su secreción o ambas","Enfermedad autoinmune que solo afecta a niños menores de 10 años exclusivamente","Acumulación excesiva de glucosa en el hígado por falla hepática primaria"],a:1},
{t:7,q:"¿Cuáles son los tipos de diabetes mellitus y sus características principales?",opts:["Solo existe tipo 1 (autoinmune) y tipo 2 (adquirida) sin otras formas","Tipo 1 autoinmune e idiopática, tipo 2 por insulinorresistencia y deficiencia, tipo 3 combinada y gestacional que aparece en el embarazo","Únicamente diabetes insulinodependiente y no insulinodependiente como dos tipos","Solo diabetes juvenil y diabetes del adulto como clasificación principal"],a:1},
{t:7,q:"¿Cuáles son los tres síntomas cardinales de la diabetes y por qué se producen?",opts:["Fiebre, cansancio y pérdida de peso por infección bacteriana del páncreas","Poliuria por glucosuria, polidipsia por pérdida de líquidos y polifagia por alteración del metabolismo de grasas y proteínas","Bradicardia, edema e hipertensión por retención de sodio en los túbulos renales","Cefalea, visión doble y convulsiones por compromiso del sistema nervioso central"],a:1},
{t:7,q:"¿Qué son los niveles normales de glucosa en sangre y cómo se diagnostica la diabetes?",opts:["Normal: 50-80 mg/dl; diabetes si supera 100 mg/dl en cualquier momento","Normal: 70-100 mg/dl; diabetes: glucemia en ayunas ≥126 mg/dl en dos oportunidades o ≥200 mg/dl post carga de glucosa","Normal: 100-120 mg/dl; diabetes: glucemia mayor a 150 mg/dl en ayunas","Normal: 60-90 mg/dl; diabetes: glucemia en ayunas mayor a 110 mg/dl"],a:1},
{t:7,q:"¿Qué es la hemoglobina glicosilada (A1C) y para qué sirve?",opts:["Es un análisis de orina que mide la glucosa eliminada durante 24 horas","Prueba que informa sobre los niveles de glucosa en los últimos 3 meses; lo recomendable es un valor menor al 7%; se realiza cada tres meses","Es el nivel de insulina basal en sangre medido en ayunas por la mañana","Es la concentración de glucosa en orina que se mide con tiras reactivas"],a:1},
{t:7,q:"¿Cuáles son los pilares del tratamiento de la diabetes mellitus?",opts:["Solo insulina; la dieta y el ejercicio no son suficientes para el tratamiento","Plan nutricional, actividad física, educación diabetológica, automonitoreo glucémico y tratamiento farmacológico (hipoglucemiantes o insulina)","Únicamente medicación oral sin necesidad de cambios en el estilo de vida","Solo cirugía pancreática como primera línea de tratamiento para todos los tipos"],a:1},
{t:7,q:"¿Cuáles son los factores de riesgo para desarrollar diabetes mellitus?",opts:["Solo la obesidad es factor de riesgo sin otras variables relevantes","Individuales (herencia, glucemias alteradas), ambientales (sedentarismo, mala nutrición), patológicos (obesidad, síndrome metabólico) y medicamentos (diuréticos, esteroides)","Solo antecedentes familiares sin influencia del estilo de vida personal","Únicamente factores genéticos sin relación con el ambiente ni los hábitos"],a:1},
{t:7,q:"¿Qué es la cetoacidosis diabética y por qué se produce?",opts:["Hipoglucemia severa por exceso de insulina que provoca convulsiones y coma","Complicación por falta de insulina; el cuerpo usa grasa como energía y los subproductos (cetonas) se acumulan produciendo acidosis metabólica","Infección urinaria grave frecuente en pacientes diabéticos mal controlados","Daño renal crónico por depósito de glucosa en los glomérulos renales"],a:1},
{t:7,q:"¿Cuáles son los tipos de insulina según su acción y cuándo se administra cada uno?",opts:["Solo existe insulina rápida y lenta sin otras clasificaciones posibles","Ultrarápida (10-15 min), rápida (30 min), intermedia NPH (1.5-2h) y prolongada (4h); vías: subcutánea, intramuscular o endovenosa según el tipo","Todas las insulinas tienen la misma duración de acción y solo difieren en concentración","Solo existen insulinas animales y humanas sin diferencia en velocidad de acción"],a:1},
{t:7,q:"¿Cuáles son los síntomas de hipoglucemia en el paciente diabético?",opts:["Poliuria, polidipsia y polifagia como síntomas cardinales de la hipoglucemia","Confusión, visión borrosa, sudoración, debilidad, cefalea, temblores, hambre intensa y posible coma","Hipertensión, bradicardia y edema periférico como signos principales","Solo sed excesiva y aumento de la diuresis sin otros síntomas neurológicos"],a:1},
{t:7,q:"¿Cuáles son las drogas insulino-secretoras y cuál es su mecanismo de acción?",opts:["Metformina: disminuye la producción hepática de glucosa sin estimular secreción","Sulfonilureas y meglitinidas: aumentan la secreción de insulina pancreática; contraindicadas en insuficiencia renal y hepática","Solo inhibidores de la lipasa que retardan la absorción de carbohidratos","Únicamente tiazolidinodionas que reducen la insulinorresistencia en tejidos periféricos"],a:1},
{t:7,q:"¿Cuáles son las biguanidas (metformina) y cuál es su mecanismo de acción?",opts:["Aumentan la secreción pancreática de insulina estimulando las células beta","Disminuyen la producción hepática de glucosa, aumentan la captación muscular y disminuyen la absorción intestinal de glucosa; tienen intolerancia gastrointestinal","Solo inhiben las enzimas que descomponen los carbohidratos en el intestino","Activan los receptores de insulina en el tejido adiposo reduciendo la resistencia"],a:1},
{t:7,q:"¿Qué sitios se utilizan para la aplicación de insulina subcutánea?",opts:["Solo el brazo izquierdo y el abdomen superior como únicos sitios posibles","Abdomen, brazos, muslos y glúteos; rotando los sitios para evitar lipodistrofia","Solo los muslos como sitio de aplicación por mayor absorción y menos dolor","Cualquier zona del cuerpo sin necesidad de rotar los sitios de aplicación"],a:1},

// ─── TEMA 9 ─── Tiroides (13)
{t:8,q:"¿Dónde se ubica la glándula tiroides y qué hormonas produce?",opts:["En el abdomen, a los lados del hígado; produce cortisol y aldosterona","Por debajo y a los lados de la tráquea, detrás de la laringe; produce T3 y T4 que regulan el metabolismo","En el cráneo, en la silla turca; produce hormona de crecimiento y TSH","En el cuello, a nivel de las clavículas; produce calcitonina y hormona paratiroidea"],a:1},
{t:8,q:"¿Cómo funciona el eje hipotálamo-hipófisis-tiroides?",opts:["El hipotálamo produce TSH que actúa directamente sobre la tiroides sin intermediarios","El hipotálamo secreta TRH, que regula a la hipófisis, esta secreta TSH, y la tiroides produce T3 y T4","La tiroides produce TSH que regula al hipotálamo en un sistema de retroalimentación inversa","La hipófisis produce T3 y T4 directamente sin necesidad del hipotálamo ni la tiroides"],a:1},
{t:8,q:"¿Qué es el hipertiroidismo, cuál es su clasificación y cuáles son sus causas?",opts:["Hipofunción tiroidea que produce disminución de T3 y T4 con TSH aumentada","Aumento de la actividad tiroidea con elevación de T3 y T4; clasificación: bocio difuso y bocio nodular; causas: autoinmune (Graves-Basedow) y adenomas tiroideos","Infección bacteriana de la glándula tiroides con dolor cervical y fiebre alta","Déficit nutricional de yodo que impide la síntesis de hormonas tiroideas"],a:1},
{t:8,q:"¿Cuál es el cuadro clínico del hipertiroidismo?",opts:["Apatía, aumento de peso, sensibilidad al frío, piel seca y caída del cabello","Nerviosismo, insomnio, palpitaciones, sudoración fácil, mala tolerancia al calor, temblor de manos, pérdida de peso con aumento del apetito y diarreas","Solo bocio palpable sin síntomas sistémicos significativos en adultos","Bradicardia, hipotensión y edema como manifestaciones cardiovasculares"],a:1},
{t:8,q:"¿Qué es el hipotiroidismo y cuáles son sus causas más frecuentes?",opts:["Hiperfunción tiroidea por producción excesiva de T3 y T4 en todas las células","Hipofunción tiroidea por síntesis insuficiente de hormonas tiroideas; causas: tiroiditis de Hashimoto, hipotiroidismo iatrogénico, déficit de yodo y fármacos","Solo se produce en niños por agenesia o disgenesia tiroidea congénita","Infección viral de la glándula tiroides que destruye transitoriamente las células foliculares"],a:1},
{t:8,q:"¿Cuál es el cuadro clínico del hipotiroidismo en adultos y en niños?",opts:["Idéntico al hipertiroidismo con nerviosismo, pérdida de peso y palpitaciones","En adultos: apatía, aumento de peso, sensibilidad al frío, piel seca y engrosada, cara de máscara; en niños: baja estatura, retraso mental y pubertad precoz","Solo alteraciones cardíacas sin síntomas neurológicos ni cutáneos visibles","Únicamente bocio visible y palpable sin otros síntomas sistémicos asociados"],a:1},
{t:8,q:"¿Cómo se diagnostica el hipertiroidismo y qué estudios se utilizan?",opts:["Solo con examen físico y la presencia de bocio visible sin estudios adicionales","Clínica más T3 y T4 elevadas, TSH disminuida, gammagrafía tiroidea y ecografía para detectar nódulos o tipo de bocio","Solo análisis de sangre con hemograma completo sin estudios específicos tiroideos","Únicamente biopsia de la tiroides para confirmar el diagnóstico definitivo"],a:1},
{t:8,q:"¿Cómo se diagnostica el hipotiroidismo y qué estudios son característicos?",opts:["TSH disminuida en todos los casos sin excepción diagnóstica","TSH aumentada en hipotiroidismo primario y disminuida en el secundario; T4 disminuida, hipercolesterolemia y alteraciones en ecocardiograma","Solo radiografía de tórax para detectar derrame pericárdico por mixedema","Únicamente ecografía tiroidea sin análisis de sangre específicos"],a:1},
{t:8,q:"¿Cuál es el tratamiento del hipertiroidismo?",opts:["Solo reposo absoluto y dieta sin tratamiento farmacológico ni quirúrgico","Antitiroideos por 1-2 años, yodo radiactivo por vía oral, o cirugía; en embarazo el yodo está contraindicado","Solo betabloqueantes sin otros fármacos ni procedimientos adicionales","Únicamente levotiroxina de por vida como tratamiento de primera línea"],a:1},
{t:8,q:"¿Cuál es el tratamiento del hipotiroidismo?",opts:["Antitiroideos para reducir la producción hormonal excesiva de la glándula","Levotiroxina de por vida para restaurar el estado eutiroideo; el paciente debe saber que el tratamiento es permanente","Solo yodo dietético en forma de sal yodada sin medicación específica","Solo cirugía para extirpar la glándula tiroides hipofuncionante"],a:1},
{t:8,q:"¿Qué es la crisis tirotóxica y cuáles son sus manifestaciones clínicas graves?",opts:["Descenso brusco de hormonas tiroideas con hipotermia y coma mixedematoso","Complicación grave del hipertiroidismo: deshidratación, obnubilación, taquicardia, arritmia cardíaca severa e insuficiencia cardíaca descompensada","Bocio agudo de gran tamaño con disfagia y disnea por compresión traqueal","Reacción alérgica a los antitiroideos con erupción cutánea generalizada"],a:1},
{t:8,q:"¿Cuáles son los cuidados de enfermería en el hipertiroidismo?",opts:["Solo administrar medicación sin intervenir en otros aspectos del cuidado","Medicación indicada, ambiente tranquilo y fresco, brindar confort y comprensión, vigilar arritmias, HTA y palpitaciones, y educar sobre el tratamiento de por vida","Solo control de signos vitales sin otras intervenciones específicas de enfermería","Solo reposo absoluto y control del peso sin medicación específica"],a:1},
{t:8,q:"¿Cuáles son los cuidados de enfermería en el hipotiroidismo?",opts:["Ambiente fresco y ventilado; contraindicado el uso de ropa abrigada","Procurar ambiente cálido, cuidados de la piel, prevenir complicaciones, advertir que pacientes con mixedema toleran mal barbitúricos, narcóticos y anestesia","Solo administración de levotiroxina sin otros cuidados específicos","Solo control de TSH cada 6 meses sin intervención de enfermería"],a:1},

// ─── TEMA 10 ─── Hepáticas (13)
{t:9,q:"¿Cuáles son las funciones principales del hígado?",opts:["Solo filtra la sangre de toxinas sin otras funciones metabólicas importantes","Fabricar, acumular, alterar y excretar sustancias del metabolismo; regular metabolismo de glucosa y proteínas; elaborar y secretar bilis para la digestión de grasas","Solo produce insulina para regular el metabolismo de la glucosa","Únicamente filtra bilirrubina y la excreta sin otras funciones metabólicas"],a:1},
{t:9,q:"¿Cómo se transmite la hepatitis A y cuál es su cuadro clínico?",opts:["Por vía sanguínea y sexual; produce cirrosis hepática en el 90% de los casos","Por vía fecal-oral; suele ser asintomática o presenta ictericia, indigestión, náuseas, pirosis y hepatomegalia moderada; raramente cronifica","Por compartir jeringas; produce daño hepático grave en todos los casos","Por vía respiratoria; causa insuficiencia hepática fulminante con alta mortalidad"],a:1},
{t:9,q:"¿Cómo se transmite la hepatitis B y cuál es su pronóstico?",opts:["Por vía fecal-oral exclusivamente; siempre se cura sin tratamiento","Por sangre, relaciones sexuales y transplacentaria; puede cronificarse en el 7%; se puede curar el 10% de casos crónicos","Solo por vía respiratoria; no puede cronificarse ni producir cirrosis","Por contacto con piel intacta; evoluciona siempre hacia la curación espontánea"],a:1},
{t:9,q:"¿Cuáles son las características de la hepatitis C y su evolución?",opts:["Siempre sintomática desde el inicio con ictericia intensa y daño hepático","Frecuentemente asintomática; si no se trata puede causar cirrosis y cáncer hepático; la fase aguda puede durar 3-6 meses y cronificarse por más de 20 años","Siempre se cura espontáneamente sin necesidad de tratamiento antiviral","Solo afecta a personas que consumen drogas endovenosas sin otras vías de transmisión"],a:1},
{t:9,q:"¿Cuál es el tratamiento de la hepatitis C?",opts:["Solo reposo y dieta hipograsa sin tratamiento farmacológico específico","Lograr negativizar la actividad viral con interferón subcutáneo, ribavirina oral y abstinencia absoluta de alcohol","Solo antibióticos de amplio espectro por vía endovenosa durante 6 meses","Únicamente trasplante hepático cuando hay cirrosis avanzada establecida"],a:1},
{t:9,q:"¿Cómo se previene la hepatitis B?",opts:["Solo higiene del hogar y saneamiento comunitario son suficientes","Vacuna, no compartir jeringas ni artículos personales, relaciones sexuales protegidas y anticuerpos para recién nacidos de madres portadoras","Solo preservativo sin necesidad de vacunación ni otras medidas preventivas","Únicamente tratamiento antiviral preventivo para personas en riesgo"],a:1},
{t:9,q:"¿Cuáles son las manifestaciones clínicas de la disfunción hepática grave?",opts:["Solo ictericia leve sin otras manifestaciones sistémicas significativas","Hemorragia gastrointestinal grave, retención de agua y sales con ascitis y edema, trastornos del SNC, coma hepático e ictericia importante","Solo alteración de enzimas hepáticas en laboratorio sin síntomas clínicos","Únicamente náuseas, vómitos y dolor en el hipocondrio derecho"],a:1},
{t:9,q:"¿Qué es la biopsia hepática y cuáles son los cuidados de enfermería pre y post procedimiento?",opts:["Es un estudio de imagen sin preparación previa ni cuidados posteriores","Punción del tejido hepático por aspiración para estudio histológico; pre: preparación física y psicológica, ayuno, grupo y factor sanguíneo; post: decúbito lateral derecho 2 horas, reposo 22 horas, CSV cada 30 minutos","Solo requiere ayuno previo sin cuidados especiales posteriores al procedimiento","Es una cirugía mayor que requiere anestesia general y hospitalización por 5 días"],a:1},
{t:9,q:"¿En qué consiste el centello hepático con radiografía?",opts:["Es una biopsia percutánea del hígado guiada por ultrasonido diagnóstico","Técnica que inyecta un compuesto radiactivo endovenoso captado por el hígado; la radiación se registra por detector y se fotografía para visualizar tamaño, forma y consistencia del hígado","Es una endoscopia de las vías biliares para detectar cálculos y tumores","Es una ecografía convencional del hígado sin uso de medios de contraste"],a:1},
{t:9,q:"¿Qué diferencia hay entre hepatitis tóxica y viral?",opts:["Son exactamente iguales sin diferencia en causa, evolución ni tratamiento","La hepatitis viral es causada por virus (A, B, C); la hepatitis tóxica es inducida por drogas, alcohol u otras sustancias tóxicas que dañan las células hepáticas","La hepatitis tóxica siempre cura sola y la viral siempre cronifica","Solo la hepatitis viral puede producir cirrosis hepática a largo plazo"],a:1},
{t:9,q:"¿Cuáles son los cuidados de enfermería en pacientes con hepatitis?",opts:["Solo aislamiento estricto y administración de antibióticos endovenosos","Reposo, dieta adecuada (hipograsa, hipercalórica en hepatitis A, baja en proteínas en hepáticas crónicas), aplicar medidas higiénicas, educación al paciente y familia","Solo control de la temperatura sin otras intervenciones específicas de enfermería","Únicamente control de laboratorio sin cuidados directos al paciente"],a:1},
{t:9,q:"¿Cuáles son los modos de contagio de la hepatitis A?",opts:["Solo por vía sanguínea y compartiendo jeringas con personas infectadas","Fecal-oral, relaciones sexuales (baja incidencia), boca a boca y artículos personales contaminados","Solo por vía transplacentaria de madre infectada a hijo durante el embarazo","Por vía respiratoria al estar en contacto cercano con personas enfermas"],a:1},
{t:9,q:"¿Qué alteraciones de laboratorio se observan en la disfunción hepática?",opts:["Solo anemia sin otras alteraciones de laboratorio específicas del hígado","Elevación de transaminasas (GOT), aumento de bilirrubina, alteración de glucemia, disminución de proteínas plasmáticas y trastornos de la coagulación","Solo aumento del colesterol sin otras alteraciones bioquímicas relevantes","Únicamente cambios en el hemograma con leucocitosis y neutrofilia"],a:1},

// ─── TEMA 11 ─── Semiología Respiratoria (13)
{t:10,q:"¿Qué es la tos y cuáles son sus tipos?",opts:["Es una enfermedad crónica del aparato respiratorio de causa infecciosa","Mecanismo de defensa que libera vías aéreas de mucosidad; tipos: seca (sin esputo), húmeda (con ruidos) y productiva (con eliminación de secreciones)","Es solo un síntoma de enfermedades cardíacas que produce congestión pulmonar","Solo existe tos seca y tos con sangre como únicos tipos clínicamente relevantes"],a:1},
{t:10,q:"¿Qué indica el color del esputo en el diagnóstico respiratorio?",opts:["El color del esputo no tiene valor diagnóstico en enfermedades respiratorias","Claro y mucoso: viral o bronquitis crónica; rosado: edema pulmonar; amarillo/verdoso: infección bacteriana; fétido: anaerobios; herrumbroso: neumonía neumocóccica","Solo el esputo de color amarillo indica infección sin otras variaciones significativas","El esputo siempre es claro sin importar la enfermedad subyacente que lo produce"],a:1},
{t:10,q:"¿Qué es la disnea y cuáles son sus grados?",opts:["Es la frecuencia respiratoria medida en respiraciones por minuto","Conciencia del esfuerzo respiratorio con sensación de ahogo; grados: 1 (grandes esfuerzos), 2 (esfuerzos habituales), 3 (mínimos esfuerzos), 4 (reposo/ortopnea)","Es solo la tos productiva con expectoración de secreciones bronquiales abundantes","Es un signo objetivo medible con oxímetro de pulso en forma directa"],a:1},
{t:10,q:"¿Qué es la hemoptisis y cómo se diferencia de la hematemesis?",opts:["Son términos sinónimos que denominan el mismo proceso hemorrágico","La hemoptisis es sangre originada en el aparato respiratorio (vías aéreas); la hematemesis es sangre de origen digestivo (estómago) con material digerido","Solo existe hemoptisis y no hematemesis como entidad clínica independiente","La hemoptisis es sangre nasal y la hematemesis es sangre pulmonar"],a:1},
{t:10,q:"¿Qué es la espirometría, qué mide y cómo se prepara al paciente?",opts:["Visualización directa del interior de los bronquios con tubo flexible y luz","Mide la capacidad ventilatoria pulmonar (aire retenido y velocidad de flujo); preparación: no ayuno, alimentos livianos, no ejercicio intenso 30 minutos antes","Es un análisis de sangre para medir gases arteriales y saturación de oxígeno","Técnica de imagen que usa rayos X para obtener imágenes del parénquima pulmonar"],a:1},
{t:10,q:"¿Para qué se utiliza la broncoscopia y cuáles son los cuidados previos?",opts:["Para medir la capacidad ventilatoria con una boquilla conectada a un espirómetro","Detectar tumores, ganglios, atelectasia, cuerpos extraños, retirar líquido o dilatar vías aéreas; cuidados: ayuno 6-12 horas, anestésico local y posible sedación IV","Solo para obtener imágenes radiológicas del árbol bronquial sin intervención directa","Para realizar cultivos de esputo sin contacto directo con las vías aéreas"],a:1},
{t:10,q:"¿Qué es la pleuritis, cuáles son sus tipos y cuál es su cuadro clínico?",opts:["Infección del parénquima pulmonar por bacterias con fiebre y expectoración","Inflamación de la pleura; tipos: seca (sin derrame) y húmeda (con derrame); clínica: dolor en punta de costado, dificultad respiratoria y tos irritativa","Solo acumulación de líquido en el espacio pleural sin inflamación ni síntomas","Es la destrucción de alvéolos por tabaquismo con disnea crónica y sibilancias"],a:1},
{t:10,q:"¿Cuál es la etiología de la pleuritis y cómo se diagnóstica?",opts:["Solo causada por bacterias sin otras causas posibles ni estudios diagnósticos","Neumonía, infarto pulmonar, TBC, carcinoma broncogénico y absceso pulmonar; diagnóstico: examen físico, radiografía, esputo, biopsia y toracocentesis","Solo de causa viral sin necesidad de estudios de diagnóstico específicos","Exclusivamente por tabaquismo y solo se diagnóstica con espirometría"],a:1},
{t:10,q:"¿Qué técnicas se utilizan en la auscultación respiratoria y qué sonidos se detectan?",opts:["Solo se auscultan los ruidos cardíacos sin posibilidad de valorar ruidos respiratorios","De arriba hacia abajo comparando zonas simétricas; se detectan sibilancias, roncus, estertores crepitantes y rales a burbuja que orientan al diagnóstico","Solo la presencia o ausencia de ruidos sin ningún otro dato semiológico","Únicamente se auscultan en la cara anterior del tórax sin valorar la espalda"],a:1},
{t:10,q:"¿Qué es el dolor torácico de origen pleural y cómo se caracteriza?",opts:["Dolor retroesternal constante de origen cardíaco que irradia al brazo izquierdo","Dolor agudo en punta de costado que aumenta con la inspiración y calma con la espiración y la inmovilidad; se produce por irritación de la pleura parietal","Dolor abdominal difuso que se irradia hacia el tórax por distención gástrica","Dolor de tipo urente retroesternal causado por reflujo gastroesofágico crónico"],a:1},
{t:10,q:"¿Cómo se realiza la inspección respiratoria y qué se evalúa?",opts:["Solo se mide la frecuencia respiratoria con reloj sin otras observaciones","Se observa la tos, hiperpnea, gestos de dolor, color y lesiones de la piel, frecuencia y características de la respiración con el paciente en posición adecuada","Solo se visualiza el tórax sin considerar la respiración ni otros signos","Únicamente se observa la simetría torácica sin otros parámetros respiratorios"],a:1},
{t:10,q:"¿Cuál es la preparación del paciente para una radiografía de tórax?",opts:["Ayuno de 6 horas y administración de contraste endovenoso previo al estudio","No requiere preparación especial; el paciente debe permanecer inmóvil y avisar si está embarazada; los huesos aparecen blancos, los tejidos grises y el aire negro","Ayuno de 12 horas y enema evacuante la noche anterior al procedimiento","Sedación intravenosa y monitoreo cardíaco durante todo el procedimiento"],a:1},
{t:10,q:"¿Qué son los estertores crepitantes y qué indican clínicamente?",opts:["Son ruidos roncos que se modifican con la tos en casos de bronquitis aguda","Crepitaciones muy finas y homogéneas al final de la respiración que revelan cierre precoz de bronquios cuando hay líquido en los alvéolos","Son sibilancias que se escuchan solo en la espiración en pacientes con asma","Ruidos de burbuja que se auscultan en ambos tiempos respiratorios con predominio inspiratorio"],a:1},

// ─── TEMA 12 ─── EPOC (13)
{t:11,q:"¿Qué es el EPOC y cuáles son las cuatro enfermedades que lo componen?",opts:["Solo asma y bronquitis como enfermedades obstructivas sin otras formas","Enfisema pulmonar, bronquitis crónica, asma bronquial y bronquiectasia; todas con obstrucción al flujo aéreo de distintos mecanismos y evolución","Neumonía, TBC, pleuresía y neumotórax como enfermedades obstructivas","Solo enfermedades pulmonares agudas sin componente crónico obstructivo"],a:1},
{t:11,q:"¿Cuál es la etiología del enfisema pulmonar y cuáles son sus tipos?",opts:["Solo infecciones bacterianas; tipos: lobular y segmentario","Tabaquismo, deficiencia de proteínas plasmáticas, contaminación e infecciones; tipos: pantolobulillar (bien oxigenado) y centrolobulillar (hipoxia crónica y cianosis)","Solo factores genéticos hereditarios; un único tipo sin subdivisiones","Alergenos y antecedentes familiares; tipos: extrínseco e intrínseco"],a:1},
{t:11,q:"¿Cuál es la fisiopatología del enfisema pulmonar?",opts:["Infección bacteriana de los alvéolos con exudado purulento y consolidación","Obstrucción de vías aéreas por tapones de moco, pérdida de elasticidad pulmonar, dilatación y destrucción alveolar que dificulta el intercambio gaseoso","Contracción bronquial por alergenos con edema de mucosa y obstrucción por moco","Dilatación crónica de bronquios con producción de esputo purulento y hemoptisis"],a:1},
{t:11,q:"¿Cuál es el cuadro clínico del enfisema y cómo se trata?",opts:["Fiebre, tos productiva y esputo purulento de inicio agudo","Disnea insidiosa, tos crónica, respiración jadeante, fatiga e hipoxemia; tratamiento: abandonar tabaco, broncodilatadores, oxígeno, hidratación y expectoración","Solo sibilancias nocturnas sin otros síntomas sistémicos asociados","Dolor pleurítico y tos seca de inicio agudo con fiebre y escalofríos"],a:1},
{t:11,q:"¿Qué es la bronquitis, cuáles son sus tipos y cuáles sus causas?",opts:["Dilatación crónica de bronquios por infecciones repetidas sin distinción de tipos","Inflamación de los bronquios; aguda (catarros, cambios de temperatura, bacterias) y crónica (tabaco y contaminación ambiental)","Solo existe bronquitis crónica sin forma aguda reconocida clínicamente","Destrucción alveolar por infección bacteriana sin distinción de tipos clínicos"],a:1},
{t:11,q:"¿Cuál es el cuadro clínico de la bronquitis aguda?",opts:["Solo disnea de reposo y cianosis grave sin fiebre ni tos","Malestar general, sensación de frío, fiebre moderada, ardor retroesternal, tos seca inicial y luego productiva","Solo tos crónica con esputo purulento abundante sin síntomas agudos","Inicio brusco con sibilancias, presión torácica y sensación de ahogo"],a:1},
{t:11,q:"¿Cuál es el tratamiento de la bronquitis?",opts:["Solo reposo sin medicación específica de ningún tipo","Antibióticos, broncodilatadores, drenaje postural, quinesioterapia, líquidos parenterales y corticosteroides si no responde al tratamiento inicial","Solo antihistamínicos para reducir la respuesta inflamatoria alérgica","Únicamente corticosteroides orales sin otros fármacos asociados"],a:1},
{t:11,q:"¿Cuál es la fisiopatología del asma bronquial?",opts:["Destrucción de alvéolos por tabaquismo con pérdida de elasticidad pulmonar","Contracción de músculos bronquiales, dilatación de mucosa, obstrucción por moco espeso, hipertrofia muscular bronquial e hiperinflación por atrapamiento de aire","Infección bacteriana de los alvéolos con exudado y consolidación del parénquima","Dilatación crónica de bronquios con producción de esputo purulento y hemoptisis"],a:1},
{t:11,q:"¿Cuál es el cuadro clínico del asma bronquial y cómo se trata?",opts:["Solo fiebre alta, tos productiva y esputo purulento con cultivo positivo","Inicio repentino con tos, presión torácica, disnea, sibilancias y cianosis; tratamiento: broncodilatadores, O2 húmedo, posición Fowler y medidas terapéuticas específicas","Solo tos crónica nocturna sin broncoespasmo ni sibilancias durante el día","Dolor pleurítico, dificultad respiratoria y derrame pleural como síntomas principales"],a:1},
{t:11,q:"¿Qué es la bronquiectasia, cuáles son sus causas y su fisiopatología?",opts:["Inflamación aguda de los bronquios por infección viral o bacteriana estacional","Dilatación crónica de bronquios por infecciones, obstrucciones o presión extrínseca; las infecciones lesionan la pared bronquial produciendo esputo y colapso alveolar distal","Solo obstrucción aguda de vías aéreas por cuerpo extraño sin daño crónico","Destrucción alveolar por tabaquismo con reducción de la capacidad vital"],a:1},
{t:11,q:"¿Cuál es el cuadro clínico de la bronquiectasia y cómo se trata?",opts:["Solo tos seca sin producción de esputo en todos los pacientes","Tos crónica con esputo purulento abundante, posible hemoptisis e hipocratismo digital; tratamiento: antibióticos, drenaje postural, quinesioterapia y broncodilatadores","Solo fiebre y malestar general sin síntomas respiratorios específicos","Dolor pleurítico y derrame pleural como principales manifestaciones clínicas"],a:1},
{t:11,q:"¿Qué son las obstrucciones agudas de vías aéreas y cómo se tratan?",opts:["Son solo obstrucciones crónicas sin tratamiento de urgencia posible","Obstrucciones de instalación brusca en cualquier segmento de la vía aérea; tratamiento: asegurar ventilación, intubación traqueal o cricotirotomía si la intubación no es posible","Son solo obstrucciones crónicas que se resuelven espontáneamente sin intervención","Solo requieren antibióticos sin ningún procedimiento de permeabilización de la vía aérea"],a:1},
{t:11,q:"¿Cuáles son los cuidados de enfermería en el paciente con EPOC?",opts:["Solo control de temperatura y sin otras intervenciones específicas del enfermero","Educación al paciente, control de signos vitales, control de expectoración, vigilancia de crisis, administración de broncodilatadores, posición Fowler y control de saturación","Solo administración de broncodilatadores sin educación ni otras intervenciones","Únicamente cambios posturales cada 2 horas sin otras medidas específicas"],a:1},

// ─── TEMA 13 ─── Neumonía y TBC (13)
{t:12,q:"¿Qué es la neumonía y cuál es su epidemiología?",opts:["Es una bronquitis aguda que afecta exclusivamente a adultos mayores","Infección del parénquima pulmonar por microorganismos; es la 6ª causa de muerte y la 1ª causa de muerte por enfermedades infecciosas; 5 millones de casos al año","Solo afecta a pacientes inmunocomprometidos sin riesgo para la población general","Es una enfermedad crónica no infecciosa causada exclusivamente por tabaquismo"],a:1},
{t:12,q:"¿Cuáles son los mecanismos de infección y la etiología de la neumonía?",opts:["Solo por inhalación de hongos sin otras vías de entrada posibles","80% bacterias (neumococo principal); 20% virus y hongos; infección por inhalación de partículas (90%), aspiración de secreciones o diseminación hematógena","Solo por aspiración de contenido gástrico sin posibilidad de inhalación directa","Únicamente por bacterias gram negativas por vía endovenosa desde otros focos"],a:1},
{t:12,q:"¿Cuál es la fisiopatología de la neumonía bacteriana?",opts:["El virus destruye directamente los alvéolos sin reacción inflamatoria asociada","El neumococo penetra en los alvéolos provocando inflamación con exudado, ventilación inadecuada por secreciones y edema, y mezcla de sangre oxigenada y no oxigenada que produce hipoxemia","La bacteria solo afecta los bronquios sin llegar al parénquima alveolar pulmonar","El hongo coloniza las vías aéreas superiores sin producir daño alveolar"],a:1},
{t:12,q:"¿Cuál es el cuadro clínico de la neumonía bacteriana?",opts:["Solo tos seca crónica sin fiebre ni compromiso del estado general","Escalofríos, fiebre alta (39-41°), tos inicial seca luego productiva, dolor torácico, taquipnea, estertores, malestar, debilidad y posible vómitos y delirios","Solo fiebre leve y malestar general sin síntomas respiratorios específicos","Tos crónica con esputo purulento abundante, hemoptisis e hipocratismo digital"],a:1},
{t:12,q:"¿Cuáles son los cuidados de enfermería en el paciente con neumonía?",opts:["Solo administración de antibióticos sin otras intervenciones específicas","Control de signos vitales, líquidos por vía oral, quinesioterapia, O2 húmedo, posición Fowler, nebulizaciones y educación al paciente y cuidador","Solo reposo absoluto y control de temperatura sin otras intervenciones","Únicamente fisioterapia respiratoria sin medicación ni control clínico"],a:1},
{t:12,q:"¿Cuáles son las complicaciones posibles de la neumonía no tratada?",opts:["No presenta complicaciones si el paciente es joven y no tiene comorbilidades","Neumotórax, derrame pleural, empiema, absceso pulmonar, meningitis, pericarditis, sepsis e insuficiencia renal por bacteriemia","Solo fiebre persistente sin otras complicaciones orgánicas graves posibles","Únicamente cronicidad de la infección sin extensión a otros órganos o sistemas"],a:1},
{t:12,q:"¿Qué es la tuberculosis, cómo se transmite y cuál es su epidemiología?",opts:["Es una enfermedad viral crónica que afecta solo a pacientes inmunocomprometidos","Enfermedad infectocontagiosa por Mycobacterium tuberculosis; 2ª causa de muerte después del SIDA; transmisión 95% por inhalación de gotitas de Flügge","Solo se transmite por contacto directo con la piel lesionada del enfermo tuberculoso","Es una enfermedad hereditaria genética sin posibilidad de contagio interpersonal"],a:1},
{t:12,q:"¿Cuál es el cuadro clínico de la tuberculosis?",opts:["Solo fiebre alta y tos seca sin pérdida de peso ni sudoración nocturna","Fiebre repentina, cansancio, falta de apetito, pérdida de peso, sudor nocturno, disnea, tos y expectoración por más de 15 días, expectoración purulenta o sanguinolenta","Solo dificultad respiratoria sin síntomas constitucionales asociados","Únicamente hemoptisis masiva como único síntoma de la tuberculosis pulmonar"],a:1},
{t:12,q:"¿Cómo se diagnóstica la tuberculosis?",opts:["Solo con radiografía de tórax sin necesidad de otros estudios complementarios","Antecedentes de exposición, PPD, manifestaciones clínicas, radiografía, baciloscopia de esputo, cultivo BAAR en esputo, orina y jugo gástrico","Solo con cultivo de esputo sin otros estudios diagnósticos necesarios","Únicamente con análisis de sangre (hemograma) sin estudios microbiológicos"],a:1},
{t:12,q:"¿Cuáles son los fármacos usados en el tratamiento de la TBC y sus siglas?",opts:["Solo penicilina y amoxicilina como antibióticos de primera línea","Rifampicina (R), Isoniacida (H), Pirazinamida (Z), Etambutol (E) y Estreptomicina (S) en distintas combinaciones según la categoría del tratamiento","Solo cefalosporinas de 3ª generación por vía endovenosa durante 6 meses","Únicamente macrólidos orales durante 3 meses sin asociación de fármacos"],a:1},
{t:12,q:"¿En qué consiste la Categoría 1 del tratamiento de la TBC?",opts:["Solo isoniacida por 6 meses sin otros fármacos asociados","Dura 6 meses: fase inicial 2 meses con triple/cuádruple asociación; si baciloscopia negativa, fase de continuación con doble asociación (RH) por 4 meses","Dura 12 meses con la misma combinación de fármacos sin cambio de fases","Solo rifampicina por 3 meses sin necesidad de controles de baciloscopia"],a:1},
{t:12,q:"¿Cuáles son los cuidados de enfermería en el paciente con tuberculosis?",opts:["Solo aislamiento estricto sin educación al paciente ni a la familia","Explicar la importancia del tratamiento, educar a la familia, apoyo emocional, ventilar ambientes, dieta hipercalórica e hipograsa, descanso y evitar el hacinamiento","Solo administración de antibióticos sin otras intervenciones de enfermería","Únicamente control de baciloscopia mensual sin intervención educativa"],a:1},
{t:12,q:"¿Quiénes son más susceptibles de contraer tuberculosis?",opts:["Solo adultos jóvenes sanos sin factores de riesgo identificables","Niños menores de 3 años, adultos mayores de 65 años con enfermedad crónica, trabajadores de la salud, mal nutridos e inmunocomprometidos","Solo pacientes con HIV/SIDA sin otros grupos de riesgo reconocidos","Únicamente personas sin vacunación previa con BCG en la infancia"],a:1},

// ─── TEMA 14 ─── Cardiovascular (13)
{t:13,q:"¿Cuál es la anatomía básica del corazón y su función principal?",opts:["Es un órgano sólido ubicado en el abdomen; función: filtrar la sangre","Órgano hueco musculoso en el tórax; late 60-100 veces/min; 2 aurículas y 2 ventrículos; función: impulsar sangre a todos los tejidos del organismo","Es un órgano plano ubicado detrás del esternón; función: producir células sanguíneas","Es un órgano esponjoso en el mediastino; función: oxigenar la sangre arterial"],a:1},
{t:13,q:"¿Cómo funciona el sistema de conducción eléctrica del corazón?",opts:["El ventrículo derecho inicia el impulso eléctrico que se propaga a las aurículas","El nódulo sinoauricular genera 60-100 impulsos/min; el nódulo auriculoventricular coordina y transmite al haz de His; si ambos fallan el miocardio late menor a 40/min","La conducción eléctrica siempre es descendente de ventrículos a aurículas","El marcapaso natural es el nódulo auriculoventricular con 100-120 impulsos/min"],a:1},
{t:13,q:"¿Cuáles son los factores de riesgo cardiovascular controlables y no controlables?",opts:["Todos los factores son controlables con medicación adecuada sin excepción","Controlables: tabaquismo, HTA, colesterol, alcohol, diabetes; no controlables: herencia, sexo, edad, raza; contribuyentes: obesidad, estrés, sedentarismo","Solo la obesidad es factor de riesgo controlable sin otros factores relevantes","No existen factores de riesgo modificables para las enfermedades cardiovasculares"],a:1},
{t:13,q:"¿Qué es la insuficiencia cardíaca y cuáles son sus factores de riesgo mayores?",opts:["Infección del músculo cardíaco que produce fiebre y pericarditis aguda","Incapacidad del corazón para proveer flujo normal a los órganos; factores de riesgo mayores: edad, sexo, HTA, obesidad, diabetes, enfermedad valvular e IAM","Solo afecta a pacientes jóvenes con cardiopatías congénitas sin otros factores de riesgo","Solo un problema mecánico del corazón sin relación con factores de riesgo modificables"],a:1},
{t:13,q:"¿Cuáles son los mecanismos compensatorios de la insuficiencia cardíaca?",opts:["El corazón no tiene mecanismos compensatorios y falla sin respuesta adaptativa","Reacción adrenérgica (cronotrópica e inotrópica), mecanismo de Frank-Starling y hipertrofia miocárdica para mantener el gasto cardíaco ante la sobrecarga","Solo la hipertrofia miocárdica sin otros mecanismos compensatorios posibles","Únicamente la taquicardia como mecanismo compensatorio sin otros cambios"],a:1},
{t:13,q:"¿Cómo se clasifican funcionalmente los pacientes con insuficiencia cardíaca?",opts:["Solo dos clases: con síntomas y sin síntomas sin subdivisiones adicionales","Clase 1: sin limitación; clase 2: limitación leve; clase 3: limitación importante en actividad leve; clase 4: incapacidad para cualquier actividad incluso el reposo","Tres clases: leve, moderada y grave según la fracción de eyección del ventrículo","Solo se clasifica por el valor de la fracción de eyección sin clasificación funcional"],a:1},
{t:13,q:"¿Cuáles son las diferencias clínicas entre IC izquierda y IC derecha?",opts:["Ambas producen los mismos síntomas sin diferencia clínica observable","IC izquierda: congestión pulmonar, disnea paroxística nocturna, ortopnea, tos seca; IC derecha: edema de miembros, ingurgitación venosa, ascitis, hepatomegalia","La IC derecha produce edema pulmonar y la IC izquierda produce ascitis","Solo la IC izquierda produce síntomas; la IC derecha es siempre asintomática"],a:1},
{t:13,q:"¿Cuál es el tratamiento de la insuficiencia cardíaca?",opts:["Solo reposo absoluto sin medicación específica ni dieta especial","Tratar la causa, eliminar factores precipitantes; farmacológico: diuréticos, vasodilatadores, IECA, anticoagulantes, antiarrítmicos, oxigenoterapia; dispositivos y cirugía según el caso","Solo digital (digoxina) como único fármaco eficaz para la IC descompensada","Únicamente trasplante cardíaco como tratamiento definitivo sin otras opciones"],a:1},
{t:13,q:"¿Cuáles son los cuidados de enfermería en la insuficiencia cardíaca?",opts:["Solo administrar diuréticos y controlar el peso sin otras intervenciones","Posición Fowler, monitoreo, observar arritmias, CSV, O2 húmedo, balance hidroelectrolítico, vía permeable, ECG, laboratorio, aliviar ansiedad y control de peso diario","Solo reposo en decúbito dorsal y restricción total de líquidos sin otras medidas","Únicamente fisioterapia respiratoria sin control de signos vitales ni medicación"],a:1},
{t:13,q:"¿Cuáles son las causas de empeoramiento de la IC de origen no cardíaco?",opts:["Solo las infecciones cardíacas como la endocarditis empeoran la IC","Incumplimiento del tratamiento, uso de drogas y alcohol, cigarrillo, infecciones intercurrentes, embolismo pulmonar y disfunción renal","Solo el exceso de ejercicio físico sin otras causas no cardíacas posibles","Únicamente el consumo de sodio elevado sin otras causas no cardíacas"],a:1},
{t:13,q:"¿Qué son las palpitaciones y el síncope como síntomas cardiovasculares?",opts:["Las palpitaciones son dolor torácico y el síncope es falta de aire","Palpitaciones: percepción de la contracción cardíaca; síncope: pérdida temporal de la conciencia de corta duración con recuperación en pocos minutos","Palpitaciones son edema de miembros y síncope es la disnea de esfuerzo","Ambos son signos objetivos que se miden con instrumentos de precisión"],a:1},
{t:13,q:"¿Qué es la ortopnea y la disnea paroxística nocturna como síntomas cardiovasculares?",opts:["La ortopnea es el dolor en reposo y la disnea paroxística es el dolor al esfuerzo","Ortopnea: dificultad para respirar en posición supina; disnea paroxística nocturna: dificultad respiratoria que ocurre por la noche en pacientes con IC","Ambas son formas de dolor torácico que aparecen en diferentes posiciones del cuerpo","Son síntomas respiratorios sin relación con la función cardíaca"],a:1},
{t:13,q:"¿Cuáles son los estudios diagnósticos para la insuficiencia cardíaca?",opts:["Solo análisis de sangre con hemograma completo como único estudio necesario","Examen físico, anamnesis, laboratorio, radiografía de tórax, electrocardiograma, ecocardiograma, estudios hemodinámicos, gasometría y TAC","Solo electrocardiograma sin otros estudios complementarios necesarios","Únicamente ecocardiograma como estudio diagnóstico de elección exclusivo"],a:1},

// ─── TEMA 15 ─── HTA (13)
{t:14,q:"¿Cuál es la definición de hipertensión arterial y cómo se clasifica por valores?",opts:["Aumento de la tensión arterial por arriba de 120/80 mmHg en cualquier circunstancia","TA sostenida superior a 140/90 mmHg; se clasifica en óptima, normal, normal elevada, leve, moderada, severa y muy severa según los valores sistólicos y diastólicos","Solo se considera HTA cuando la sistólica supera 180 mmHg sin importar la diastólica","TA mayor a 130/80 mmHg medida en una sola oportunidad en cualquier contexto"],a:1},
{t:14,q:"¿Cuál es la epidemiología de la hipertensión arterial en Argentina?",opts:["Afecta al 5% de la población argentina sin diferencia por edad ni sexo","Afecta al 29-34% de la población argentina; es un problema de salud pública por sus complicaciones e incapacidades","Solo afecta a adultos mayores de 65 años sin presencia en poblaciones más jóvenes","Es una enfermedad rara que afecta menos del 1% de la población general"],a:1},
{t:14,q:"¿Cuál es la etiología de la HTA primaria y secundaria?",opts:["Siempre tiene causa conocida y tratable sin variantes primarias ni secundarias","Primaria: factores genéticos, ambientales y psicosociales de causa desconocida; secundaria: consecuencia de otra enfermedad como insuficiencia renal, trastornos endocrinos o neurológicos","Solo la alimentación con exceso de sodio causa la HTA en todos los casos","Únicamente factores genéticos sin influencia de factores ambientales ni del estilo de vida"],a:1},
{t:14,q:"¿Cuál es el cuadro clínico de la hipertensión arterial?",opts:["Siempre presenta síntomas evidentes desde el inicio de la enfermedad","Generalmente asintomática; cuando aparecen síntomas: mareos, visión borrosa, cefalea, nerviosismo, palpitaciones, taquicardia, calambres y dolor de pecho","Solo produce dolor de cabeza intenso como único síntoma reconocible","Únicamente edema periférico y disnea como manifestaciones clínicas principales"],a:1},
{t:14,q:"¿En qué órganos produce daño la hipertensión arterial no controlada?",opts:["Solo daña el corazón sin afectar otros órganos en la hipertensión crónica","Cerebro (ACV), corazón y grandes vasos (IAM, IC), riñón (insuficiencia renal) y ojos (retinopatía) como órganos blancos principalmente afectados","Solo los riñones y los ojos sin compromiso cerebral ni cardíaco","Únicamente el sistema vascular periférico sin afectar órganos vitales"],a:1},
{t:14,q:"¿Cuáles son los fármacos utilizados en el tratamiento de la HTA?",opts:["Solo diuréticos como único tratamiento farmacológico eficaz para la HTA","Diuréticos (furosemida), betabloqueantes (atenolol), bloqueantes cálcicos (amlodipina), IECA (enalapril) y antagonistas de angiotensina (losartán)","Solo betabloqueantes sin otros grupos farmacológicos disponibles","Únicamente antagonistas de la angiotensina como tratamiento de primera línea"],a:1},
{t:14,q:"¿Cuál es el tratamiento no farmacológico de la HTA?",opts:["Solo restricción hídrica total sin otros cambios en el estilo de vida","Modificar el estilo de vida: dieta hiposódica, reducción de peso, actividad física, abandono del tabaco y alcohol y manejo del estrés","Solo reposo absoluto sin otras modificaciones del estilo de vida","Únicamente eliminar el consumo de café sin otras intervenciones no farmacológicas"],a:1},
{t:14,q:"¿Cuáles son las complicaciones más graves de la hipertensión arterial?",opts:["Solo cefalea crónica sin complicaciones orgánicas graves posibles","ACV, insuficiencia cardíaca, IAM, insuficiencia renal e hipertrofia ventricular izquierda como complicaciones más graves de la HTA no controlada","Solo retinopatía hipertensiva sin complicaciones cardiovasculares ni renales","Únicamente impotencia sexual y calambres como complicaciones menores"],a:1},
{t:14,q:"¿Cuáles son los cuidados de enfermería en el paciente hipertenso?",opts:["Solo administrar antihipertensivos sin otras intervenciones específicas del enfermero","Plan de cuidados individual, control y regulación de la TA, administración de fármacos, dieta hiposódica e hipocalórica, ambiente tranquilo y educación para mejorar la calidad de vida","Solo monitoreo de la TA sin educación ni intervención en el estilo de vida","Únicamente control de laboratorio renal sin otras medidas de enfermería"],a:1},
{t:14,q:"¿Qué es la crisis hipertensiva y cuáles son sus características?",opts:["Descenso brusco de la TA con síncope y pérdida de conciencia transitoria","Elevación aguda de la TA por encima de 200-220/120 mmHg capaz de producir daño estructural o funcional en diferentes órganos que requiere tratamiento urgente","Aumento leve de la TA que se resuelve solo con reposo sin tratamiento médico","Arritmia cardíaca por estrés emocional con elevación transitoria de la TA"],a:1},
{t:14,q:"¿Qué diagnóstico de enfermería es pertinente en el paciente hipertenso?",opts:["Dolor agudo relacionado con infección bacteriana del sistema cardiovascular","Riesgo de perfusión tisular ineficaz relacionado con aumento sostenido de la presión arterial manifestado por cefalea y visión borrosa","Déficit de conocimientos relacionado con la prescripción de insulina","Alteración del patrón de eliminación urinaria relacionado con retención aguda de orina"],a:1},
{t:14,q:"¿Cómo se realiza el diagnóstico de la hipertensión arterial?",opts:["Solo con una medición de TA elevada en consultorio en una única oportunidad","Sospecha clínica por síntomas, entrevista clínica, examen físico, control de TA en múltiples oportunidades, laboratorio (glucemia, urea, creatinina), ECG, fondo de ojo y Rx de tórax","Solo con análisis de sangre y orina sin medición directa de la TA","Únicamente con ecocardiograma para detectar hipertrofia ventricular izquierda"],a:1},
{t:14,q:"¿Cuáles son los factores que contribuyen a la aparición de la HTA primaria?",opts:["Solo factores hereditarios sin influencia del estilo de vida personal","Obesidad, colesterol elevado, consumo excesivo de sal, sedentarismo y tabaquismo son factores que contribuyen a su aparición","Solo el consumo de alcohol sin otros factores contribuyentes reconocidos","Únicamente el estrés laboral sin relación con la alimentación ni el ejercicio"],a:1},

// ─── TEMA 16 ─── Colagenopatías (13)
{t:15,q:"¿Cuáles son los órganos que intervienen en el sistema inmunitario?",opts:["Solo el bazo y los ganglios linfáticos sin otros órganos importantes","Médula ósea (produce linfocitos), timo (madura células), bazo (filtra sangre) y nodos linfáticos (eliminan materiales extraños de la linfa)","Solo el hígado y el páncreas como órganos principales del sistema inmune","Únicamente los pulmones y el intestino como sitios de respuesta inmunológica"],a:1},
{t:15,q:"¿Cuáles son los tipos de inmunidad y cómo se adquieren?",opts:["Solo existe inmunidad adquirida por vacunación sin inmunidad natural","Natural (se obtiene al nacer con barreras físicas, químicas e interferones) y adquirida (se desarrolla durante la vida mediante respuestas humorales y celulares)","Solo existe inmunidad activa sin formas pasivas de inmunidad","Únicamente inmunidad por anticuerpos sin componente celular en la respuesta inmune"],a:1},
{t:15,q:"¿Qué es la fiebre reumática y cuáles son sus criterios diagnósticos mayores?",opts:["Infección directa del corazón por estreptococo que produce endocarditis bacteriana","Enfermedad inflamatoria secuela de infección faríngea estreptocócica; criterios mayores: artritis, carditis (endocarditis, miocarditis, pericarditis), corea, nódulos subcutáneos y eritema marginado","Enfermedad autoinmune primaria que afecta exclusivamente la piel","Vasculitis sistémica de causa viral con compromiso renal y articular"],a:1},
{t:15,q:"¿Cuáles son los criterios menores de la fiebre reumática?",opts:["Artritis, carditis y corea como únicos criterios para el diagnóstico","Malestar general, astenia, adinamia, anorexia, hipertermia (38°C), epistaxis y artralgia como criterios menores que apoyan el diagnóstico","Solo fiebre mayor a 39°C y eritema marginado como criterios menores","Únicamente el antecedente de faringitis sin otros criterios de diagnóstico"],a:1},
{t:15,q:"¿Cuál es el tratamiento de la fiebre reumática?",opts:["Solo antiinflamatorios sin antibióticos ni reposo en cama","Reposo en cama 6-8 semanas, penicilina o eritromicina, ácido acetilsalicílico y corticosteroides para el tratamiento inflamatorio","Solo antibióticos sin antiinflamatorios ni período de reposo en cama","Únicamente inmunosupresores para detener la respuesta autoinmune"],a:1},
{t:15,q:"¿Qué es el lupus eritematoso y cuáles son sus 11 criterios diagnósticos?",opts:["Infección bacteriana que produce erupción cutánea y fiebre alta recurrente","Vasculopatía del colágeno que afecta múltiples sistemas; criterios: erupción en alas de mariposa, erupción discoide, fotosensibilidad, úlceras orales, artritis, serositis, afectación renal, neurológica, hematológica, inmunológica y anticuerpos antinucleares","Enfermedad autoinmune que solo afecta articulaciones sin compromiso sistémico","Solo una enfermedad de la piel sin afectación de órganos internos"],a:1},
{t:15,q:"¿Cuáles son las manifestaciones clínicas del lupus eritematoso sistémico (LES)?",opts:["Solo erupción cutánea facial sin compromiso de otros órganos o sistemas","Lesiones cutáneas en alas de mariposa, artritis, psicosis, convulsiones, pericarditis, pleuresía, nefritis, anemia, adenopatías y trastornos gastrointestinales","Solo artritis y fiebre sin compromiso cutáneo ni neurológico","Únicamente compromiso renal sin manifestaciones en piel ni articulaciones"],a:1},
{t:15,q:"¿Cuál es el tratamiento del LES y los cuidados de enfermería?",opts:["Solo corticosteroides a dosis altas sin otras medidas terapéuticas","Vida tranquila, evitar el sol, dieta adecuada, antipalúdicos, plasmaféresis y diálisis si necesario; enfermería: integridad de la piel, reducción de fatiga, alivio del dolor y uso apropiado del proceso de duelo","Solo inmunosupresores sin cuidados de enfermería específicos","Únicamente reposo absoluto sin medicación ni cuidados de enfermería específicos"],a:1},
{t:15,q:"¿Qué es la artritis reumatoidea y cuál es su epidemiología?",opts:["Infección bacteriana de las articulaciones por estafilococo dorado","Enfermedad crónica con inflamación de la membrana sinovial articular, dolor e inmovilidad; afecta a 1 de cada 10 personas; 2-3 mujeres por cada varón sin diferencias de raza","Solo afecta a hombres mayores de 60 años sin diferencias por sexo","Es una enfermedad viral que se cura espontáneamente en todos los casos"],a:1},
