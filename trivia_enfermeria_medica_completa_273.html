{t:15,q:"¿Cuál es el cuadro clínico de la artritis reumatoidea?",opts:["Solo dolor articular sin inflamación ni compromiso del estado general","Inflamación articular blanda, piel tensa y brillante, enrojecimiento en dedos, nódulos reumatoides, malestar general, fatiga, rigidez matutina, anorexia y febrícula","Solo rigidez articular sin inflamación visible ni signos sistémicos","Únicamente edema articular sin dolor ni limitación funcional"],a:1},
{t:15,q:"¿Cuál es el tratamiento de la artritis reumatoidea?",opts:["Solo reposo articular sin medicación específica de ningún tipo","Conservar función articular, prevenir deformidades; fármacos: AINE, antirreumáticos de acción lenta, citotóxicos, corticoides; fisioterapia y cirugía reconstructiva","Solo antibióticos sin antiinflamatorios ni fisioterapia específica","Únicamente cirugía sin tratamiento médico previo ni rehabilitación"],a:1},
{t:15,q:"¿Cuáles son los cuidados de enfermería en enfermedades reumáticas?",opts:["Solo administrar medicación sin otras intervenciones de enfermería específicas","Aliviar el dolor, aplicar calor y frío, promoción de la salud, valoración nutricional, fomento del autocuidado, optimizar el concepto de sí mismo y medicación indicada","Solo control de signos vitales sin otras intervenciones de enfermería","Únicamente cambios posturales sin control del dolor ni apoyo psicológico"],a:1},
{t:15,q:"¿Cuáles son las barreras de la inmunidad natural y cómo funcionan?",opts:["Solo los anticuerpos como barrera principal sin otras formas de protección","Físicas (piel, mucosas, cilios, tos y estornudo), químicas (enzimas lagrimales, saliva y sustancias sebáceas) e interferones (responden ante virus) forman la primera línea de defensa","Solo la piel como única barrera sin otras estructuras protectoras","Únicamente los glóbulos blancos como barrera primaria de la inmunidad natural"],a:1},

// ─── TEMA 17 ─── Afecciones Renales (13)
{t:16,q:"¿Cuáles son las principales manifestaciones clínicas de la disfunción urinaria?",opts:["Solo dolor lumbar y fiebre sin cambios en la micción ni en la orina","Polaquiuria, neumoturia, disuria, incontinencia urinaria, enuresis, poliuria, oliguria y hematuria; junto a síntomas gastrointestinales como náuseas y vómitos","Solo cambios en el color de la orina sin alteración en la frecuencia ni en la cantidad","Únicamente aumento de la frecuencia urinaria nocturna sin otros síntomas"],a:1},
{t:16,q:"¿Qué es la pielonefritis y cuáles son sus agentes causales más frecuentes?",opts:["Reacción inmunológica del glomérulo causada por estreptococo del grupo A","Infección bacteriana de la pelvis renal, túbulos y tejido intersticial; agentes causales: E. coli (más frecuente), Klebsiella, Enterobacter y Pseudomonas","Acumulación de piedras cálcicas en la pelvis renal por hipercalciuria crónica","Inflamación autoinmune del riñón por anticuerpos contra la membrana glomerular"],a:1},
{t:16,q:"¿Cuál es el cuadro clínico de la pielonefritis?",opts:["Solo fiebre alta sin síntomas urinarios ni dolor lumbar asociados","Escalofríos, fiebre, sensibilidad en el flanco, leucocitosis, bacteriuria y piuria, disuria y polaquiuria; puede cronificarse si no se trata","Solo disuria y polaquiuria sin fiebre ni compromiso del estado general","Únicamente edema facial e hipertensión arterial sin síntomas urinarios"],a:1},
{t:16,q:"¿Qué es la glomerulonefritis y cuál es su mecanismo patogénico?",opts:["Infección bacteriana directa de los glomérulos por E. coli ascendente","Reacción del glomérulo como consecuencia de los efectos secundarios del mecanismo de defensa; elevación de IgG que se adhiere a las paredes capilares; secundaria a infección por estreptococo del grupo A","Solo un problema hereditario sin relación con infecciones previas","Obstrucción mecánica de los glomérulos por cálculos renales calcificados"],a:1},
{t:16,q:"¿Cuál es el cuadro clínico de la glomerulonefritis?",opts:["Fiebre alta, dolor lumbar intenso, bacteriuria y cultivo de orina positivo","Solo descubierta en examen ocasional; puede presentar síndrome febril, edema facial o anasarca, oliguria, hematuria e HTA ligera con antecedente de faringitis","Solo edema renal masivo sin otros síntomas clínicos observables","Únicamente hematuria macroscópica sin edema ni hipertensión asociada"],a:1},
{t:16,q:"¿Cuál es el diagnóstico de la pielonefritis?",opts:["Solo con síntomas clínicos sin necesidad de estudios de laboratorio","Urograma intravenoso, identificación de gérmenes en orina, examen de orina completo y evaluación de la clínica del paciente","Solo con ecografía renal sin cultivo ni análisis de orina","Únicamente con radiografía simple de abdomen sin otros estudios"],a:1},
{t:16,q:"¿Cuáles son los cuidados de enfermería en la pielonefritis?",opts:["Solo administrar antibióticos sin otras intervenciones específicas del enfermero","Educación al paciente y familia, control de temperatura, cumplimiento de órdenes médicas, control de cultivo en orina, balance hidroelectrolítico y fomentar consumo de líquidos","Solo control de diuresis sin educación ni otras intervenciones de enfermería","Únicamente aislamiento del paciente sin otras medidas de cuidado enfermero"],a:1},
{t:16,q:"¿Cuáles son los cuidados de enfermería en la glomerulonefritis?",opts:["Solo dieta hipoproteica sin otras intervenciones específicas de enfermería","Control de signos vitales especialmente TA, balance hidroelectrolítico estricto, peso diario en ayunas, reposo en cama, dieta restringida en sodio y suministrar líquidos según eliminación","Solo reposo absoluto sin control de TA ni dieta específica","Únicamente control de proteinuria en orina sin otras medidas de enfermería"],a:1},
{t:16,q:"¿Cuál es el diagnóstico de la glomerulonefritis y sus hallazgos de laboratorio?",opts:["Solo cultivo de orina positivo como único hallazgo diagnóstico","Examen de orina con volumen disminuido, densidad aumentada, eritrocitos, leucocitos y albumina; sangre con nitrógeno úrico aumentado y anemia","Solo aumento de la creatinina sérica sin otros hallazgos de laboratorio","Únicamente hipertensión arterial como único hallazgo diagnóstico"],a:1},
{t:16,q:"¿Qué es la polaquiuria y qué es la disuria?",opts:["Polaquiuria: dolor al orinar; disuria: aumento del volumen urinario","Polaquiuria: mayor frecuencia de la micción; disuria: micción dolorosa y difícil","Polaquiuria: ausencia de orina; disuria: presencia de sangre en la orina","Polaquiuria: gran volumen de orina; disuria: salida involuntaria de orina"],a:1},
{t:16,q:"¿Cuál es el tratamiento de la pielonefritis?",opts:["Solo reposo absoluto sin antibióticos ni aumento de ingesta hídrica","Erradicar patógenos causales, prevenir reinfección, conservar función renal y líquido abundante; antibióticos según cultivo y antibiograma","Solo aumento de ingesta hídrica sin antibióticos ni controles de laboratorio","Únicamente cirugía renal sin tratamiento médico previo"],a:1},
{t:16,q:"¿Cuál es el tratamiento de la glomerulonefritis?",opts:["Solo antibióticos sin ninguna restricción dietética ni reposo","Proteger los riñones, tratar complicaciones, penicilina si hay infección estreptocócica activa; restricción de sodio, reposo y balance estricto","Solo diálisis inmediata sin tratamiento médico conservador previo","Únicamente corticosteroides sin antibióticos ni restricciones dietéticas"],a:1},
{t:16,q:"¿Cómo pueden afectar los gérmenes al riñón según sus mecanismos?",opts:["Solo por vía ascendente desde la uretra sin otras formas de infección renal","Colonización directa del parénquima (pielonefritis, absceso), cuadro urinario específico (TBC renal) y acciones a distancia sobre los glomérulos (glomerulonefritis)","Solo por vía hematógena desde otros focos infecciosos del organismo","Únicamente por vía linfática desde los ganglios abdominales adyacentes"],a:1},

// ─── TEMA 18 ─── Hemáticas (13)
{t:17,q:"¿Qué es la anemia y cuál es su etiología más frecuente?",opts:["Exceso de glóbulos rojos por sobreproducción de la médula ósea","Concentración subnormal de hemoglobina insuficiente para aportar oxígeno; causas más frecuentes: hemorragia, déficit de hierro, factores hereditarios y enfermedades crónicas","Solo déficit vitamínico como única causa posible de anemia en adultos","Infección bacteriana de la médula ósea con reducción de la producción de eritrocitos"],a:1},
{t:17,q:"¿Cuál es el cuadro clínico de la anemia?",opts:["Solo palidez sin otros síntomas sistémicos ni digestivos","Debilidad, fatiga, irritabilidad, hematomas, epistaxis, fiebre o infecciones, ardor de estómago, dolores abdominales vagos, anorexia, bazo palpable en fase avanzada","Solo disnea y taquicardia como únicos síntomas cardinales de la anemia","Únicamente mareos y cefalea sin compromiso digestivo ni hematológico"],a:1},
{t:17,q:"¿Cuáles son los tipos principales de anemia y sus características?",opts:["Solo existe un tipo de anemia sin subdivisiones posibles","Ferropénica (déficit de hierro), hemolítica (destrucción temprana de eritrocitos), aplásica, perniciosa (déficit de B12), de células falciformes (hereditaria grave) y de Cooley","Solo anemia aguda y crónica sin otras clasificaciones por mecanismo","Únicamente anemia nutricional y anemia infecciosa como dos tipos existentes"],a:1},
{t:17,q:"¿Cuál es el tratamiento de la anemia?",opts:["Solo reposo absoluto sin modificaciones dietéticas ni medicación específica","Identificar y tratar la hemorragia crónica, administrar hierro, dieta rica en carnes rojas y cítricos, transfusión, antibióticos si hay infección y trasplante de médula ósea si necesario","Solo transfusión de sangre sin tratamiento de la causa subyacente","Únicamente vitamina B12 intramuscular sin otros tratamientos según el tipo"],a:1},
{t:17,q:"¿Qué es la leucemia y cómo se clasifica?",opts:["Infección viral de los glóbulos blancos sin proliferación ni acumulación anormal","Proliferación no regulada de leucocitos en la médula ósea; se clasifica según la línea celular (linfocítica o mielogénica) y la madurez (aguda con células inmaduras o crónica)","Solo una enfermedad aguda que afecta exclusivamente a niños menores de 10 años","Únicamente enfermedad crónica sin formas agudas ni diferencia por línea celular"],a:1},
{t:17,q:"¿Cuál es el cuadro clínico y pronóstico de la leucemia mielógena aguda (LMA)?",opts:["Solo asintomática con hallazgo casual en hemograma de control periódico","Anemia, vulnerabilidad a infecciones, dolor por hepato y esplenomegalia, cefalea, vómitos y dolor óseo; pronóstico: 2 meses a 1 año de vida","Solo leucocitosis sin síntomas sistémicos ni compromiso hepático o esplénico","Únicamente dolor óseo sin otras manifestaciones clínicas ni compromiso sistémico"],a:1},
{t:17,q:"¿Cuál es el cuadro clínico de la leucemia linfocítica crónica (LLC)?",opts:["Siempre sintomática desde el diagnóstico con fiebre y dolor óseo intenso","Frecuentemente asintomática; anemia, infecciones frecuentes, aumento de tamaño de ganglios y órganos abdominales y linfocitosis; pronóstico: aproximadamente 2 años","Solo tos y síntomas respiratorios sin compromiso hematológico ni linfático","Únicamente pérdida de peso severa sin otras manifestaciones clínicas"],a:1},
{t:17,q:"¿Cuál es el tratamiento de las leucemias?",opts:["Solo reposo y dieta sin tratamiento específico para las leucemias","Destrucción de células anormales mediante quimioterapia y radioterapia, transfusiones de sangre y plaquetas, y trasplante de médula ósea","Solo antibióticos para prevenir infecciones sin tratamiento de la leucemia en sí","Únicamente corticosteroides sin quimioterapia ni trasplante de médula ósea"],a:1},
{t:17,q:"¿Cuáles son los cuidados de enfermería en el paciente con leucemia?",opts:["Solo administrar quimioterapia sin otras intervenciones de enfermería específicas","Evitar ácido acetilsalicílico, observar petequias y hemorragias, extremar higiene para evitar infecciones, restringir visitas, apoyo psicológico y administrar abundante líquido","Solo control de hemograma sin cuidados directos al paciente leucémico","Únicamente transfusiones de sangre sin otras medidas de cuidado enfermero"],a:1},
{t:17,q:"¿Qué es la púrpura trombocitopénica y cuáles son sus manifestaciones clínicas?",opts:["Exceso de plaquetas con tendencia a la trombosis y embolias vasculares","Disminución de plaquetas con epistaxis, equimosis, petequias, hemorragia menstrual y riesgo de hemorragia del SNC; etiología generalmente desconocida (idiopática)","Infección bacteriana que destruye los eritrocitos con hemólisis masiva e ictericia","Aumento de linfocitos en sangre con adenopatías generalizadas y esplenomegalia"],a:1},
{t:17,q:"¿Cuáles son los tipos de púrpura y sus características?",opts:["Solo existe un tipo de púrpura sin subdivisiones clínicas posibles","Simple, por sensibilidad a ADN, autoeritrocítica, trombocitopénica por fármacos, PTI aguda post-infecciosa, PTI crónica, trombótica trombocitopénica, vascular y senil","Solo púrpura aguda y crónica sin otras clasificaciones posibles","Únicamente púrpura por fármacos y por infecciones sin otras formas"],a:1},
{t:17,q:"¿Cuáles son los estudios diagnósticos para la anemia?",opts:["Solo análisis de sangre con hemograma sin otros estudios necesarios","Índice hematocrito, cuenta eritrocítica y leucocítica, hierro sérico, cuenta plaquetaria, protrombina y biopsia de médula ósea","Solo recuento de glóbulos rojos sin otras determinaciones de laboratorio","Únicamente ecografía abdominal para evaluar el tamaño del bazo"],a:1},
{t:17,q:"¿Cuál es la fisiopatología de la anemia?",opts:["Siempre causada por exceso de destrucción de eritrocitos sin otros mecanismos","Insuficiencia de la médula ósea o destrucción excesiva de eritrocitos; si la destrucción es intravascular aparece hemoglobinemia libre en plasma como dato diagnóstico etiológico","Solo por déficit nutricional sin otros mecanismos fisiopatológicos posibles","Únicamente por hemorragia aguda sin formas crónicas de presentación"],a:1},

// ─── TEMA 19 ─── ETS (13)
{t:18,q:"¿Qué es la sífilis, cuál es su agente causal y cómo se transmite?",opts:["Infección viral de transmisión sexual; se transmite solo por vía sanguínea","Enfermedad infecciosa de transmisión sexual causada por Treponema pallidum (espiroqueta); transmisión: exposición a exudado infeccioso en contacto sexual, lesiones abiertas, sangre infectada o vía transplacentaria","Infección bacteriana solo de transmisión vertical sin contagio sexual","Solo por vía aérea en pacientes inmunocomprometidos con lesiones abiertas"],a:1},
{t:18,q:"¿Cuáles son las etapas de la sífilis y sus manifestaciones clínicas?",opts:["Solo dos etapas: primaria con chancro y terciaria con demencia","Incubación (10-60 días sin síntomas), primaria (chancro infectante), secundaria (lesiones cutáneas generalizadas, fiebre, adenopatías) y terciaria (compromiso cardiovascular y del SNC con demencia y meningitis)","Solo una etapa sintomática con lesiones genitales que curan solas","Cuatro etapas idénticas en síntomas sin diferencia en el grado de compromiso orgánico"],a:1},
{t:18,q:"¿Cómo se diagnostica la sífilis serológicamente?",opts:["Solo con examen físico del chancro sin necesidad de estudios de laboratorio","VDRL como reacción reaginica inicial; si positiva se confirma con reacciones específicas treponémicas (FTA-ABS, TPHA); se informan como reactivos, dudosos o negativos","Solo con biopsia de la lesión sin estudios serológicos de ningún tipo","Únicamente con cultivo bacteriológico del exudado de las lesiones activas"],a:1},
{t:18,q:"¿Cuál es el tratamiento de la sífilis y los cuidados de enfermería?",opts:["Solo antivirales sin antibióticos ni cuidados específicos de enfermería","Penicilina benzatínica; alérgicos: tetraciclina; cuidados: guantes para contacto con lesiones, lavado de manos, instruir al paciente y múltiples inyecciones requeridas","Solo antibióticos tópicos sin penicilina sistémica ni cuidados especiales","Únicamente abstinencia sexual sin tratamiento farmacológico específico"],a:1},
{t:18,q:"¿Cómo se previene la sífilis?",opts:["Solo la vacunación como medida preventiva eficaz para la sífilis","Limitar el número de parejas, usar preservativo con espermicida, observar al compañero sexual para detectar lesiones o secreciones y ser responsable en las conductas sexuales","Solo el tratamiento precoz sin medidas preventivas de comportamiento sexual","Únicamente exámenes serológicos anuales sin otras medidas preventivas"],a:1},
{t:18,q:"¿Qué es la gonorrea, cuál es su agente causal y cómo se transmite?",opts:["Infección viral de transmisión sexual causada por el VIH tipo 2","Infección por Neisseria gonorrhoeae (cocobacilo gram negativo); transmisión sexual; incubación 2-10 días; puede presentarse en el neonato por contacto durante el parto","Solo se transmite por vía sanguínea al compartir jeringas contaminadas","Infección fúngica de transmisión sexual causada por Candida albicans"],a:1},
{t:18,q:"¿Cuáles son las manifestaciones clínicas de la gonorrea en la mujer?",opts:["Solo lesiones genitales externas visibles sin síntomas sistémicos","El cuello uterino es el sitio principal de infección; aumento del exudado vaginal, prurito, riesgo de embarazo ectópico y oclusión bilateral de trompas de Falopio","Solo fiebre alta y dolor abdominal sin síntomas ginecológicos específicos","Únicamente disuria sin otras manifestaciones clínicas en la mujer"],a:1},
{t:18,q:"¿Cuál es el diagnóstico y tratamiento de la gonorrea?",opts:["Solo con examen físico sin estudios de laboratorio ni cultivo bacteriológico","Diagnóstico: cuadro clínico y tinción de Gram en cultivo del material; tratamiento: ciprofloxacina 500mg oral, azitromicina 1g oral, espectinomicina o ceftriaxona IM","Solo con análisis de sangre sin cultivo del exudado uretral o vaginal","Únicamente penicilina IM sin otras opciones de tratamiento antiinfeccioso"],a:1},
{t:18,q:"¿Qué es el VIH y cómo afecta al sistema inmunológico?",opts:["Es una bacteria que destruye los eritrocitos produciendo anemia hemolítica grave","Retrovirus que invade y destruye los linfocitos T4 (CD4), deteriorando progresivamente el sistema inmunológico hasta producir el SIDA cuando está gravemente comprometido","Es un hongo oportunista que solo afecta a pacientes desnutridos","Parásito intracelular que afecta el páncreas produciendo diabetes secundaria"],a:1},
{t:18,q:"¿Cuáles son los síntomas del SIDA en etapa avanzada?",opts:["Solo fiebre leve y malestar general sin manifestaciones graves","Cefalea, cansancio, infecciones oportunistas, inflamación de ganglios, sudores nocturnos, náuseas, diarrea, pérdida de peso, erupciones cutáneas y lesiones en mucosas; los cánceres e infecciones oportunistas causan la muerte","Solo pérdida de peso sin otras manifestaciones clínicas significativas","Únicamente tos seca sin otros síntomas sistémicos ni infecciones oportunistas"],a:1},
{t:18,q:"¿Cuál es el tratamiento del VIH/SIDA?",opts:["No existe tratamiento disponible para el VIH en la actualidad","Antirretrovirales en terapia combinada (ej. efavirenz, ritonavir) para mantener controlada la infección y reducir la carga viral sin eliminar el virus","Solo antibióticos para las infecciones oportunistas sin tratamiento antiviral","Únicamente inmunoestimulantes para restablecer la función del sistema inmune"],a:1},
{t:18,q:"¿Cuáles son los cuidados de enfermería en pacientes con enfermedades de transmisión sexual?",opts:["Solo aislamiento estricto del paciente sin educación ni otras intervenciones","Usar guantes descartables en obtención de cultivos, lavarse las manos, educación al paciente sobre prevención, conducta responsable y llevar muestras urgentemente al laboratorio","Solo administrar medicación sin educación ni consejería al paciente","Únicamente derivar al paciente sin ninguna intervención de enfermería directa"],a:1},
{t:18,q:"¿Cuáles son las reacciones falsamente positivas para la sífilis?",opts:["La VDRL nunca da falsos positivos por ser altamente específica para sífilis","Paludismo, Chagas, lepra, colagenopatías, cáncer, embarazo, gestosis y algunos medicamentos como antisépticos bronquiales pueden dar reacciones positivas falsas","Solo el embarazo produce falsos positivos sin otras causas posibles","Únicamente enfermedades autoinmunes sin otras causas de falsos positivos"],a:1},

// ─── TEMA 20 ─── Enfermedades de la Piel (13)
{t:19,q:"¿Qué es el pénfigo y cuáles son sus características clínicas principales?",opts:["Infección bacteriana de la piel con costras amarillas y prurito intenso","Enfermedad ampollosa autoinmune que afecta piel y mucosas; se caracteriza por ampollas intraepidérmicas que se rompen dejando erosiones; puede ser grave y requerir corticoides","Solo afecta el cuero cabelludo sin extenderse a otras zonas del cuerpo","Infestación parasitaria de la piel con pápulas y excoriaciones intensas"],a:1},
{t:19,q:"¿Qué es la lepra, cuál es su agente causal y cómo se transmite?",opts:["Infección por virus que produce manchas despigmentadas en la piel","Enfermedad infecciosa crónica causada por Mycobacterium leprae; transmisión por contacto prolongado con personas no tratadas; afecta piel, nervios periféricos y mucosas","Solo se transmite por vía sanguínea al compartir instrumentos cortopunzantes","Infestación parasitaria por artrópodos que vive en la epidermis superficial"],a:1},
{t:19,q:"¿Qué es la psoriasis y cuáles son sus manifestaciones clínicas?",opts:["Infección fúngica de la piel que produce manchas rosadas con escamas","Enfermedad crónica inflamatoria no infecciosa de la piel con placas eritematosas cubiertas de escamas plateadas; puede afectar codos, rodillas, cuero cabelludo y uñas","Solo afecta las mucosas sin manifestaciones cutáneas externas visibles","Infestación por piojos que produce prurito intenso en el cuero cabelludo"],a:1},
{t:19,q:"¿Cómo se diferencia el pénfigo de la psoriasis en sus características clínicas?",opts:["Son la misma enfermedad con distinto nombre sin diferencias clínicas","El pénfigo es ampolloso y autoinmune con erosiones en piel y mucosas; la psoriasis es crónica no infecciosa con placas descamativas eritematosas sin ampollas","Solo se diferencian por la zona del cuerpo afectada sin diferencia en su mecanismo","Ambas son infecciosas y contagiosas con el mismo tratamiento farmacológico"],a:1},
{t:19,q:"¿Cuál es la etiología de las enfermedades de la piel en general?",opts:["Siempre infecciosas y nunca autoinmunes ni crónicas no infecciosas","Diversa: infecciosa (bacteria, virus, hongos, parásitos), autoinmune (pénfigo, psoriasis), hereditaria, alérgica y ambiental según el tipo de enfermedad cutánea","Solo genética sin influencia de factores ambientales ni infecciosos","Únicamente alérgica por hipersensibilidad a agentes externos"],a:1},
{t:19,q:"¿Cuál es el tratamiento del pénfigo y cuáles son los cuidados de enfermería?",opts:["Solo antibióticos tópicos sin tratamiento sistémico de ningún tipo","Corticosteroides sistémicos e inmunosupresores; enfermería: cuidados de las lesiones cutáneas, prevención de infecciones secundarias, alivio del dolor y educación al paciente","Solo antifúngicos tópicos sin corticoides ni inmunosupresores sistémicos","Únicamente antihistamínicos orales para el prurito sin otros tratamientos"],a:1},
{t:19,q:"¿Cuál es el tratamiento de la psoriasis?",opts:["Solo hidratación de la piel sin tratamiento médico específico posible","Corticosteroides tópicos, análogos de vitamina D, metotrexato, fototerapia, biológicos y terapia sistémica según la gravedad y extensión de las lesiones","Solo antibióticos sistémicos para eliminar el agente infeccioso causante","Únicamente antihistamínicos sin corticoides ni inmunosupresores"],a:1},
{t:19,q:"¿Cuál es el tratamiento de la lepra y cuánto tiempo dura?",opts:["Solo aislamiento estricto sin tratamiento farmacológico específico disponible","Poliquimioterapia (rifampicina, dapsona, clofazimina) durante 6-12 meses según el tipo; detectar y tratar precozmente para evitar deformidades nerviosas","Solo antibióticos por 7 días sin necesidad de tratamiento prolongado","Únicamente cirugía reconstructiva sin tratamiento farmacológico previo"],a:1},
{t:19,q:"¿Qué es la fisiopatología del pénfigo?",opts:["Infección bacteriana de la epidermis que produce vesículas purulentas superficiales","Producción de autoanticuerpos (IgG) contra proteínas de unión de los queratinocitos (desmogleínas), provocando pérdida de cohesión celular y formación de ampollas intraepidérmicas","Infestación por ácaros que producen ampollas por excavación en la epidermis","Reacción alérgica a alimentos que produce ampollas por hipersensibilidad cutánea"],a:1},
{t:19,q:"¿Cómo se diagnóstica el pénfigo?",opts:["Solo con examen físico de las lesiones sin estudios de laboratorio","Biopsia de la piel con estudio histológico e inmunofluorescencia directa para detectar depósitos de IgG en la epidermis; signo de Nikolsky positivo","Solo con análisis de sangre sin biopsia cutánea ni estudios inmunológicos","Únicamente con fotografía de las lesiones sin estudios de laboratorio"],a:1},
{t:19,q:"¿Cómo se diagnóstica la psoriasis?",opts:["Solo con análisis de sangre específico para psoriasis sin examen físico","Clínico por las características de las placas; biopsia de piel cuando hay dudas diagnósticas; se evalúa extensión, localización e impacto en la calidad de vida","Solo con estudio genético familiar sin evaluación clínica directa","Únicamente con cultivo de las escamas para descartar infección fúngica"],a:1},
{t:19,q:"¿Cuáles son las características clínicas de la lepra según su forma?",opts:["Solo manchas hiperpigmentadas con prurito intenso en todas sus formas","Lepromatosa (muchos bacilos, compromiso extenso de piel y nervios) y tuberculoide (pocos bacilos, manchas hipopigmentadas con anestesia local por daño nervioso)","Solo compromiso neurológico sin manifestaciones cutáneas visibles","Únicamente úlceras abiertas con exudado purulento en todas sus formas"],a:1},
{t:19,q:"¿Cuáles son los cuidados de enfermería en enfermedades de la piel?",opts:["Solo administrar medicación tópica sin otras intervenciones específicas","Cuidados de las lesiones cutáneas, prevención de infecciones secundarias, alivio del prurito y dolor, educación al paciente sobre el manejo de su enfermedad, apoyo emocional y promoción del autocuidado","Solo aislamiento del paciente sin otras medidas de cuidado enfermero","Únicamente control de temperatura y administración de antibióticos"],a:1},

// ─── TEMA 21 ─── Epidemiología (13)
{t:20,q:"¿Qué es la epidemiología y cuál es su objeto de estudio?",opts:["Solo estudia las enfermedades infecciosas en poblaciones hospitalizadas","Ciencia que estudia los factores asociados a enfermedades, su prevalencia, incidencia y distribución en poblaciones humanas para determinar formas de prevención y control","Solo estudia la anatomía y fisiología para prevenir enfermedades crónicas","Únicamente el tratamiento farmacológico de enfermedades en ensayos clínicos"],a:1},
{t:20,q:"¿Cuáles son los tres métodos de investigación epidemiológica?",opts:["Clínico, quirúrgico y farmacológico como únicos métodos de investigación","Descriptiva (describe distribución), analítica observacional (analiza hipótesis sin intervenir) y analítica experimental (interviene activamente en el proceso de investigación)","Solo descriptivo e interventivo como dos métodos epidemiológicos básicos","Únicamente estudios de cohorte y de casos y controles sin otros diseños"],a:1},
{t:20,q:"¿Qué son los estudios ecológicos en epidemiología?",opts:["Estudios individuales que siguen a una persona durante toda su vida","Estudios que obtienen datos de poblaciones completas para comprobar frecuencias en una misma población en diferentes períodos o entre distintas poblaciones","Solo estudios experimentales con grupos de intervención y control aleatorios","Únicamente revisiones bibliográficas sin recolección de datos primarios"],a:1},
{t:20,q:"¿Qué es el análisis de situación en epidemiología?",opts:["Solo la descripción de casos individuales sin análisis poblacional","Estudios que incorporan diferentes métodos para caracterizar, analizar e interpretar las condiciones de vida y salud de una población (FODA)","Solo análisis estadístico sin evaluación de condiciones sociales ni de salud","Únicamente encuestas de satisfacción sin análisis de determinantes de salud"],a:1},
{t:20,q:"¿Qué diferencia hay entre un estudio de casos y controles y un estudio de cohorte?",opts:["Son estudios idénticos sin diferencia metodológica ni en sus aplicaciones","Casos y controles: grupos definidos por presencia/ausencia de enfermedad, útil para baja prevalencia; cohorte: grupos definidos por exposición o no a factores, útil para exposiciones infrecuentes","Solo se diferencian por el tamaño de la muestra sin diferencia metodológica","Ambos requieren intervención activa del investigador en los grupos estudiados"],a:1},
{t:20,q:"¿Qué son los ensayos clínicos y cuáles son sus tipos?",opts:["Solo estudios observacionales sin intervención ni grupos de comparación","Estudios experimentales donde el investigador valora resultados de una intervención; tipos: terapéuticos (valoran tratamientos) y preventivos (valoran medidas preventivas) en individuos o comunidades","Solo revisiones de historias clínicas sin intervención ni grupos de control","Únicamente estudios ecológicos con datos de poblaciones agregadas"],a:1},
{t:20,q:"¿Cuál es la diferencia entre incidencia y prevalencia?",opts:["Son conceptos sinónimos usados indistintamente en todos los estudios epidemiológicos","Incidencia: número de casos nuevos en un período dado en una población específica; prevalencia: número de casos existentes en una población en un momento determinado","La prevalencia mide solo enfermedades agudas y la incidencia solo enfermedades crónicas","La incidencia se mide en hospitales y la prevalencia solo en comunidades rurales"],a:1},
{t:20,q:"¿Qué es la morbilidad y para qué se utiliza en epidemiología?",opts:["Solo mide la mortalidad por enfermedades en una población dada","Ocurrencia de una enfermedad que excede la incidencia prevista; número de personas que pueden llegar a enfermar; se usa para planificar servicios de salud y monitorear enfermedades","Solo mide la recuperación de los pacientes enfermos en el tiempo","Únicamente la tasa de mortalidad sin relación con la incidencia de enfermedad"],a:1},
{t:20,q:"¿Qué es la vigilancia epidemiológica y cuáles son sus etapas?",opts:["Es el tratamiento masivo de enfermedades endémicas sin análisis previo","Observación y análisis de la distribución de enfermedades para que la prevención y el control sean oportunos y efectivos; etapas: recolección, análisis, ejecución de medidas y diseminación de la información","Solo notificación de enfermedades al ministerio sin análisis ni respuesta","Únicamente control policial de personas con enfermedades contagiosas"],a:1},
{t:20,q:"¿Cuáles son los términos epidemiológicos de caso índice, primario y secundario?",opts:["Son términos sinónimos que describen el mismo caso sin diferencias","Caso índice: primer caso que llama la atención; primario: primer caso de un brote; secundario: caso nuevo que surge a partir del contacto con un caso primario","Solo existe caso primario y secundario sin otras denominaciones específicas","Únicamente caso nuevo y caso viejo como clasificaciones epidemiológicas"],a:1},
{t:20,q:"¿Qué es un estudio de corte transversal y para qué sirve?",opts:["Sigue a un grupo de personas durante años para medir eventos nuevos","Analiza datos de un grupo de sujetos en un momento dado; se llaman estudios de prevalencia porque miden enfermedades crónicas de larga evolución en una población","Solo mide la incidencia de enfermedades agudas en períodos cortos de tiempo","Únicamente evalúa el efecto de un tratamiento en un grupo de intervención"],a:1},
{t:20,q:"¿Cuáles son los campos de aplicación de la epidemiología en enfermería?",opts:["Solo el registro estadístico de enfermedades sin aplicación práctica directa","Identificar factores de riesgo, planificar programas preventivos, evaluar intervenciones en salud, monitorear enfermedades y orientar la vigilancia epidemiológica en la comunidad","Solo la investigación universitaria sin impacto en la práctica clínica cotidiana","Únicamente la administración hospitalaria sin aplicación en el cuidado del paciente"],a:1},
{t:20,q:"¿Qué es la epidemiología analítica experimental y en qué se diferencia de la observacional?",opts:["Son iguales y no hay diferencia entre experimental y observacional","La analítica experimental el investigador participa activamente, controla el proceso e introduce modificaciones necesarias; la observacional solo observa y analiza sin intervenir","La observacional es más rigurosa que la experimental en todos los casos","Solo la experimental usa grupos de comparación mientras la observacional no"],a:1},
];

// Estado
let modoActual = null; // null=inicio, 'tema'=un tema, 'todos'=todos
let temaSeleccionado = null;
let questions = [], current = 0, score = 0;
let timer = null, timeLeft = TIME, answered = false;

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepQ(pool, n) {
  return shuffleArray(pool).slice(0, n).map(q => {
    const correctText = q.opts[q.a];
    const shuffled = shuffleArray([...q.opts]);
    return { ...q, shuffledOpts: shuffled, correctText };
  });
}

function renderStart() {
  clearInterval(timer);
  const temasBtns = temas.map((t, i) => `<button class="mode-btn" onclick="seleccionarTema(${i})">${t}</button>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="mode-card">
      <h2>Elegí el modo de juego</h2>
      <button class="mode-btn all-btn" onclick="iniciarTodos()">🎯 Todos los temas — 13 preguntas aleatorias (273 en total)</button>
      <div style="margin:12px 0;font-size:0.82rem;color:var(--muted);text-align:center;font-weight:700;">── O practicá por tema ──</div>
      <div class="mode-btns">${temasBtns}</div>
    </div>`;
}

function seleccionarTema(idx) {
  temaSeleccionado = idx;
  const pool = allQ.filter(q => q.t === idx);
  questions = prepQ(pool, pool.length);
  current = 0; score = 0;
  renderQuestion();
}

function iniciarTodos() {
  temaSeleccionado = null;
  questions = prepQ(allQ, 13);
  current = 0; score = 0;
  renderQuestion();
}

function renderQuestion() {
  answered = false; timeLeft = TIME;
  clearInterval(timer);
  const q = questions[current];
  const total = questions.length;
  const pct = Math.round((current / total) * 100);
  const C = 2 * Math.PI * 24;

  document.getElementById('content').innerHTML = `
    <div class="progress-row">
      <div class="progress-wrap"><div class="progress-fill" id="pbar" style="width:${pct}%"></div></div>
      <div class="progress-label">${current + 1} / ${total}</div>
    </div>
    <div class="question-card">
      <div class="q-meta">${temas[q.t]}</div>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="timer-row">
      <div class="timer-circle">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle cx="28" cy="28" r="24" fill="none" stroke="#e5e7eb" stroke-width="5"/>
          <circle id="timer-arc" cx="28" cy="28" r="24" fill="none" stroke="#185FA5" stroke-width="5"
            stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="0" stroke-linecap="round"/>
        </svg>
        <div class="timer-num" id="tnum">${TIME}</div>
      </div>
      <div class="timer-info">
        <div class="t-label" id="tl-label">Segundos restantes</div>
        <div class="t-msg">¡Elegí tu respuesta!</div>
      </div>
    </div>
    <div class="options" id="opts">
      ${q.shuffledOpts.map((o, i) => `<button class="opt-btn" onclick="choose(${i})">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="nav-btn" id="next-btn" style="display:none" onclick="next()">${current + 1 < total ? 'Siguiente pregunta →' : 'Ver resultados'}</button>`;

  timer = setInterval(() => {
    timeLeft--;
    const el = document.getElementById('tnum');
    const arc = document.getElementById('timer-arc');
    const lbl = document.getElementById('tl-label');
    if (el) el.textContent = timeLeft;
    if (arc) {
      arc.style.strokeDashoffset = (C * (1 - timeLeft / TIME)).toFixed(1);
      arc.style.stroke = timeLeft <= 7 ? '#E24B4A' : '#185FA5';
    }
    if (lbl) lbl.style.color = timeLeft <= 7 ? '#b91c1c' : '';
    if (timeLeft <= 0) { clearInterval(timer); if (!answered) timeUp(); }
  }, 1000);
}

function choose(idx) {
  if (answered) return;
  answered = true; clearInterval(timer);
  const q = questions[current];
  const btns = document.querySelectorAll('.opt-btn');
  const fb = document.getElementById('fb');
  const nextBtn = document.getElementById('next-btn');
  btns.forEach(b => b.disabled = true);
  btns.forEach((b, i) => { if (q.shuffledOpts[i] === q.correctText) b.classList.add('correct'); });
  if (q.shuffledOpts[idx] === q.correctText) {
    score++;
    btns[idx].classList.add('correct');
    fb.innerHTML = '✅ ¡Correcto!';
    fb.className = 'feedback ok';
  } else {
    btns[idx].classList.add('wrong');
    fb.innerHTML = '❌ Incorrecto. La respuesta correcta está marcada en verde.';
    fb.className = 'feedback fail';
  }
  nextBtn.style.display = 'block';
}

function timeUp() {
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.opt-btn');
  const fb = document.getElementById('fb');
  const nextBtn = document.getElementById('next-btn');
  btns.forEach(b => b.disabled = true);
  btns.forEach((b, i) => { if (q.shuffledOpts[i] === q.correctText) b.classList.add('correct'); });
  fb.innerHTML = '⏱️ ¡Tiempo! La respuesta correcta está marcada en verde.';
  fb.className = 'feedback fail';
  nextBtn.style.display = 'block';
}

function next() {
  current++;
  if (current >= questions.length) renderResult();
  else renderQuestion();
}

function renderResult() {
  clearInterval(timer);
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  let msg = '';
  if (pct >= 85) msg = '🏆 ¡Excelente! Estás muy preparado/a para el examen.';
  else if (pct >= 60) msg = '👍 Buen repaso. Revisá los temas donde fallaste.';
  else msg = '📖 Seguí estudiando, ¡podés mejorar mucho!';
  const temaNombre = temaSeleccionado !== null ? temas[temaSeleccionado] : 'Todos los temas';

  document.getElementById('content').innerHTML = `
    <div class="result-card">
      <h2>Trivia finalizada</h2>
      <div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.5rem;">${temaNombre}</div>
      <div class="score-big">${score}/${total}</div>
      <div class="score-sub">${pct}% de respuestas correctas</div>
      <div class="result-msg">${msg}</div>
      <div class="result-footer">Enfermería Médica · Lic. Francisco Molina — Lic. Ana Collante<br>CENT N° 74 — ATSA — 3° Año</div>
      <button class="nav-btn" onclick="renderStart()">Volver al menú principal</button>
      ${temaSeleccionado !== null ? `<button class="nav-btn-sec" onclick="seleccionarTema(${temaSeleccionado})">Repetir este tema</button>` : `<button class="nav-btn-sec" onclick="iniciarTodos()">Jugar de nuevo</button>`}
    </div>`;
}

renderStart();
</script>
