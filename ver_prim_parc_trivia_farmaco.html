<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🧪 Trivia de Biofísica y Química | Enfermería CENT 74</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b3b3f 0%, #1a6d6b 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .header {
            background: #1f2e2e;
            color: white;
            padding: 25px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .header h1 span {
            font-size: 2rem;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .badge {
            display: inline-block;
            background: #2c8a7e;
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: #eef2f5;
            padding: 12px 25px;
            border-bottom: 1px solid #d0dee5;
            font-weight: bold;
            color: #1f4e4b;
        }

        .question-area {
            padding: 30px 25px 20px 25px;
        }

        .question-text {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a3a3a;
            margin-bottom: 25px;
            line-height: 1.3;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }

        .option {
            background: #f8fafc;
            border: 2px solid #cfdfe8;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            background: #e6f0f5;
            border-color: #2c8a7e;
            transform: scale(1.01);
        }

        .prefix {
            font-weight: bold;
            background: #d9e6f0;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #1f4e4b;
        }

        .feedback {
            background: #f1f9f9;
            padding: 16px 20px;
            border-radius: 24px;
            margin: 15px 0;
            font-size: 1rem;
            border-left: 6px solid #2c8a7e;
        }

        .correct-feedback {
            border-left-color: #2b7a4b;
            background: #e6f9ef;
            color: #145c33;
        }

        .wrong-feedback {
            border-left-color: #c23b22;
            background: #ffeeea;
            color: #9b2c1a;
        }

        .next-btn {
            background: #2c8a7e;
            border: none;
            padding: 14px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 15px;
        }

        .next-btn:hover {
            background: #1e6b60;
            transform: scale(1.01);
        }

        .reset-btn {
            background: #cfdfe8;
            color: #1f4e4b;
            margin-top: 10px;
            border: none;
        }

        .result {
            text-align: center;
            padding: 20px;
            font-size: 1.3rem;
        }

        .score-circle {
            font-size: 3rem;
            font-weight: bold;
            color: #2c8a7e;
        }

        footer {
            background: #eef2f5;
            text-align: center;
            padding: 15px;
            font-size: 0.75rem;
            color: #5f7c7a;
        }

        @media (max-width: 600px) {
            .question-text {
                font-size: 1.3rem;
            }
            .option {
                font-size: 0.9rem;
                padding: 12px 15px;
            }
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="quiz-container" id="quizApp">
    <div class="header">
        <h1><span>🧬</span> Trivia Biofísica y Química</h1>
        <p>Carrera de Enfermero/a Profesional | CENT 74 ATSA - Filial Monteros</p>
        <div class="badge">📚 Docente: Lic. Francisco Molina</div>
    </div>
    <div class="stats" id="statsPanel">
        <span>❓ Pregunta <span id="currentQ">1</span> / <span id="totalQ">0</span></span>
        <span>🏆 Puntaje: <span id="scoreValue">0</span> / <span id="totalScore">0</span></span>
    </div>
    <div class="question-area" id="dynamicContent">
        <!-- Se carga con JS -->
    </div>
    <footer>
        📖 Temas: Metabolismo, Glúcidos, Lípidos, Proteínas, Agua, pH, Ósmosis, Diálisis | Repaso interactivo
    </footer>
</div>

<script>
    // ========================
    // TRIVIA - NIVEL FÁCIL
    // TEMAS 1,2,3,4,6 del Módulo
    // ========================
    const questions = [
        {
            text: "El metabolismo es el conjunto de reacciones químicas del organismo. ¿Cuál describe mejor el ANABOLISMO?",
            options: [
                "Degrada moléculas complejas y libera energía",
                "Construye moléculas complejas y consume energía",
                "Transporta oxígeno en la sangre",
                "Elimina desechos a través de la orina"
            ],
            correct: 1,
            explanation: "✅ El anabolismo es construcción (síntesis) y necesita energía (endergónico)."
        },
        {
            text: "¿Cuál de los siguientes es un MONOSACÁRIDO (azúcar simple)?",
            options: ["Sacarosa", "Lactosa", "Glucosa", "Almidón"],
            correct: 2,
            explanation: "✅ Glucosa, fructosa y galactosa son monosacáridos. Sacarosa y lactosa son disacáridos."
        },
        {
            text: "¿Qué lipoproteína se conoce como 'colesterol bueno' porque protege las arterias?",
            options: ["LDL", "VLDL", "HDL", "Quilomicrones"],
            correct: 2,
            explanation: "✅ HDL (lipoproteína de alta densidad) retira colesterol de las arterias llevándolo al hígado."
        },
        {
            text: "Las proteínas están formadas por la unión de unidades más pequeñas llamadas:",
            options: ["Glucosa", "Ácidos grasos", "Nucleótidos", "Aminoácidos"],
            correct: 3,
            explanation: "✅ Los aminoácidos son los 'ladrillos' de las proteínas (20 tipos distintos)."
        },
        {
            text: "¿Qué hormona produce el páncreas para disminuir los niveles de glucosa en sangre?",
            options: ["Glucagón", "Insulina", "Adrenalina", "Cortisol"],
            correct: 1,
            explanation: "✅ Insulina → permite que la glucosa entre a las células y baja la glucemia."
        },
        {
            text: "Si un glóbulo rojo se coloca en una solución HIPOTÓNICA (mucha agua, pocas sales), ¿qué ocurre?",
            options: [
                "Se encoge (crenación)",
                "Se mantiene normal (isotónico)",
                "Se hincha y puede explotar (citólisis)",
                "Cambia de color"
            ],
            correct: 2,
            explanation: "✅ Por ósmosis, entra agua al interior de la célula → se hincha y puede lisarse."
        },
        {
            text: "¿Para qué sirve el tratamiento de DIÁLISIS en un paciente con insuficiencia renal?",
            options: [
                "Aumentar la producción de glóbulos rojos",
                "Eliminar toxinas (como urea) y exceso de líquido de la sangre",
                "Digestión de proteínas",
                "Regular la presión arterial por sí sola"
            ],
            correct: 1,
            explanation: "✅ La diálisis reemplaza la función del riñón: limpia toxinas y remueve líquido."
        },
        {
            text: "¿Cómo se llama el enlace químico que une a dos aminoácidos?",
            options: [
                "Enlace iónico",
                "Enlace glucosídico",
                "Enlace peptídico",
                "Puente de hidrógeno"
            ],
            correct: 2,
            explanation: "✅ Enlace peptídico: se forma entre el grupo carboxilo de un aa y el amino de otro."
        },
        {
            text: "¿Cuál de estos es un ejemplo de LÍPIDO con función estructural en las membranas celulares?",
            options: ["Triglicéridos", "Fosfolípidos", "Colesterol LDL", "Almidón"],
            correct: 1,
            explanation: "✅ Los fosfolípidos forman la bicapa lipídica de las membranas celulares."
        },
        {
            text: "El pH normal de la sangre humana es LIGERAMENTE:",
            options: ["Ácido (pH < 7)", "Neutro (pH = 7)", "Alcalino (pH entre 7,35 y 7,45)", "Muy ácido (pH 4)"],
            correct: 2,
            explanation: "✅ El pH fisiológico está entre 7,35 y 7,45, es decir, ligeramente alcalino."
        }
    ];

    // Estado
    let currentIndex = 0;
    let userAnswers = new Array(questions.length).fill(null); // almacena índice de opción elegida
    let score = 0;
    let quizFinished = false;

    // Elementos DOM
    const dynamicDiv = document.getElementById("dynamicContent");
    const currentQSpan = document.getElementById("currentQ");
    const totalQSpan = document.getElementById("totalQ");
    const scoreValueSpan = document.getElementById("scoreValue");
    const totalScoreSpan = document.getElementById("totalScore");

    totalQSpan.textContent = questions.length;
    totalScoreSpan.textContent = questions.length;

    function updateStats() {
        currentQSpan.textContent = currentIndex + 1;
        scoreValueSpan.textContent = score;
    }

    function calculateScore() {
        let newScore = 0;
        for (let i = 0; i < questions.length; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) {
                newScore++;
            }
        }
        score = newScore;
        scoreValueSpan.textContent = score;
    }

    function renderCurrentQuestion() {
        if (quizFinished) {
            renderResultScreen();
            return;
        }

        const q = questions[currentIndex];
        const selectedIdx = userAnswers[currentIndex];
        const isAnswered = selectedIdx !== null;
        const isCorrect = isAnswered && (selectedIdx === q.correct);

        // Construir opciones HTML
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            let additionalClass = '';
            let selectedMark = '';
            if (isAnswered) {
                if (idx === q.correct) {
                    additionalClass = 'style="background:#d4f0e0; border-color:#2b7a4b;"';
                } else if (idx === selectedIdx && idx !== q.correct) {
                    additionalClass = 'style="background:#ffded5; border-color:#c23b22;"';
                }
                if (idx === selectedIdx) {
                    selectedMark = ' ✔️';
                } else if (idx === q.correct) {
                    selectedMark = ' ✓';
                }
            }
            const prefixLetter = String.fromCharCode(65+idx); // A,B,C,D
            optionsHtml += `
                <div class="option" data-opt-index="${idx}" ${additionalClass}>
                    <span class="prefix">${prefixLetter}</span>
                    <span>${opt}${selectedMark}</span>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (isAnswered) {
            const feedbackClass = isCorrect ? 'correct-feedback' : 'wrong-feedback';
            const icon = isCorrect ? '✅ ' : '❌ ';
            feedbackHtml = `
                <div class="feedback ${feedbackClass}">
                    ${icon} ${isCorrect ? '¡Correcto!' : 'Incorrecto.'} 
                    <strong>${q.explanation}</strong>
                </div>
            `;
        }

        const nextButtonHtml = `
            <button class="next-btn" id="nextBtn" ${!isAnswered ? 'disabled' : ''}>
                ${currentIndex === questions.length-1 ? '🏁 Finalizar' : '➡ Siguiente pregunta'}
            </button>
            <button class="next-btn reset-btn" id="resetBtn">🔄 Reiniciar trivia</button>
        `;

        const html = `
            <div class="question-text">${currentIndex+1}. ${q.text}</div>
            <div class="options" id="optionsContainer">
                ${optionsHtml}
            </div>
            ${feedbackHtml}
            ${nextButtonHtml}
        `;

        dynamicDiv.innerHTML = html;

        // Eventos a opciones (solo si no respondida)
        if (!isAnswered) {
            const optDivs = document.querySelectorAll('.option');
            optDivs.forEach(div => {
                div.addEventListener('click', (e) => {
                    if (userAnswers[currentIndex] !== null) return;
                    const selected = parseInt(div.dataset.optIndex);
                    // guardar respuesta
                    userAnswers[currentIndex] = selected;
                    calculateScore();
                    renderCurrentQuestion();  // recarga para mostrar feedback
                });
            });
        }

        // Evento next
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (userAnswers[currentIndex] === null) return;
                if (currentIndex < questions.length - 1) {
                    currentIndex++;
                    renderCurrentQuestion();
                    updateStats();
                } else {
                    // finalizar trivia
                    quizFinished = true;
                    renderCurrentQuestion();
                }
            });
        }

        // Reset
        const resetBtn = document.getElementById('resetBtn');
        if (resetBtn) {
            resetBtn.addEventListener('click', () => {
                currentIndex = 0;
                userAnswers = new Array(questions.length).fill(null);
                quizFinished = false;
                score = 0;
                calculateScore();
                updateStats();
                renderCurrentQuestion();
            });
        }

        updateStats();
    }

    function renderResultScreen() {
        const total = questions.length;
        const passed = score >= (total * 0.6); // 60% aprueba
        let message = passed ? "🎉 ¡APROBASTE! Excelente repaso." : "📚 Repasa los temas nuevamente. ¡Vos podés!";
        let emoji = passed ? "🏅✨" : "💪😊";
        const html = `
            <div class="result">
                <div class="score-circle">${score} / ${total}</div>
                <p style="font-size:1.3rem; margin:10px 0">${emoji} ${message}</p>
                <div style="margin:20px 0; text-align:left; background:#f4fafd; border-radius:24px; padding:15px;">
                    <p><strong>📘 Resumen rápido:</strong></p>
                    <ul style="margin-top:8px; padding-left:20px;">
                        <li>🔹 Anabolismo = construcción + consume energía</li>
                        <li>🔹 Catabolismo = degradación + libera energía</li>
                        <li>🔹 Insulina baja la glucosa; Glucagón la sube</li>
                        <li>🔹 Solución hipotónica → célula se hincha</li>
                        <li>🔹 Enlace peptídico une aminoácidos</li>
                        <li>🔹 Diálisis: elimina toxinas como urea</li>
                    </ul>
                </div>
                <button class="next-btn reset-btn" id="resetFinalBtn">🔄 Volver a jugar</button>
            </div>
        `;
        dynamicDiv.innerHTML = html;
        const resetFinal = document.getElementById('resetFinalBtn');
        if (resetFinal) {
            resetFinal.addEventListener('click', () => {
                currentIndex = 0;
                userAnswers = new Array(questions.length).fill(null);
                quizFinished = false;
                score = 0;
                calculateScore();
                updateStats();
                renderCurrentQuestion();
            });
        }
        updateStats();
    }

    // Inicializar
    renderCurrentQuestion();
    updateStats();
</script>
</body>
</html>
